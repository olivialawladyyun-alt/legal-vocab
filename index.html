本票", "cheque 支票", "negotiability 流通性"], "example_en": "A negotiable instrument may be transferred by endorsement and delivery, passing good title to a holder in due course.", "example_zh": "票据可通过背书加交付转让，正当持票人可取得完整权利。", "note": "票据三大特性：无因性（abstraction）、文义性、流通性。中国票据法只承认汇票、本票、支票三种，且对无因性有限制（需有真实交易关系），与英美法不同。", "status": "待审校"}, {"word": "bill of exchange", "ipa": null, "pos": "n.", "zh_legal": "汇票", "zh_plain": null, "domain": "商法-票据", "level": 2, "source": "票据法（对照）", "collocations": ["drawer 出票人", "drawee 付款人", "payee 收款人", "acceptance of the bill 承兑"], "example_en": "The drawer of a bill of exchange orders the drawee to pay a sum certain to the payee on demand or at a fixed future date.", "example_zh": "汇票出票人委托付款人于见票时或指定到期日向收款人支付确定金额。", "note": "三方关系（出票人、付款人、收款人）区别于本票的两方关系。商业汇票 commercial draft 与银行汇票 bank draft 在中国实务中区分明确。", "status": "待审校"}, {"word": "promissory note", "ipa": null, "pos": "n.", "zh_legal": "本票", "zh_plain": null, "domain": "商法-票据", "level": 2, "source": "票据法（对照）", "collocations": ["maker 出票人", "IOU（非正式借据）", "demand note 即期本票"], "example_en": "A promissory note is an unconditional promise in writing by the maker to pay a sum certain to the payee.", "example_zh": "本票是出票人签发的、承诺自己无条件支付确定金额给收款人的票据。", "note": "本票是出票人自己付款（承诺付款），汇票是委托他人付款。中国票据法上的本票仅限银行本票，商业本票不被承认。", "status": "待审校"}, {"word": "endorsement", "ipa": "/ɪnˈdɔːsmənt/", "pos": "n.", "zh_legal": "背书", "zh_plain": "普通义：（名人）代言、（保单）批注", "domain": "商法-票据", "level": 2, "source": "票据法（对照）", "collocations": ["endorse v. 背书", "blank endorsement 空白背书", "endorsement for collection 委托收款背书", "restrictive endorsement 限制背书"], "example_en": "The payee transferred the bill to a third party by endorsement and delivery.", "example_zh": "收款人通过背书并交付将汇票转让给第三人。", "note": "背书连续（continuity of endorsements）是持票人合法权利的形式证明。第二义：保险单批单（policy endorsement）；广告代言。", "status": "待审校"}, {"word": "holder in due course", "ipa": null, "pos": "n.", "zh_legal": "正当持票人；善意持票人", "zh_plain": null, "domain": "商法-票据", "level": 3, "source": "票据法（对照）", "collocations": ["bona fide holder 善意持票人", "for value 支付对价", "without notice of defect 不知存在瑕疵"], "example_en": "A holder in due course takes the instrument free from most defenses that could be raised against prior parties.", "example_zh": "正当持票人取得票据时，可对抗大多数针对前手的抗辩。", "note": "票据抗辩切断的核心：善意、付对价、票据形式完整的持票人受特别保护。中国票据法对应\"善意取得\"与\"抗辩限制\"规则。", "status": "待审校"}, {"word": "letter of credit", "ipa": null, "pos": "n.", "zh_legal": "信用证", "zh_plain": null, "domain": "商法-票据", "level": 2, "source": "国际贸易实务（UCP600）", "collocations": ["缩写 L/C", "documentary credit 跟单信用证", "issuing bank 开证行", "beneficiary 受益人", "irrevocable L/C 不可撤销信用证"], "example_en": "Under the documentary credit, the issuing bank undertakes to pay the beneficiary against presentation of conforming documents.", "example_zh": "在跟单信用证下，开证行承诺凭相符单据向受益人付款。", "note": "信用证两大原则：独立性原则（独立于基础合同）与单证相符原则（strict compliance）。欺诈例外（fraud exception）是唯一的止付抗辩。适用国际惯例 UCP600。", "status": "待审校"}, {"word": "insurance policy", "ipa": null, "pos": "n.", "zh_legal": "保险单；保单", "zh_plain": null, "domain": "商法-保险", "level": 1, "source": "保险法（对照）", "collocations": ["policyholder 投保人", "the insured 被保险人", "insurer 保险人", "premium 保险费", "sum insured 保险金额"], "example_en": "The insurance policy sets out the scope of cover, the sum insured and the exclusions.", "example_zh": "保险单载明保险责任范围、保险金额以及除外责任。", "note": "区分三方主体：投保人（缔约付费）、被保险人（受保障）、受益人（领赔款）。除外责任条款（exclusion clause）是理赔纠纷高发区，须经提示说明义务。", "status": "待审校"}, {"word": "insurable interest", "ipa": null, "pos": "n.", "zh_legal": "保险利益；可保利益", "zh_plain": null, "domain": "商法-保险", "level": 3, "source": "保险法第12条（对照）", "collocations": ["lack of insurable interest 缺乏保险利益", "at the time of loss 损失发生时"], "example_en": "A contract of insurance is void if the policyholder has no insurable interest in the subject matter insured.", "example_zh": "投保人对保险标的不具有保险利益的，保险合同无效。", "note": "防止赌博与道德风险的基石。财产险要求损失发生时有保险利益；人身险要求投保时有保险利益。", "status": "待审校"}, {"word": "utmost good faith", "ipa": null, "pos": "n.", "zh_legal": "最大诚信（原则）", "zh_plain": null, "domain": "商法-保险", "level": 4, "source": "保险法（对照）", "collocations": ["uberrimae fidei（拉丁）", "duty of disclosure 如实告知义务", "material fact 重要事实"], "example_en": "Insurance contracts are governed by the principle of utmost good faith, requiring full disclosure of all material facts.", "example_zh": "保险合同受最大诚信原则约束，要求如实披露一切重要事实。", "note": "拉丁语 uberrimae fidei。投保人违反如实告知义务，保险人可解除合同。比一般合同的诚信义务标准更高。", "status": "待审校"}, {"word": "reinsurance", "ipa": "/ˌriːɪnˈʃʊərəns/", "pos": "n.", "zh_legal": "再保险；分保", "zh_plain": null, "domain": "商法-保险", "level": 3, "source": "保险法（对照）", "collocations": ["cedant / ceding company 分出公司", "reinsurer 再保险人", "treaty / facultative reinsurance 合约/临时再保险"], "example_en": "The primary insurer ceded part of its risk to a reinsurer through a reinsurance treaty.", "example_zh": "原保险人通过再保险合约将部分风险分出给再保险人。", "note": "\"保险公司的保险\"，用于分散巨灾风险。原保险合同与再保险合同相互独立，被保险人不得直接向再保险人索赔。", "status": "待审校"}, {"word": "subrogation right", "ipa": null, "pos": "n.", "zh_legal": "保险代位求偿权", "zh_plain": null, "domain": "商法-保险", "level": 3, "source": "保险法第60条（对照）", "collocations": ["exercise the right of subrogation 行使代位求偿权", "the insurer steps into the shoes of the insured 保险人取得被保险人地位"], "example_en": "Having indemnified the insured, the insurer may exercise its subrogation right against the third party responsible for the loss.", "example_zh": "保险人赔偿被保险人后，可就造成损失的第三人行使代位求偿权。", "note": "防止被保险人双重受偿。仅适用于财产保险，人身保险无代位求偿。与既有词条 subrogation（一般代位）相区分，此为保险专属语境。", "status": "待审校"}, {"word": "charterparty", "ipa": "/ˈtʃɑːtəpɑːti/", "pos": "n.", "zh_legal": "租船合同；租船契约", "zh_plain": null, "domain": "商法-海商", "level": 3, "source": "海商法（对照）", "collocations": ["voyage charter 航次租船", "time charter 定期租船", "bareboat charter 光船租赁", "shipowner 船东"], "example_en": "Under a time charterparty, the shipowner places the vessel at the charterer's disposal for a fixed period.", "example_zh": "在定期租船合同下，船东在约定期限内将船舶交由承租人使用。", "note": "三种基本形态：航次租船（按航次）、定期租船（按时间）、光船租赁（连船带控制权）。区别于既有词条 bill of lading（提单，承运合同的证明）。", "status": "待审校"}, {"word": "general average", "ipa": null, "pos": "n.", "zh_legal": "共同海损", "zh_plain": "average 普通义：平均", "domain": "商法-海商", "level": 4, "source": "海商法第193条（对照）", "collocations": ["general average act 共同海损行为", "average adjustment 海损理算", "particular average 单独海损"], "example_en": "Losses arising from a general average act shall be borne proportionally by all parties to the maritime adventure.", "example_zh": "共同海损行为造成的损失，应由海上同一航程中的各方按比例分摊。", "note": "为共同安全而有意作出的合理牺牲（如抛货），由获救各方分摊。average 在海商法中是\"海损\"而非\"平均\"——经典专业词义陷阱。适用《约克-安特卫普规则》。", "status": "待审校"}, {"word": "demurrage", "ipa": "/dɪˈmʌrɪdʒ/", "pos": "n.", "zh_legal": "滞期费", "zh_plain": null, "domain": "商法-海商", "level": 4, "source": "海商法（对照）", "collocations": ["laytime 装卸时间", "despatch money 速遣费", "demurrage rate 滞期费率"], "example_en": "Where the charterer exceeds the agreed laytime for loading, demurrage becomes payable at the agreed rate.", "example_zh": "承租人装货超过约定的装卸时间的，应按约定费率支付滞期费。", "note": "超过约定装卸时间（laytime）的违约赔偿；反向的速遣费（despatch）是提前完成的奖励。集装箱运输中也指超期用箱费。", "status": "待审校"}, {"word": "seaworthiness", "ipa": "/ˌsiːˈwɜːðinəs/", "pos": "n.", "zh_legal": "适航性", "zh_plain": null, "domain": "商法-海商", "level": 4, "source": "海商法第47条（对照）", "collocations": ["exercise due diligence to make the ship seaworthy 谨慎处理使船舶适航", "unseaworthy 不适航"], "example_en": "The carrier shall, before and at the beginning of the voyage, exercise due diligence to make the ship seaworthy.", "example_zh": "承运人在船舶开航前和开航时，应谨慎处理使船舶处于适航状态。", "note": "承运人的法定首要义务；违反则丧失免责权利（如航海过失免责）。适航包括船体适航、配备适航与货舱适航三方面。", "status": "待审校"}, {"word": "consignee", "ipa": "/ˌkɒnsaɪˈniː/", "pos": "n.", "zh_legal": "收货人", "zh_plain": null, "domain": "商法-海商", "level": 2, "source": "海商法（对照）", "collocations": ["consignor / shipper 托运人/发货人", "named consignee 记名收货人", "to order 凭指示"], "example_en": "The carrier shall deliver the goods to the consignee against surrender of the original bill of lading.", "example_zh": "承运人应凭正本提单向收货人交付货物。", "note": "记名提单（straight B/L）交记名收货人；指示提单（order B/L）经背书转让。无单放货（delivery without B/L）是承运人责任高发问题。", "status": "待审校"}, {"word": "securities", "ipa": "/sɪˈkjʊərətiz/", "pos": "n.", "zh_legal": "证券", "zh_plain": "单数 security 普通义：安全；担保", "domain": "商法-证券", "level": 1, "source": "证券法（对照）", "collocations": ["securities regulator 证券监管机构", "securities offering 证券发行", "CSRC 中国证监会"], "example_en": "The public offering of securities is subject to the registration-based system administered by the securities regulator.", "example_zh": "证券公开发行实行由证券监管机构主导的注册制。", "note": "复数 securities 才是\"证券\"；单数 security 多义（安全/担保物/保证）。2019证券法确立注册制，扩大了证券定义并强化了信息披露和投资者保护。", "status": "待审校"}, {"word": "insider trading", "ipa": null, "pos": "n.", "zh_legal": "内幕交易", "zh_plain": null, "domain": "商法-证券", "level": 2, "source": "证券法第50-54条（对照）", "collocations": ["inside information 内幕信息", "insider 内幕信息知情人", "tipping 泄露内幕信息"], "example_en": "An insider who trades on the basis of material non-public information commits insider trading.", "example_zh": "内幕信息知情人利用重大非公开信息进行交易的，构成内幕交易。", "note": "证券市场三大操纵违法之一（另为操纵市场、虚假陈述）。情节严重构成刑事犯罪（刑法第180条）。", "status": "待审校"}, {"word": "market manipulation", "ipa": null, "pos": "n.", "zh_legal": "操纵证券市场", "zh_plain": null, "domain": "商法-证券", "level": 3, "source": "证券法第55条（对照）", "collocations": ["wash trading 对倒/对敲", "cornering the market 囤积逼空", "pump and dump 拉高出货"], "example_en": "Creating false trading volume through wash trades constitutes market manipulation.", "example_zh": "通过对倒制造虚假成交量的行为构成操纵证券市场。", "note": "手法包括连续交易、约定交易、自买自卖、蛊惑交易、抢帽子等。损害投资者可提起民事赔偿。", "status": "待审校"}, {"word": "tender offer", "ipa": null, "pos": "n.", "zh_legal": "要约收购", "zh_plain": null, "domain": "商法-证券", "level": 3, "source": "证券法（对照）", "collocations": ["takeover bid（英式）", "mandatory tender offer 强制要约", "partial offer 部分要约", "acquirer 收购人"], "example_en": "An acquirer whose shareholding reaches 30% of a listed company must make a mandatory tender offer to the remaining shareholders.", "example_zh": "收购人持股达到上市公司股份30%的，应向其余股东发出强制要约。", "note": "上市公司收购两路径：协议收购（私下谈）与要约收购（向全体股东公开要约）。30%触发强制要约义务，旨在保护中小股东。", "status": "待审校"}, {"word": "initial public offering", "ipa": null, "pos": "n.", "zh_legal": "首次公开发行（上市）", "zh_plain": null, "domain": "商法-证券", "level": 2, "source": "证券法（对照）", "collocations": ["缩写 IPO", "go public 上市", "sponsor 保荐人", "lock-up period 限售期"], "example_en": "The company completed its initial public offering on the STAR Market and was listed for trading.", "example_zh": "该公司完成科创板首次公开发行并上市交易。", "note": "区别既有词条 listed company（已上市公司）与 prospectus（招股说明书）；IPO 是上市的发行环节。注册制下信息披露是核心。", "status": "待审校"}, {"word": "delisting", "ipa": "/ˌdiːˈlɪstɪŋ/", "pos": "n.", "zh_legal": "退市", "zh_plain": null, "domain": "商法-证券", "level": 3, "source": "证券法（对照）", "collocations": ["compulsory delisting 强制退市", "delisting risk warning（*ST）退市风险警示", "voluntary delisting 主动退市"], "example_en": "A listed company that fails to meet the continued listing requirements is subject to compulsory delisting.", "example_zh": "上市公司不符合持续上市条件的，将被强制退市。", "note": "退市指标：交易类、财务类、规范类、重大违法类。退市新规常态化后，财务造假等重大违法将直接触发退市。", "status": "待审校"}, {"word": "insolvency", "ipa": "/ɪnˈsɒlvənsi/", "pos": "n.", "zh_legal": "破产；资不抵债；无力清偿", "zh_plain": null, "domain": "商法-破产", "level": 2, "source": "企业破产法第2条（对照）", "collocations": ["balance-sheet insolvency 资不抵债", "cash-flow insolvency 不能清偿到期债务", "insolvent adj. 资不抵债的"], "example_en": "A debtor that is unable to pay its debts as they fall due and whose assets are insufficient to discharge all debts is insolvent.", "example_zh": "债务人不能清偿到期债务，并且资产不足以清偿全部债务的，即为资不抵债。", "note": "破产原因的实质标准：现金流标准（不能清偿到期债务）+ 资产负债标准（资不抵债）或明显缺乏清偿能力。区别既有 bankruptcy（破产程序/状态）。", "status": "待审校"}, {"word": "reorganization", "ipa": "/ˌriːˌɔːɡənaɪˈzeɪʃn/", "pos": "n.", "zh_legal": "（破产）重整", "zh_plain": null, "domain": "商法-破产", "level": 3, "source": "企业破产法第八章（对照）", "collocations": ["reorganization plan 重整计划", "cram down 强制批准", "debtor in possession 债务人自行管理"], "example_en": "The court approved the reorganization plan despite the dissent of one class of creditors by way of a cram down.", "example_zh": "尽管一组债权人反对，法院仍通过强制批准（cram down）方式批准了重整计划。", "note": "破产三程序之一（重整、和解、清算），目的是挽救企业而非消灭。对标美国 Chapter 11。强裁规则平衡各表决组利益。", "status": "待审校"}, {"word": "administrator", "ipa": "/ədˈmɪnɪstreɪtə/", "pos": "n.", "zh_legal": "（破产）管理人", "zh_plain": "普通义：管理员；遗产管理人", "domain": "商法-破产", "level": 3, "source": "企业破产法第三章（对照）", "collocations": ["appointment of an administrator 指定管理人", "take over the debtor's property 接管债务人财产", "insolvency practitioner 破产从业人"], "example_en": "Upon acceptance of the bankruptcy petition, the court shall appoint an administrator to take over the debtor's property and affairs.", "example_zh": "法院受理破产申请后，应指定管理人接管债务人的财产和事务。", "note": "中国破产法的核心机构，多由律所、会计师事务所担任。第二义：无遗嘱继承中的遗产管理人。英国语境 administrator 指接管令下的管理人。", "status": "待审校"}, {"word": "proof of claim", "ipa": null, "pos": "n.", "zh_legal": "债权申报", "zh_plain": null, "domain": "商法-破产", "level": 3, "source": "企业破产法第48条（对照）", "collocations": ["declare / file a claim 申报债权", "bar date 申报期限", "examination of claims 债权审查"], "example_en": "Creditors must file their proof of claim with the administrator within the period specified by the court.", "example_zh": "债权人应在法院确定的期限内向管理人申报债权。", "note": "逾期申报原则上可补充申报，但需承担审查费用且不得就此前分配补充受偿。申报后经债权人会议核查、法院确认。", "status": "待审校"}, {"word": "avoidance power", "ipa": null, "pos": "n.", "zh_legal": "（破产）撤销权", "zh_plain": null, "domain": "商法-破产", "level": 4, "source": "企业破产法第31-32条（对照）", "collocations": ["preferential payment 偏颇清偿", "fraudulent conveyance 欺诈性财产转让", "suspect period 临界期/可疑期"], "example_en": "The administrator may exercise the avoidance power to set aside preferential transfers made during the suspect period before bankruptcy.", "example_zh": "管理人可行使撤销权，撤销破产前临界期内作出的偏颇清偿行为。", "note": "维护债权人公平受偿：临界期内（受理前6个月/1年）的无偿转让、低价交易、个别清偿可被撤销，财产回归破产财产。", "status": "待审校"}, {"word": "antitrust", "ipa": "/ˌæntiˈtrʌst/", "pos": "n./adj.", "zh_legal": "反垄断（的）", "zh_plain": null, "domain": "商法-竞争", "level": 2, "source": "反垄断法（对照）", "collocations": ["competition law（欧式同义）", "antitrust enforcement 反垄断执法", "SAMR 国家市场监督管理总局"], "example_en": "The merger was cleared by the antitrust authority subject to behavioral remedies.", "example_zh": "该并购经反垄断执法机构附加行为性救济措施后获得批准。", "note": "美式称 antitrust，欧式与中国称 competition law / 反垄断法。三大支柱：垄断协议、滥用市场支配地位、经营者集中。", "status": "待审校"}, {"word": "monopoly agreement", "ipa": null, "pos": "n.", "zh_legal": "垄断协议", "zh_plain": null, "domain": "商法-竞争", "level": 3, "source": "反垄断法第二章（对照）", "collocations": ["horizontal monopoly agreement 横向垄断协议", "vertical monopoly agreement 纵向垄断协议", "price fixing 固定价格", "cartel 卡特尔"], "example_en": "Competitors who fix prices or divide markets enter into a horizontal monopoly agreement prohibited by law.", "example_zh": "竞争者固定价格或分割市场的，构成法律禁止的横向垄断协议。", "note": "横向（竞争者之间，如价格联盟）最严重；纵向（上下游之间，如转售价格维持 RPM）。可申请豁免（如技术改进、中小企业联合）。", "status": "待审校"}, {"word": "abuse of market dominance", "ipa": null, "pos": "n.", "zh_legal": "滥用市场支配地位", "zh_plain": null, "domain": "商法-竞争", "level": 3, "source": "反垄断法第三章（对照）", "collocations": ["dominant market position 市场支配地位", "predatory pricing 掠夺性定价", "refusal to deal 拒绝交易", "tying 搭售"], "example_en": "A dominant undertaking that sells below cost to eliminate competitors abuses its market dominance.", "example_zh": "具有支配地位的经营者以低于成本价销售排挤竞争对手的，构成滥用市场支配地位。", "note": "先认定支配地位（市场份额推定：一家≥1/2），再认定滥用行为。典型滥用：不公平高价、掠夺定价、拒绝/限定交易、搭售、差别待遇。", "status": "待审校"}, {"word": "concentration of undertakings", "ipa": null, "pos": "n.", "zh_legal": "经营者集中", "zh_plain": null, "domain": "商法-竞争", "level": 3, "source": "反垄断法第四章（对照）", "collocations": ["merger control 经营者集中审查", "notification threshold 申报标准", "gun-jumping 未申报先实施"], "example_en": "A concentration of undertakings that meets the notification thresholds must be cleared by the authority before completion.", "example_zh": "达到申报标准的经营者集中，须经反垄断执法机构审查通过后方可实施。", "note": "包括合并、取得控制权、施加决定性影响。达营业额标准须事先申报，未申报即实施（gun-jumping）将被处罚。审查结果：无条件批准、附条件批准、禁止。", "status": "待审校"}, {"word": "unfair competition", "ipa": null, "pos": "n.", "zh_legal": "不正当竞争", "zh_plain": null, "domain": "商法-竞争", "level": 2, "source": "反不正当竞争法（对照）", "collocations": ["passing off / confusion 混淆行为", "false advertising 虚假宣传", "commercial bribery 商业贿赂", "trade secret 商业秘密"], "example_en": "Using a trade name confusingly similar to a competitor's well-known mark constitutes unfair competition.", "example_zh": "使用与他人知名标识近似、足以引起混淆的名称，构成不正当竞争。", "note": "区别于反垄断（结构性问题）：反不正当竞争规制具体经营行为。典型类型：混淆、虚假宣传、商业贿赂、侵犯商业秘密、网络不正当竞争。", "status": "待审校"}, {"word": "trade secret", "ipa": null, "pos": "n.", "zh_legal": "商业秘密", "zh_plain": null, "domain": "商法-竞争", "level": 2, "source": "反不正当竞争法第9条（对照）", "collocations": ["misappropriation of trade secrets 侵犯商业秘密", "confidentiality measures 保密措施", "know-how 技术诀窍"], "example_en": "Information qualifies as a trade secret if it is secret, has commercial value, and is subject to reasonable confidentiality measures.", "example_zh": "信息具有秘密性、商业价值并经权利人采取合理保密措施的，构成商业秘密。", "note": "三要件：秘密性、价值性、保密性。与专利保护路径不同：商业秘密无期限但易因公开而丧失。举证责任在一定条件下倒置给被告。", "status": "待审校"}, {"word": "franchise", "ipa": "/ˈfræntʃaɪz/", "pos": "n./v.", "zh_legal": "特许经营（权）", "zh_plain": "普通义：选举权；（体育）特许球队", "domain": "商法-商主体", "level": 2, "source": "商业特许经营管理条例（对照）", "collocations": ["franchisor 特许人", "franchisee 被特许人", "franchise fee 特许费", "two stores, one year（两店一年）"], "example_en": "Under the franchise agreement, the franchisor licenses its trademark and business model to the franchisee in exchange for fees.", "example_zh": "在特许经营合同下，特许人将其商标和经营模式许可被特许人使用并收取费用。", "note": "中国监管要点：特许人须具备\"两店一年\"（two stores, one year）资质并备案；被特许人享有冷静期（cooling-off period）单方解约权。", "status": "待审校"}, {"word": "distributorship", "ipa": null, "pos": "n.", "zh_legal": "经销（权）", "zh_plain": null, "domain": "商法-商主体", "level": 3, "source": "交易实务", "collocations": ["distributor 经销商", "exclusive distributorship 独家经销", "buy-sell basis 买断式", "agency vs distribution 代理与经销之别"], "example_en": "The manufacturer granted the company an exclusive distributorship for the products within the designated territory.", "example_zh": "制造商授予该公司在指定区域内产品的独家经销权。", "note": "经销（distributor 买断货物再转售、自担风险）vs 代理（agent 以委托人名义、不持有所有权）——法律关系与风险分配根本不同。独家安排须注意反垄断地域限制风险。", "status": "待审校"}, {"word": "commercial agency", "ipa": null, "pos": "n.", "zh_legal": "商事代理", "zh_plain": null, "domain": "商法-商主体", "level": 3, "source": "民法典合同编、外贸代理（对照）", "collocations": ["commission agent 行纪人", "del credere agency 保付代理", "agent's commission 代理佣金"], "example_en": "Acting as a commission agent, the company concluded the sale in its own name but for the account of the principal.", "example_zh": "作为行纪人，该公司以自己的名义但为委托人的利益完成了交易。", "note": "区别既有 agency（民事代理）：商事代理含行纪（间接代理，以自己名义）、居间（intermediary）、外贸代理等。\"以谁的名义\"是分类关键。", "status": "待审校"}, {"word": "trust", "ipa": "/trʌst/", "pos": "n./v.", "zh_legal": "信托", "zh_plain": "普通义：信任", "domain": "商法-信托", "level": 2, "source": "信托法（对照）", "collocations": ["settlor 委托人", "trustee 受托人", "beneficiary 受益人", "trust property 信托财产"], "example_en": "Under the trust, the settlor transfers property to the trustee to be managed for the benefit of the beneficiary.", "example_zh": "在信托关系中，委托人将财产转移给受托人，由其为受益人的利益进行管理。", "note": "信托财产独立性是核心：独立于委托人、受托人、受益人的固有财产，破产隔离。中国信托法保留所有权\"转移\"的模糊处理，与英美双重所有权（法定/衡平）不同。", "status": "待审校"}, {"word": "trustee", "ipa": "/ˌtrʌsˈtiː/", "pos": "n.", "zh_legal": "受托人", "zh_plain": null, "domain": "商法-信托", "level": 3, "source": "信托法（对照）", "collocations": ["fiduciary duty 受信义务", "duty of prudence 谨慎义务", "breach of trust 违反信托"], "example_en": "The trustee must administer the trust property with the care of a prudent person and solely in the interests of the beneficiaries.", "example_zh": "受托人必须以谨慎之人的注意管理信托财产，并仅为受益人的利益行事。", "note": "受托人负最高标准的受信义务（fiduciary duty，参见既有 fiduciary）：忠实义务+谨慎义务，禁止自我交易和利益冲突。", "status": "待审校"}, {"word": "beneficiary", "ipa": "/ˌbenɪˈfɪʃəri/", "pos": "n.", "zh_legal": "受益人", "zh_plain": null, "domain": "商法-信托", "level": 2, "source": "信托法、保险法（对照）", "collocations": ["named beneficiary 指定受益人", "beneficial interest 受益权", "third-party beneficiary 第三方受益人"], "example_en": "The beneficiary holds the beneficial interest in the trust property and may enforce the trust against the trustee.", "example_zh": "受益人享有信托财产的受益权，并可对受托人主张信托权利。", "note": "信托、保险、信用证、合同（第三方受益人）多个语境通用。区别既有 beneficial owner（受益所有人，穿透监管语境）。", "status": "待审校"}, {"word": "commercial bribery", "ipa": null, "pos": "n.", "zh_legal": "商业贿赂", "zh_plain": null, "domain": "商法-竞争", "level": 3, "source": "反不正当竞争法第7条（对照）", "collocations": ["facilitation payment 疏通费", "kickback 回扣", "off-the-book account 账外暗中"], "example_en": "Offering off-the-book kickbacks to a counterparty's employee to secure a transaction constitutes commercial bribery.", "example_zh": "为谋取交易机会，账外暗中给予交易相对方员工回扣的，构成商业贿赂。", "note": "贿赂对象包括交易相对方工作人员、受托办事的单位或个人、利用职权影响交易的单位或个人。与 FCPA、UK Bribery Act 等域外反腐败法的合规交叉点。", "status": "待审校"}, {"word": "letter of guarantee", "ipa": null, "pos": "n.", "zh_legal": "保函；独立保函", "zh_plain": null, "domain": "商法-票据", "level": 3, "source": "民法典担保制度解释、独立保函司法解释（对照）", "collocations": ["independent / demand guarantee 独立保函/见索即付保函", "standby letter of credit 备用信用证", "bid bond 投标保函"], "example_en": "Under an independent guarantee, the bank must pay upon the beneficiary's demand without regard to the underlying transaction.", "example_zh": "在独立保函下，银行须凭受益人的索款请求付款，而不论基础交易状况。", "note": "独立保函的独立性与信用证类似：付款不依赖基础合同抗辩，仅欺诈例外可止付。中国法已通过司法解释承认独立保函（含国内独立保函）的效力。", "status": "待审校"}, {"word": "freight", "ipa": "/freɪt/", "pos": "n.", "zh_legal": "运费；货运", "zh_plain": null, "domain": "商法-海商", "level": 2, "source": "海商法（对照）", "collocations": ["freight prepaid 运费预付", "freight collect 运费到付", "dead freight 亏舱费"], "example_en": "The bill of lading was marked 'freight prepaid', indicating that the shipper had paid the freight in advance.", "example_zh": "提单注明\"运费预付\"，表明托运人已预先支付运费。", "note": "freight prepaid（预付，CIF/CFR 常见）vs freight collect（到付，FOB 常见）影响风险与单据。dead freight 是订舱未装满的赔偿。", "status": "待审校"}]}, {"id": "zhongcai", "name": "商事仲裁进阶法律英语词库", "short": "商事仲裁", "words": [{"word": "claimant", "ipa": "/ˈkleɪmənt/", "pos": "n.", "zh_legal": "（仲裁）申请人", "zh_plain": null, "domain": "商事仲裁-当事人", "level": 2, "source": "通用（仲裁）", "collocations": ["respondent 被申请人", "request for arbitration 仲裁申请书", "counterclaimant 反请求申请人"], "example_en": "The claimant submitted its request for arbitration together with the arbitration agreement and statement of claim.", "example_zh": "申请人提交了仲裁申请书，连同仲裁协议和仲裁请求。", "note": "仲裁称申请人/被申请人（claimant/respondent），诉讼称原告/被告（plaintiff/defendant）——程序不同称谓不同，混用是法律英语低级错误。", "status": "待审校"}, {"word": "respondent", "ipa": "/rɪˈspɒndənt/", "pos": "n.", "zh_legal": "（仲裁）被申请人；（上诉）被上诉人", "zh_plain": null, "domain": "商事仲裁-当事人", "level": 2, "source": "通用（仲裁）", "collocations": ["answer to the request 答辩", "respondent's counterclaim 被申请人的反请求"], "example_en": "The respondent filed its answer and raised a jurisdictional objection within the time limit.", "example_zh": "被申请人在期限内提交答辩并提出管辖权异议。", "note": "仲裁中的\"被告\"；在上诉/再审程序中 respondent 也指被上诉方。注意与诉讼一审的 defendant 区分。", "status": "待审校"}, {"word": "arbitration rules", "ipa": null, "pos": "n.", "zh_legal": "仲裁规则", "zh_plain": null, "domain": "商事仲裁-程序", "level": 2, "source": "通用（仲裁）", "collocations": ["CIETAC Arbitration Rules 贸仲规则", "UNCITRAL Arbitration Rules 联合国国际贸易法委员会仲裁规则", "expedited procedure 简易/快速程序"], "example_en": "The parties agreed that any dispute would be settled under the arbitration rules of the chosen institution in force at the time.", "example_zh": "双方约定争议按所选机构届时有效的仲裁规则解决。", "note": "区分仲裁规则（程序运作，可约定适用）与仲裁地法 lex arbitri（强制性框架）。临时仲裁常借用 UNCITRAL 规则。", "status": "待审校"}, {"word": "terms of reference", "ipa": null, "pos": "n.", "zh_legal": "审理范围书；仲裁审理事项", "zh_plain": null, "domain": "商事仲裁-程序", "level": 4, "source": "ICC 仲裁规则", "collocations": ["缩写 ToR", "list of issues 争点清单", "signed by the parties and the tribunal 经各方与仲裁庭签署"], "example_en": "Under the ICC Rules, the tribunal must draw up Terms of Reference defining the issues to be determined.", "example_zh": "根据ICC规则，仲裁庭须制作审理范围书，界定待决争点。", "note": "ICC 仲裁的特色文件，相当于程序的\"路线图\"，锁定请求、争点与程序安排；签署后新请求原则上不得提出。", "status": "待审校"}, {"word": "competence-competence", "ipa": null, "pos": "n.", "zh_legal": "自裁管辖原则", "zh_plain": null, "domain": "商事仲裁-管辖", "level": 4, "source": "UNCITRAL 示范法第16条", "collocations": ["Kompetenz-Kompetenz（德语原词）", "rule on its own jurisdiction 就自身管辖权作出裁定", "jurisdictional objection 管辖权异议"], "example_en": "Under the competence-competence principle, the tribunal may rule on its own jurisdiction, including on the validity of the arbitration agreement.", "example_zh": "根据自裁管辖原则，仲裁庭有权就自身管辖权（包括仲裁协议效力）作出裁定。", "note": "与仲裁条款独立性（separability）并列的两大基础原则。中国法的特殊性：仲裁协议效力异议可由仲裁委员会或法院决定（法院优先），与示范法的庭裁优先不同。", "status": "待审校"}, {"word": "interim measures", "ipa": null, "pos": "n.", "zh_legal": "临时措施；临时性救济", "zh_plain": null, "domain": "商事仲裁-救济", "level": 3, "source": "UNCITRAL 示范法第17条", "collocations": ["interim relief 临时救济", "preservation of assets / evidence 财产/证据保全", "anti-suit injunction 禁诉令"], "example_en": "Pending the constitution of the tribunal, a party may apply to the court for interim measures to preserve assets.", "example_zh": "在仲裁庭组成前，一方可向法院申请临时措施以保全财产。", "note": "中国法下保全须由法院作出（仲裁机构转交申请），仲裁庭无权直接颁布——这是中国仲裁与国际通行做法的关键差异（香港、新加坡可两地保全）。", "status": "待审校"}, {"word": "emergency arbitrator", "ipa": null, "pos": "n.", "zh_legal": "紧急仲裁员", "zh_plain": null, "domain": "商事仲裁-救济", "level": 4, "source": "主要机构规则（SIAC/HKIAC/ICC）", "collocations": ["emergency arbitration 紧急仲裁程序", "before the tribunal is constituted 仲裁庭组成前", "emergency relief 紧急救济"], "example_en": "Before the tribunal was constituted, the claimant obtained urgent relief from an emergency arbitrator.", "example_zh": "在仲裁庭组成前，申请人从紧急仲裁员处获得了紧急救济。", "note": "为填补\"仲裁庭组成前无人决定紧急保全\"的空白而设。中国内地法院目前对紧急仲裁员决定的承认执行尚不明朗，跨境交易选机构时需考量。", "status": "待审校"}, {"word": "consolidation", "ipa": "/kənˌsɒlɪˈdeɪʃn/", "pos": "n.", "zh_legal": "合并仲裁", "zh_plain": "普通义：巩固、合并", "domain": "商事仲裁-程序", "level": 4, "source": "主要机构规则", "collocations": ["consolidate two arbitrations 合并两个仲裁案", "related arbitrations 关联仲裁", "compatible arbitration agreements 相容的仲裁协议"], "example_en": "The institution may order the consolidation of two pending arbitrations arising out of the same transaction.", "example_zh": "机构可命令将基于同一交易的两个待决仲裁合并审理。", "note": "解决多合同、多当事人争议碎片化的工具，需仲裁协议相容。与 joinder（追加当事人）配套构成复杂仲裁的程序基础。", "status": "待审校"}, {"word": "joinder", "ipa": "/ˈdʒɔɪndə/", "pos": "n.", "zh_legal": "追加当事人；当事人合并", "zh_plain": null, "domain": "商事仲裁-程序", "level": 4, "source": "主要机构规则", "collocations": ["joinder of additional parties 追加当事人", "non-signatory 非签字方", "third party 第三人"], "example_en": "The respondent applied for the joinder of an additional party that was a signatory to the same arbitration agreement.", "example_zh": "被申请人申请追加同一仲裁协议签字方的另一当事人。", "note": "仲裁的合意性使追加非签字方困难（区别于诉讼可强制追加第三人）。集团公司原则、刺破面纱等理论用于将非签字方纳入仲裁。", "status": "待审校"}, {"word": "set aside an award", "ipa": null, "pos": "phrase", "zh_legal": "撤销仲裁裁决", "zh_plain": null, "domain": "商事仲裁-裁决", "level": 3, "source": "仲裁法、UNCITRAL 示范法第34条", "collocations": ["application to set aside 撤销之诉", "annulment 撤销", "vacate an award（美式）撤销裁决"], "example_en": "A party may apply to the court of the seat to set aside an award only on the limited grounds prescribed by law.", "example_zh": "当事人仅可基于法定的有限事由，向仲裁地法院申请撤销裁决。", "note": "撤销是对裁决的唯一司法救济（仅程序审查，不审实体）。撤销由仲裁地法院专属管辖，事由有限：无有效仲裁协议、超裁、组庭违规、违反公共政策等。", "status": "待审校"}, {"word": "grounds for refusal", "ipa": null, "pos": "n.", "zh_legal": "拒绝承认与执行的事由", "zh_plain": null, "domain": "商事仲裁-裁决", "level": 4, "source": "《纽约公约》第5条", "collocations": ["public policy 公共政策", "incapacity 行为能力欠缺", "non-arbitrability 不可仲裁性", "due process violation 违反正当程序"], "example_en": "Recognition of a foreign award may be refused only on the exhaustive grounds for refusal listed in Article V of the New York Convention.", "example_zh": "承认外国裁决仅可基于《纽约公约》第五条所列的穷尽性事由予以拒绝。", "note": "《纽约公约》第5条的七项事由是穷尽列举且从严解释——这是国际仲裁裁决全球可执行性的制度根基。公共政策例外在中国适用极为审慎。", "status": "待审校"}, {"word": "public policy", "ipa": null, "pos": "n.", "zh_legal": "公共政策；社会公共利益", "zh_plain": null, "domain": "商事仲裁-裁决", "level": 3, "source": "《纽约公约》、民事诉讼法（对照）", "collocations": ["public policy exception 公共政策例外", "ordre public（法语）", "violate the public interest 违反社会公共利益"], "example_en": "The court refused enforcement on the ground that the award would violate the public policy of the forum.", "example_zh": "法院以执行该裁决将违反法院地公共政策为由拒绝执行。", "note": "拒绝承认执行的兜底事由，但门槛极高（须违反最基本的法律道德观念）。中国对应表述为\"社会公共利益\"，最高法报核制度严格控制其滥用。", "status": "待审校"}, {"word": "governing law", "ipa": null, "pos": "n.", "zh_legal": "准据法；适用法律", "zh_plain": null, "domain": "商事仲裁-法律适用", "level": 2, "source": "涉外民事关系法律适用法（对照）", "collocations": ["governing law clause 法律适用条款", "applicable law 适用法律", "choice of law 法律选择", "law governing the arbitration agreement 仲裁协议准据法"], "example_en": "This contract shall be governed by and construed in accordance with the laws of the People's Republic of China.", "example_zh": "本合同受中华人民共和国法律管辖并据其解释。", "note": "涉外合同三层法律须分清：合同实体准据法、仲裁协议准据法、仲裁程序法（仲裁地法）——三者可不同，起草时极易遗漏仲裁协议准据法。", "status": "待审校"}, {"word": "choice of law", "ipa": null, "pos": "n.", "zh_legal": "法律选择；法律适用", "zh_plain": null, "domain": "商事仲裁-法律适用", "level": 3, "source": "涉外民事关系法律适用法（对照）", "collocations": ["party autonomy 意思自治", "conflict of laws 法律冲突/冲突法", "renvoi 反致"], "example_en": "Under the principle of party autonomy, the parties to a foreign-related contract may make their own choice of law.", "example_zh": "根据意思自治原则，涉外合同当事人可自主选择适用的法律。", "note": "涉外合同的核心连结点。注意中国法的强制性规定（如外资准入、外汇管制）不因当事人选择外国法而被排除适用。", "status": "待审校"}, {"word": "conflict of laws", "ipa": null, "pos": "n.", "zh_legal": "法律冲突；冲突法；国际私法", "zh_plain": null, "domain": "商事仲裁-法律适用", "level": 4, "source": "涉外民事关系法律适用法（对照）", "collocations": ["private international law 国际私法", "connecting factor 连结点", "characterization 识别/定性"], "example_en": "Conflict of laws rules determine which jurisdiction's substantive law applies to a foreign-related dispute.", "example_zh": "冲突法规则决定涉外争议应适用哪一法域的实体法。", "note": "美式称 conflict of laws，欧陆称 private international law（国际私法），所指相同。研究的是\"法律选择\"问题，不直接解决实体争议。", "status": "待审校"}, {"word": "multi-tier dispute resolution", "ipa": null, "pos": "n.", "zh_legal": "多层次争议解决（条款）", "zh_plain": null, "domain": "商事仲裁-程序", "level": 4, "source": "交易实务", "collocations": ["escalation clause 逐级升级条款", "med-arb 调解仲裁", "negotiation then arbitration 先协商后仲裁"], "example_en": "The multi-tier dispute resolution clause requires the parties to negotiate, then mediate, before commencing arbitration.", "example_zh": "多层次争议解决条款要求当事人先协商、再调解，方可启动仲裁。", "note": "又称 escalation clause（升级条款）。前置程序（如\"友好协商60天\"）是否构成仲裁的强制先决条件、违反的后果（管辖 vs 可受理性），各法域立场不一，起草须明确。", "status": "待审校"}, {"word": "dissenting opinion", "ipa": null, "pos": "n.", "zh_legal": "异议意见；反对意见", "zh_plain": null, "domain": "商事仲裁-裁决", "level": 4, "source": "通用（仲裁）", "collocations": ["majority award 多数裁决", "separate / concurring opinion 单独/附和意见", "co-arbitrator 边裁仲裁员"], "example_en": "The award was rendered by a majority, with one arbitrator issuing a dissenting opinion.", "example_zh": "裁决由多数仲裁员作出，一名仲裁员发表了异议意见。", "note": "三人庭无法一致时由首席意见或多数意见构成裁决。异议意见不属裁决组成部分、无约束力，但可能成为后续撤销之诉的素材。", "status": "待审校"}, {"word": "security for costs", "ipa": null, "pos": "n.", "zh_legal": "费用担保", "zh_plain": null, "domain": "商事仲裁-程序", "level": 4, "source": "主要机构规则", "collocations": ["order security for costs 命令提供费用担保", "third-party funding 第三方资助", "impecunious claimant 缺乏资力的申请人"], "example_en": "The tribunal ordered the claimant to provide security for costs in view of doubts about its ability to satisfy an adverse costs award.", "example_zh": "鉴于对申请人承担不利费用裁决能力的疑虑，仲裁庭命令其提供费用担保。", "note": "保护被申请人免于胜诉后无法收回费用的风险；第三方资助（third-party funding）的出现使该问题更突出。", "status": "待审校"}, {"word": "costs of arbitration", "ipa": null, "pos": "n.", "zh_legal": "仲裁费用", "zh_plain": null, "domain": "商事仲裁-程序", "level": 3, "source": "通用（仲裁）", "collocations": ["administrative fees 机构管理费", "arbitrators' fees 仲裁员报酬", "costs follow the event 费用随结果", "legal representation costs 律师代理费"], "example_en": "The tribunal ordered that the costs of arbitration, including legal fees, be borne by the unsuccessful party.", "example_zh": "仲裁庭裁定仲裁费用（含律师费）由败诉方承担。", "note": "国际仲裁普遍采\"费用随结果\"（costs follow the event），仲裁庭可裁决败诉方负担胜诉方合理律师费——这是仲裁相对中国诉讼的一大优势（诉讼律师费一般各自承担）。", "status": "待审校"}, {"word": "ad hoc arbitration", "ipa": null, "pos": "n.", "zh_legal": "临时仲裁", "zh_plain": null, "domain": "商事仲裁-程序", "level": 3, "source": "通用（仲裁）", "collocations": ["institutional arbitration 机构仲裁", "appointing authority 指定机构", "UNCITRAL Rules 联合国贸法会规则"], "example_en": "The parties opted for ad hoc arbitration under the UNCITRAL Rules, with the PCA acting as appointing authority.", "example_zh": "双方选择适用联合国贸法会规则的临时仲裁，由常设仲裁法院担任指定机构。", "note": "临时仲裁无常设机构管理，灵活但依赖当事人配合。中国法长期仅承认机构仲裁，但2024自贸区/涉外领域已开始试点临时仲裁（横琴、上海等）。", "status": "待审校"}, {"word": "separability", "ipa": null, "pos": "n.", "zh_legal": "（仲裁条款）独立性；可分性", "zh_plain": null, "domain": "商事仲裁-管辖", "level": 4, "source": "仲裁法第19条、UNCITRAL 示范法", "collocations": ["severability of the arbitration clause 仲裁条款的可分性", "the arbitration clause survives 仲裁条款独立存续"], "example_en": "By virtue of separability, the invalidity or termination of the main contract does not affect the validity of the arbitration clause.", "example_zh": "基于独立性原则，主合同无效或终止不影响仲裁条款的效力。", "note": "与自裁管辖（competence-competence）互为支撑：正因仲裁条款独立存续，仲裁庭才能在主合同被指无效时仍有权审理。", "status": "待审校"}, {"word": "arbitrability", "ipa": null, "pos": "n.", "zh_legal": "可仲裁性", "zh_plain": null, "domain": "商事仲裁-管辖", "level": 4, "source": "仲裁法第2-3条（对照）", "collocations": ["non-arbitrable disputes 不可仲裁的争议", "subject-matter arbitrability 事项可仲裁性"], "example_en": "Certain disputes, such as those concerning marriage, adoption and administrative matters, are not arbitrable under Chinese law.", "example_zh": "婚姻、收养及行政争议等特定争议在中国法下不具可仲裁性。", "note": "界定哪些争议可交付仲裁。中国法排除：婚姻收养监护扶养继承纠纷、依法应由行政机关处理的行政争议。可仲裁性欠缺是撤销/拒绝执行的事由。", "status": "待审校"}]}, {"id": "xieyi", "name": "商事协议常用法律英语词库", "short": "商事协议", "words": [{"word": "recital", "ipa": "/rɪˈsaɪtl/", "pos": "n.", "zh_legal": "鉴于条款；事实陈述（序文）", "zh_plain": "普通义：独奏会、背诵", "domain": "商事协议-通用条款", "level": 3, "source": "合同起草实务", "collocations": ["whereas clause 鉴于条款", "background section 背景部分", "operative provisions 正文条款"], "example_en": "The recitals set out the background to the transaction but generally do not create binding obligations.", "example_zh": "鉴于条款陈述交易背景，但通常不产生约束性义务。", "note": "合同开头\"WHEREAS...\"段落。原则上不具操作性效力，但可用于解释正文意图、认定缔约背景。中文合同对应\"鉴于\"条款。", "status": "待审校"}, {"word": "entire agreement", "ipa": null, "pos": "n.", "zh_legal": "完整协议（条款）", "zh_plain": null, "domain": "商事协议-通用条款", "level": 2, "source": "合同起草实务", "collocations": ["merger / integration clause 合并条款", "supersede all prior agreements 取代所有先前约定", "entire agreement clause 完整协议条款"], "example_en": "This agreement constitutes the entire agreement between the parties and supersedes all prior understandings.", "example_zh": "本协议构成双方之间的完整协议，并取代所有先前的谅解。", "note": "排除口头承诺、往来邮件、先前草案进入合同（英美\"口头证据规则\" parol evidence rule 的合同化）。审查要点：是否真欲排除全部前期文件（如 TS、LOI）。", "status": "待审校"}, {"word": "severability", "ipa": "/sɪˌverəˈbɪləti/", "pos": "n.", "zh_legal": "可分性（条款）", "zh_plain": null, "domain": "商事协议-通用条款", "level": 3, "source": "合同起草实务", "collocations": ["severability clause 可分性条款", "if any provision is held invalid 如任何条款被认定无效", "the remaining provisions shall remain in effect 其余条款继续有效"], "example_en": "If any provision of this agreement is held to be invalid, the remaining provisions shall continue in full force and effect.", "example_zh": "本协议任何条款被认定无效的，其余条款仍完全有效。", "note": "防止个别条款无效\"传染\"整个合同。对应民法典第156条部分无效规则。注意与仲裁词库的 separability（仲裁条款独立性）区分——不同概念、不同拼写。", "status": "待审校"}, {"word": "amendment", "ipa": "/əˈmendmənt/", "pos": "n.", "zh_legal": "修订；变更（条款）", "zh_plain": "普通义：（宪法）修正案", "domain": "商事协议-通用条款", "level": 2, "source": "合同起草实务", "collocations": ["variation（英式同义）", "amendment in writing 书面变更", "no oral modification (NOM) clause 不得口头变更条款"], "example_en": "No amendment to this agreement shall be effective unless made in writing and signed by both parties.", "example_zh": "对本协议的任何修订，非经双方书面签署不生效力。", "note": "\"非书面不得变更\"条款（NOM）能否排除口头变更，各法域立场不一（英国 MWB 案承认其效力）。中国法下行为可构成变更的默示。", "status": "待审校"}, {"word": "counterparts", "ipa": "/ˈkaʊntəpɑːts/", "pos": "n.", "zh_legal": "（合同的）份数；对应文本", "zh_plain": "单数 counterpart 普通义：对应方、对等者", "domain": "商事协议-通用条款", "level": 3, "source": "合同起草实务", "collocations": ["executed in counterparts 以多份签署", "each of which shall be deemed an original 每份均为正本", "electronic signature 电子签名"], "example_en": "This agreement may be executed in any number of counterparts, each of which shall be deemed an original.", "example_zh": "本协议可签署任意份数，每份均视为正本。", "note": "允许各方分别在不同副本上签字（异地签约、换签 closing 必备）。注意与中文\"一式两份\"的语境对应。", "status": "待审校"}, {"word": "successors and assigns", "ipa": null, "pos": "n.", "zh_legal": "继受人与受让人", "zh_plain": null, "domain": "商事协议-通用条款", "level": 3, "source": "合同起草实务", "collocations": ["binding on and inure to the benefit of 对……具约束力并使……受益", "permitted assignee 许可受让人"], "example_en": "This agreement shall be binding upon and inure to the benefit of the parties and their respective successors and assigns.", "example_zh": "本协议对双方及其各自的继受人与受让人均具约束力并使其受益。", "note": "确保合同权利义务及于合并、继承、转让后的主体。successor 多指概括承受（合并/继承），assign 指具体权利受让人。", "status": "待审校"}, {"word": "conditions precedent", "ipa": null, "pos": "n.", "zh_legal": "先决条件", "zh_plain": null, "domain": "商事协议-通用条款", "level": 3, "source": "合同起草实务", "collocations": ["缩写 CPs", "satisfaction or waiver of conditions 条件成就或豁免", "condition subsequent 解除条件/后决条件"], "example_en": "Completion is subject to the satisfaction or waiver of the conditions precedent set out in Schedule 2.", "example_zh": "交割以附件二所列先决条件成就或被豁免为前提。", "note": "成就前合同义务不生效（区别于民法典第158条\"附条件\"）。先决条件（CP）vs 后决条件（condition subsequent，成就则义务消灭）。交割文件的核心机制。", "status": "待审校"}, {"word": "material adverse change", "ipa": null, "pos": "n.", "zh_legal": "重大不利变化", "zh_plain": null, "domain": "商事协议-通用条款", "level": 3, "source": "交易实务", "collocations": ["缩写 MAC / MAE（material adverse effect）", "MAC clause 重大不利变化条款", "walk-away right 退出权"], "example_en": "The buyer may terminate the agreement prior to closing if a material adverse change occurs in the target's business.", "example_zh": "交割前目标公司业务发生重大不利变化的，买方可终止协议。", "note": "买方在签约与交割间的\"逃生舱\"。范围与除外（市场系统性风险、行业普遍因素常被排除）是谈判焦点；疫情、战争等是否构成 MAC 引发大量争议。", "status": "待审校"}, {"word": "best efforts", "ipa": null, "pos": "n.", "zh_legal": "最大努力；尽最大努力", "zh_plain": null, "domain": "商事协议-通用条款", "level": 3, "source": "合同起草实务", "collocations": ["reasonable endeavours（英式）合理努力", "commercially reasonable efforts 商业上合理的努力", "best endeavours 最大努力"], "example_en": "The seller shall use its best efforts to obtain all regulatory approvals required for the transaction.", "example_zh": "卖方应尽最大努力取得交易所需的全部监管批准。", "note": "努力义务的强度阶梯（英式）：best > all reasonable > reasonable endeavours，强度依次递减、举证与成本负担不同。中文常笼统译\"尽力\"，起草时须明确标准。", "status": "待审校"}, {"word": "survival clause", "ipa": null, "pos": "n.", "zh_legal": "存续条款", "zh_plain": null, "domain": "商事协议-通用条款", "level": 3, "source": "合同起草实务", "collocations": ["survive termination 于终止后存续", "surviving obligations 存续义务", "post-termination 终止后"], "example_en": "The confidentiality and indemnity provisions shall survive the termination or expiry of this agreement.", "example_zh": "保密与赔偿条款在本协议终止或届满后继续有效。", "note": "约定哪些义务在合同终止后仍存续：保密、赔偿、争议解决、竞业等。缺失存续条款可能导致这些义务随合同终止而消灭。", "status": "待审校"}, {"word": "effective date", "ipa": null, "pos": "n.", "zh_legal": "生效日", "zh_plain": null, "domain": "商事协议-通用条款", "level": 1, "source": "合同起草实务", "collocations": ["commencement date 起始日", "with effect from 自……起生效", "date of execution 签署日"], "example_en": "This agreement shall come into force on the effective date and continue for an initial term of three years.", "example_zh": "本协议自生效日起生效，初始期限为三年。", "note": "区分签署日（date of execution）与生效日（effective date）——二者可不同（如附条件生效、约定追溯生效）。", "status": "待审校"}, {"word": "liquidated damages", "ipa": null, "pos": "n.", "zh_legal": "约定违约金；预定损害赔偿额", "zh_plain": null, "domain": "商事协议-通用条款", "level": 2, "source": "合同起草实务（对照民法典第585条）", "collocations": ["penalty clause 罚则（英美法不可执行）", "genuine pre-estimate of loss 对损失的真实预估", "cap on liability 责任上限"], "example_en": "In the event of delay, the contractor shall pay liquidated damages at 0.1% of the contract price per day.", "example_zh": "如发生延误，承包方应按合同价款每日0.1%支付违约金。", "note": "英美法关键区分：liquidated damages（损失真实预估，可执行）vs penalty（惩罚性，不可执行）。中国法\"违约金\"含补偿+适度惩罚双重属性，过高/过低可司法调整（民法典585条）。既有词库的 default fine 是对照本对\"违约金\"的另一译法。", "status": "待审校"}, {"word": "limitation of liability", "ipa": null, "pos": "n.", "zh_legal": "责任限制（条款）", "zh_plain": null, "domain": "商事协议-通用条款", "level": 2, "source": "合同起草实务", "collocations": ["liability cap 责任上限", "exclusion of consequential loss 排除间接损失", "carve-outs 例外（不受限制的责任）"], "example_en": "The supplier's aggregate liability under this agreement shall not exceed the total fees paid in the preceding twelve months.", "example_zh": "供应商在本协议项下的累计责任不超过此前十二个月已付费用总额。", "note": "两种形态：责任上限（cap）与排除特定损失（如间接、后果性损失）。常见例外：故意/重大过失、人身伤害、保密违约、第三方侵权赔偿不受限制。", "status": "待审校"}, {"word": "schedule", "ipa": "/ˈʃedjuːl/", "pos": "n.", "zh_legal": "附件；附表", "zh_plain": "普通义：日程、时间表", "domain": "商事协议-通用条款", "level": 2, "source": "合同起草实务", "collocations": ["annex / appendix / exhibit 附件", "as set out in Schedule 1 如附件一所列", "incorporated by reference 经援引并入"], "example_en": "The detailed specifications are set out in Schedule 1, which forms an integral part of this agreement.", "example_zh": "详细规格载于附件一，该附件构成本协议不可分割的组成部分。", "note": "附件须写明\"构成合同组成部分\"方与正文同等效力。英美合同 schedule/annex/exhibit/appendix 混用，宜在合同中统一定义。法律义\"附件\"区别于普通义\"日程\"。", "status": "待审校"}, {"word": "retention of title", "ipa": null, "pos": "n.", "zh_legal": "所有权保留", "zh_plain": null, "domain": "商事协议-买卖", "level": 3, "source": "民法典第641条（对照）", "collocations": ["缩写 ROT", "title retention clause 所有权保留条款", "Romalpa clause（英国判例名）", "until full payment 至价款付清"], "example_en": "Title to the goods shall not pass to the buyer until the purchase price has been paid in full.", "example_zh": "在价款全部付清前，货物所有权不转移给买方。", "note": "卖方的价金担保工具：交付但不转移所有权，买方违约可取回。中国法下所有权保留对抗第三人须登记（民法典担保解释、动产融资统一登记）。", "status": "待审校"}, {"word": "passing of risk", "ipa": null, "pos": "n.", "zh_legal": "风险转移；风险负担", "zh_plain": null, "domain": "商事协议-买卖", "level": 3, "source": "民法典第604条（对照）", "collocations": ["risk passes on delivery 交付时风险转移", "Incoterms 国际贸易术语", "FOB / CIF 离岸价/到岸价"], "example_en": "Unless otherwise agreed, the risk of loss or damage to the goods passes to the buyer upon delivery.", "example_zh": "除另有约定外，标的物毁损灭失的风险自交付时起转移给买方。", "note": "中国法采\"交付主义\"（风险随交付转移），区别于所有权转移。国际货物买卖由 Incoterms（FOB、CIF、DDP 等）界定具体风险转移点。", "status": "待审校"}, {"word": "inspection and acceptance", "ipa": null, "pos": "n.", "zh_legal": "检验与验收", "zh_plain": null, "domain": "商事协议-买卖", "level": 2, "source": "民法典第620-622条（对照）", "collocations": ["inspection period 检验期间", "notify of non-conformity 通知不符", "deemed acceptance 视为验收"], "example_en": "The buyer shall inspect the goods within the inspection period and notify the seller of any non-conformity.", "example_zh": "买方应在检验期间内检验货物，并就任何不符情形通知卖方。", "note": "买方怠于检验/通知的后果：超过检验期或合理期限未通知，视为质量符合约定（民法典第621条）。验收标准与期间是质量纠纷的关键约定。", "status": "待审校"}, {"word": "non-conformity", "ipa": null, "pos": "n.", "zh_legal": "（货物/履行）不符；不符合约定", "zh_plain": null, "domain": "商事协议-买卖", "level": 3, "source": "联合国货物销售合同公约（CISG）、民法典", "collocations": ["non-conforming goods 不符货物", "defect 瑕疵", "fundamental breach 根本违约"], "example_en": "Where the goods delivered do not conform to the contract, the buyer may require repair, replacement or a price reduction.", "example_zh": "交付货物不符合合同的，买方可要求修理、更换或减价。", "note": "CISG 与中国法的核心概念。不符的救济阶梯：修理/更换/减价/损害赔偿，根本违约（fundamental breach）方可解除合同。", "status": "待审校"}, {"word": "purchase order", "ipa": null, "pos": "n.", "zh_legal": "采购订单", "zh_plain": null, "domain": "商事协议-买卖", "level": 2, "source": "交易实务", "collocations": ["缩写 PO", "framework / master agreement 框架/主合同", "order confirmation 订单确认", "battle of the forms 格式之争"], "example_en": "Each purchase order issued under the framework agreement shall constitute a separate contract upon acceptance.", "example_zh": "框架协议项下签发的每份采购订单经接受即构成单独合同。", "note": "框架协议+订单模式下，订单是要约还是承诺、双方格式条款冲突如何处理（格式之争 battle of the forms）是实务难点。", "status": "待审校"}, {"word": "drawdown", "ipa": "/ˈdrɔːdaʊn/", "pos": "n.", "zh_legal": "提款；提取（贷款）", "zh_plain": null, "domain": "商事协议-借款担保", "level": 3, "source": "贷款实务", "collocations": ["drawdown notice 提款通知", "availability period 可用期", "conditions precedent to drawdown 提款先决条件"], "example_en": "The borrower may make a drawdown under the facility by delivering a drawdown notice three business days in advance.", "example_zh": "借款人可提前三个工作日递交提款通知，在授信项下提款。", "note": "贷款协议术语：facility（授信额度）下分次 drawdown（提款）。每次提款常附先决条件（CP）。区别既有 loan 概念，此为放款执行环节。", "status": "待审校"}, {"word": "repayment", "ipa": "/rɪˈpeɪmənt/", "pos": "n.", "zh_legal": "还款；偿还", "zh_plain": null, "domain": "商事协议-借款担保", "level": 2, "source": "贷款实务", "collocations": ["repayment schedule 还款计划", "bullet repayment 到期一次性还本", "amortization 分期摊还", "installment 分期"], "example_en": "The principal shall be repaid in equal quarterly installments over the term of the loan, together with accrued interest.", "example_zh": "本金应在贷款期限内按季等额分期偿还，并附应计利息。", "note": "还款结构：bullet（到期一次还本）、amortizing（分期摊还）、balloon（小额分期+大额尾款）。提前还款（prepayment）常附补偿金。", "status": "待审校"}, {"word": "event of default", "ipa": null, "pos": "n.", "zh_legal": "违约事件", "zh_plain": null, "domain": "商事协议-借款担保", "level": 3, "source": "贷款实务", "collocations": ["缩写 EOD", "cross-default 交叉违约", "grace / cure period 宽限/补救期", "default interest 违约利息/罚息"], "example_en": "The occurrence of an event of default entitles the lender to accelerate the loan and demand immediate repayment.", "example_zh": "违约事件发生时，贷款人有权宣布贷款加速到期并要求立即偿还。", "note": "贷款协议列举触发加速到期的情形：逾期、违反承诺、交叉违约（其他债务违约）、破产、控制权变更等。交叉违约条款使一处违约引发连锁加速。", "status": "待审校"}, {"word": "acceleration", "ipa": "/əkˌseləˈreɪʃn/", "pos": "n.", "zh_legal": "（债务）加速到期", "zh_plain": "普通义：加速", "domain": "商事协议-借款担保", "level": 3, "source": "贷款实务", "collocations": ["acceleration clause 加速到期条款", "accelerate the loan 宣布贷款提前到期", "declare all sums immediately due and payable 宣布全部款项立即到期应付"], "example_en": "Following an event of default, the lender accelerated the loan, making all outstanding amounts immediately due and payable.", "example_zh": "违约事件发生后，贷款人宣布贷款加速到期，全部未偿款项立即到期应付。", "note": "贷款人对违约的核心救济：未到期债务提前全部到期。中国法下加速到期条款有效，但需注意金融借款合同司法解释对违约金/罚息上限的限制。", "status": "待审校"}, {"word": "prepayment", "ipa": "/ˌpriːˈpeɪmənt/", "pos": "n.", "zh_legal": "提前还款；提前偿付", "zh_plain": "普通义：预付", "domain": "商事协议-借款担保", "level": 3, "source": "贷款实务", "collocations": ["voluntary / mandatory prepayment 自愿/强制提前还款", "prepayment penalty / fee 提前还款补偿金", "make-whole 补足赔偿"], "example_en": "The borrower may make voluntary prepayment in whole or in part, subject to a prepayment fee.", "example_zh": "借款人可全部或部分自愿提前还款，但须支付提前还款补偿金。", "note": "提前还款补偿贷款人的利息损失（make-whole）。强制提前还款常由资产处置、控制权变更等触发。", "status": "待审校"}, {"word": "collateral", "ipa": "/kəˈlætərəl/", "pos": "n./adj.", "zh_legal": "担保物；抵押品；附属的", "zh_plain": "普通义：附带的（collateral damage 附带损害）", "domain": "商事协议-借款担保", "level": 2, "source": "担保实务", "collocations": ["pledge collateral 提供担保物", "collateral value 担保物价值", "margin call 追加保证金", "haircut 折扣率"], "example_en": "The borrower granted a security interest over its inventory and receivables as collateral for the loan.", "example_zh": "借款人就其存货和应收账款设立担保权益，作为贷款的担保物。", "note": "泛指为债务提供的担保财产（区别既有 pledge/mortgage 具体担保方式）。担保物价值波动触发追加（margin call）；折价评估称 haircut。", "status": "待审校"}, {"word": "surety", "ipa": "/ˈʃʊərəti/", "pos": "n.", "zh_legal": "保证人；保证", "zh_plain": null, "domain": "商事协议-借款担保", "level": 3, "source": "民法典担保制度（对照）", "collocations": ["suretyship 保证（关系）", "joint and several surety 连带责任保证", "general / ordinary surety 一般保证", "right of recourse 追偿权"], "example_en": "As surety, the parent company undertook to pay the debt if the borrower failed to perform.", "example_zh": "作为保证人，母公司承诺在借款人不履行时代为清偿债务。", "note": "中国法两类：一般保证（享先诉抗辩权）与连带责任保证。民法典第686条变更默认规则：约定不明推定为一般保证（旧法推定连带）——重大实务变化。保证人清偿后享追偿权。", "status": "待审校"}, {"word": "lessor", "ipa": "/leˈsɔː/", "pos": "n.", "zh_legal": "出租人", "zh_plain": null, "domain": "商事协议-租赁", "level": 2, "source": "民法典合同编租赁（对照）", "collocations": ["lessee 承租人", "landlord / tenant（不动产租赁）房东/租客", "lease term 租赁期限"], "example_en": "The lessor shall deliver the leased property to the lessee in a condition fit for the agreed use.", "example_zh": "出租人应将租赁物按约定用途适用的状态交付承租人。", "note": "lessor（出租人）/lessee（承租人）是租赁合同标准称谓；不动产口语称 landlord/tenant。融资租赁中三方：出租人、承租人、出卖人。租赁期限不得超过20年（民法典第705条）。", "status": "待审校"}, {"word": "lessee", "ipa": "/leˈsiː/", "pos": "n.", "zh_legal": "承租人", "zh_plain": null, "domain": "商事协议-租赁", "level": 2, "source": "民法典合同编租赁（对照）", "collocations": ["quiet enjoyment 安静占有/不受干扰使用", "right of first refusal to lease 优先承租权", "sublease 转租"], "example_en": "The lessee shall use the leased property in accordance with the agreed method and pay rent on time.", "example_zh": "承租人应按约定方法使用租赁物并按时支付租金。", "note": "承租人核心权利：买卖不破租赁（民法典第725条，租赁物所有权变动不影响租赁）、优先购买权、装饰装修物处理。区别既有 right of first refusal（一般优先购买权）。", "status": "待审校"}, {"word": "sublease", "ipa": "/ˌsʌbˈliːs/", "pos": "n./v.", "zh_legal": "转租；转租赁", "zh_plain": null, "domain": "商事协议-租赁", "level": 3, "source": "民法典第716条（对照）", "collocations": ["sublet v. 转租", "with the lessor's consent 经出租人同意", "head lease 主租赁"], "example_en": "The lessee may sublease the property to a third party only with the prior consent of the lessor.", "example_zh": "承租人须经出租人事先同意，方可将租赁物转租给第三人。", "note": "未经同意转租，出租人可解除合同（民法典第716条）。转租期限不得超过主租赁剩余期限。次承租人（subtenant）的权利来源于承租人。", "status": "待审校"}, {"word": "security deposit", "ipa": null, "pos": "n.", "zh_legal": "押金；保证金", "zh_plain": null, "domain": "商事协议-租赁", "level": 2, "source": "租赁实务", "collocations": ["refundable deposit 可退还押金", "deduct from the deposit 从押金中扣除", "rental deposit 租赁保证金"], "example_en": "The lessee shall pay a security deposit equal to two months' rent, refundable upon expiry less any deductions.", "example_zh": "承租人应支付相当于两个月租金的押金，到期返还但扣除应扣款项。", "note": "押金的性质（违约金担保 vs 损害赔偿预扣）影响返还规则。区别既有 deposit（定金，民法典定金罚则）——押金原则上应返还，定金适用罚则。", "status": "待审校"}, {"word": "licensor", "ipa": "/ˈlaɪsənsɔː/", "pos": "n.", "zh_legal": "许可人；授权方", "zh_plain": null, "domain": "商事协议-许可", "level": 3, "source": "知识产权许可实务", "collocations": ["licensee 被许可人", "grant a license 授予许可", "exclusive / sole / non-exclusive license 独占/排他/普通许可"], "example_en": "The licensor grants the licensee a non-exclusive license to use the patented technology within the territory.", "example_zh": "许可人授予被许可人在区域内使用该专利技术的普通许可。", "note": "三种许可强度：独占（exclusive，连许可人自己都不能用）、排他（sole，许可人可用但不得再许可他人）、普通（non-exclusive）。中文\"排他\"易与\"独占\"混淆，须看英文界定。", "status": "待审校"}, {"word": "licensee", "ipa": "/ˌlaɪsənˈsiː/", "pos": "n.", "zh_legal": "被许可人；获许可方", "zh_plain": null, "domain": "商事协议-许可", "level": 3, "source": "知识产权许可实务", "collocations": ["field of use 使用领域", "improvements 改进成果", "grant-back 回授"], "example_en": "The licensee shall not use the licensed marks outside the agreed field of use.", "example_zh": "被许可人不得在约定使用领域之外使用被许可商标。", "note": "谈判焦点：使用领域/地域限制、改进成果归属与回授（grant-back）、再许可权（sublicense）。回授条款须注意反垄断（技术进出口与垄断协议规制）。", "status": "待审校"}, {"word": "royalty", "ipa": "/ˈrɔɪəlti/", "pos": "n.", "zh_legal": "许可使用费；特许权使用费；提成", "zh_plain": "普通义：王室、版税", "domain": "商事协议-许可", "level": 3, "source": "知识产权许可实务", "collocations": ["running royalty 按销售提成", "lump-sum / upfront fee 一次性/入门费", "minimum royalty 最低许可费", "royalty rate 提成费率"], "example_en": "The licensee shall pay a running royalty of 5% of net sales of the licensed products.", "example_zh": "被许可人应按被许可产品净销售额的5%支付提成许可费。", "note": "计费方式：一次性总付、入门费+提成、最低许可费（保底）。跨境支付涉及预提所得税（withholding tax）与转让定价。第二义\"版税\"。", "status": "待审校"}, {"word": "non-disclosure agreement", "ipa": null, "pos": "n.", "zh_legal": "保密协议", "zh_plain": null, "domain": "商事协议-保密竞业", "level": 1, "source": "交易实务", "collocations": ["缩写 NDA", "confidentiality agreement 保密协议（同义）", "mutual / one-way NDA 双向/单向保密协议", "permitted disclosure 允许披露"], "example_en": "Before commencing due diligence, the parties signed a mutual non-disclosure agreement.", "example_zh": "在开始尽职调查前，双方签署了双向保密协议。", "note": "交易第一份文件。要点：保密信息定义、除外情形（已公开/独立开发/法定披露）、保密期限、违约救济（约定违约金+禁令）。区别既有 confidentiality（保密义务概念）。", "status": "待审校"}, {"word": "confidential information", "ipa": null, "pos": "n.", "zh_legal": "保密信息", "zh_plain": null, "domain": "商事协议-保密竞业", "level": 2, "source": "交易实务", "collocations": ["proprietary information 专有信息", "marked as confidential 标注为保密", "need-to-know basis 按需知悉原则", "residual knowledge 残留记忆"], "example_en": "The receiving party shall keep all confidential information strictly confidential and use it solely for the permitted purpose.", "example_zh": "接收方应对所有保密信息严格保密，并仅为约定目的使用。", "note": "定义方式：标注式（须标 confidential）vs 概括式（凡涉密即受保护）各有优劣。残留记忆条款（residual clause）允许使用记在脑中的信息——对披露方风险大，审查重点。", "status": "待审校"}, {"word": "non-solicitation", "ipa": null, "pos": "n.", "zh_legal": "禁止招揽（条款）", "zh_plain": null, "domain": "商事协议-保密竞业", "level": 3, "source": "交易实务", "collocations": ["no-poaching 禁止挖角", "solicit employees / customers 招揽员工/客户", "restrictive covenants 限制性条款"], "example_en": "For two years after termination, the executive shall not solicit any employee or customer of the company.", "example_zh": "离职后两年内，该高管不得招揽公司的任何员工或客户。", "note": "比竞业禁止（non-compete）限制更窄、更易获法院支持（不禁止从业，只禁止挖人/抢客）。员工互不挖角协议（no-poaching）可能触及反垄断。区别既有 non-compete。", "status": "待审校"}, {"word": "scope of services", "ipa": null, "pos": "n.", "zh_legal": "服务范围；工作范围", "zh_plain": null, "domain": "商事协议-服务", "level": 2, "source": "服务合同实务", "collocations": ["statement of work (SOW) 工作说明书", "out of scope 范围外", "change request 变更请求"], "example_en": "The scope of services is set out in the statement of work, and any additional work shall be subject to a change request.", "example_zh": "服务范围载于工作说明书，任何额外工作须经变更请求处理。", "note": "服务/外包/咨询合同的核心。范围模糊导致\"范围蔓延\"（scope creep）纠纷；范围外工作的计价机制（change request/order）须预先约定。", "status": "待审校"}, {"word": "deliverables", "ipa": null, "pos": "n.", "zh_legal": "交付成果；交付物", "zh_plain": null, "domain": "商事协议-服务", "level": 3, "source": "服务合同实务", "collocations": ["acceptance criteria 验收标准", "milestone 里程碑", "work product 工作成果", "IP ownership of deliverables 成果知识产权归属"], "example_en": "Each deliverable shall be deemed accepted unless the client gives notice of rejection within ten business days.", "example_zh": "除非客户在十个工作日内发出拒收通知，否则各项交付物视为验收通过。", "note": "服务合同的产出物。三大约定要点：验收标准与机制、付款与里程碑挂钩、成果知识产权归属（work made for hire / 委托作品归属）。", "status": "待审校"}, {"word": "service level agreement", "ipa": null, "pos": "n.", "zh_legal": "服务水平协议", "zh_plain": null, "domain": "商事协议-服务", "level": 3, "source": "服务合同实务（IT/外包）", "collocations": ["缩写 SLA", "uptime / availability 可用率", "service credits 服务赔偿/服务积分", "KPI 关键绩效指标"], "example_en": "If the service provider fails to meet the agreed uptime under the SLA, the client is entitled to service credits.", "example_zh": "服务商未达到SLA约定的可用率的，客户有权获得服务赔偿。", "note": "量化服务质量（如99.9%可用率）并将违反与赔偿（service credits 通常是费用减免而非现金）挂钩。service credits 是否为唯一救济（sole remedy）是谈判点。", "status": "待审校"}, {"word": "probation period", "ipa": null, "pos": "n.", "zh_legal": "试用期", "zh_plain": null, "domain": "商事协议-劳动", "level": 2, "source": "劳动合同法第19-21条（对照）", "collocations": ["probationary employee 试用期员工", "termination during probation 试用期解除", "unfit for the position 不符合录用条件"], "example_en": "During the probation period, the employer may terminate the contract if the employee is proven unfit for the position.", "example_zh": "试用期内，被证明不符合录用条件的，用人单位可解除劳动合同。", "note": "中国法强制限制：试用期长度与合同期限挂钩（最长6个月）、只能约定一次、试用期工资不低于转正80%且不低于最低工资。约定超期违法须赔偿。", "status": "待审校"}, {"word": "severance pay", "ipa": null, "pos": "n.", "zh_legal": "经济补偿（金）；遣散费", "zh_plain": null, "domain": "商事协议-劳动", "level": 3, "source": "劳动合同法第46-47条（对照）", "collocations": ["economic compensation 经济补偿", "N / N+1 / 2N（补偿计算俗称）", "garden leave 带薪休假式离职"], "example_en": "Upon termination of the employment contract by the employer without cause, the employee is entitled to severance pay.", "example_zh": "用人单位无过失性辞退劳动者的，劳动者有权获得经济补偿。", "note": "中国法\"N\"=工作年限×月均工资；违法解除按2N赔偿金；代通知金为额外1个月（俗称N+1）。封顶：月工资超当地社平3倍的，按3倍封顶且年限最多12年。", "status": "待审校"}, {"word": "indemnity", "ipa": "/ɪnˈdemnəti/", "pos": "n.", "zh_legal": "（特别）赔偿；补偿承诺", "zh_plain": null, "domain": "商事协议-通用条款", "level": 3, "source": "交易实务", "collocations": ["specific indemnity 特别赔偿", "indemnify and hold harmless 赔偿并使免受损害", "indemnifying / indemnified party 赔偿方/被赔偿方"], "example_en": "The seller shall provide a specific indemnity against any tax liability arising before the closing date.", "example_zh": "卖方应就交割日前产生的任何税务责任提供特别赔偿。", "note": "indemnity（赔偿承诺）与违反陈保的损害赔偿不同：通常\"一对一\"足额补偿、无需证明违约、不受减损规则限制。尽调发现的特定风险常以 specific indemnity 处理。区别既有动词 indemnify。", "status": "待审校"}]}, {"id": "cizu", "name": "法律英语常用词组词库", "short": "常用词组", "words": [{"word": "aggrieved party", "ipa": null, "pos": "phrase", "zh_legal": "受损害方；受害方", "zh_plain": null, "domain": "词组-当事人称谓", "level": 2, "source": "合同与诉讼实务", "collocations": ["the aggrieved party may claim damages 受损害方可主张赔偿", "injured party 受害方", "affected party 受影响方"], "example_en": "Upon a breach, the aggrieved party may terminate the contract and claim damages.", "example_zh": "一方违约时，受损害方可解除合同并主张损害赔偿。", "note": "合同语境指因对方违约而受损的守约方；广义也指权利受侵害者。近义：injured party、innocent party（无过错方）。", "status": "待审校"}, {"word": "prevailing party", "ipa": null, "pos": "phrase", "zh_legal": "胜诉方；胜方", "zh_plain": null, "domain": "词组-当事人称谓", "level": 3, "source": "诉讼与合同实务", "collocations": ["prevailing party clause 胜诉方（律师费）条款", "attorney's fees to the prevailing party 律师费由败诉方承担", "losing party 败诉方"], "example_en": "The prevailing party in any dispute shall be entitled to recover its reasonable attorney's fees from the other party.", "example_zh": "任何争议中的胜诉方有权向对方追偿其合理律师费。", "note": "美式合同常见的\"胜诉方律师费条款\"（fee-shifting），使败诉方负担胜方律师费——在中国诉讼（律师费一般各自承担）中通过合同约定转付，可获法院支持。", "status": "待审校"}, {"word": "defaulting party", "ipa": null, "pos": "phrase", "zh_legal": "违约方", "zh_plain": null, "domain": "词组-当事人称谓", "level": 2, "source": "合同实务", "collocations": ["non-defaulting party 守约方/非违约方", "party in breach 违约方", "cure the default 补救违约"], "example_en": "The non-defaulting party may terminate the agreement if the defaulting party fails to cure within the cure period.", "example_zh": "违约方未在补救期内补正的，守约方可终止协议。", "note": "与 non-defaulting party（守约方）成对使用。近义 party in breach。注意中国法\"违约方解除权\"的有限承认（合同僵局，民法典第580条）。", "status": "待审校"}, {"word": "third-party beneficiary", "ipa": null, "pos": "phrase", "zh_legal": "第三方受益人", "zh_plain": null, "domain": "词组-当事人称谓", "level": 3, "source": "合同实务（对照民法典第522条）", "collocations": ["contract for the benefit of a third party 利他合同/向第三人履行的合同", "privity of contract 合同相对性", "enforce the contract 主张合同权利"], "example_en": "A third-party beneficiary may, under certain conditions, directly enforce a contractual promise made for its benefit.", "example_zh": "在特定条件下，第三方受益人可直接主张为其利益作出的合同承诺。", "note": "突破合同相对性（privity）的制度。中国民法典第522条第2款赋予真正利他合同中第三人直接请求权——这是相对法律变化的重要进步。", "status": "待审校"}, {"word": "subject to", "ipa": null, "pos": "phrase", "zh_legal": "以……为准；受……约束；须经……", "zh_plain": "普通义：易于……的；可能遭受……的", "domain": "词组-合同套语", "level": 1, "source": "合同起草实务", "collocations": ["subject to contract 以正式合同为准", "subject to the terms hereof 受本协议条款约束", "subject to approval 须经批准"], "example_en": "The transaction is subject to obtaining all necessary regulatory approvals.", "example_zh": "本交易以取得全部必要的监管批准为前提。", "note": "法律英语万能限定语，三义需按语境辨析：以……为条件/前提、受……约束、须经……。subject to contract 是排除约束力的关键短语（谈判文件防止过早成约）。", "status": "待审校"}, {"word": "notwithstanding", "ipa": "/ˌnɒtwɪθˈstændɪŋ/", "pos": "prep./adv.", "zh_legal": "尽管；即使有；不受……限制", "zh_plain": null, "domain": "词组-合同套语", "level": 2, "source": "合同起草实务", "collocations": ["notwithstanding anything to the contrary 尽管有任何 nce clause 时间要素条款", "strict compliance with deadlines 严格遵守期限", "of the essence 至关重要的"], "example_en": "Time is of the essence in respect of the delivery dates under this agreement.", "example_zh": "就本协议项下的交付日期而言，时间为合同之要素。", "note": "英美法关键效果：约定\"time is of the essence\"后，任何迟延即构成可解除合同的根本违约（否则迟延通常只生赔偿）。中文宜译\"期限为合同的实质条款\"而非字面\"时间是本质\"。", "status": "待审校"}, {"word": "as the case may be", "ipa": null, "pos": "phrase", "zh_legal": "视具体情况而定；视情形", "zh_plain": null, "domain": "词组-合同套语", "level": 3, "source": "合同起草实务", "collocations": ["缩写 ACMB", "whichever is applicable 以适用者为准", "respectively 分别地"], "example_en": "The notice shall be delivered to the Seller or the Buyer, as the case may be, at the address set out below.", "example_zh": "通知应视情况送达卖方或买方，地址如下。", "note": "用于前文列举多种情形、此处按实际对应其一时。与 respectively（分别对应）配合处理一对多/多对多的指代。", "status": "待审校"}, {"word": "with effect from", "ipa": null, "pos": "phrase", "zh_legal": "自……起生效", "zh_plain": null, "domain": "词组-合同套语", "level": 2, "source": "合同起草实务", "collocations": ["缩写 WEF", "with immediate effect 立即生效", "retrospective / retroactive effect 追溯效力"], "example_en": "This amendment shall take effect with effect from 1 January 2026.", "example_zh": "本修订自2026年1月1日起生效。", "note": "约定生效时点的标准短语。可约定追溯生效（with retrospective effect），但对第三人权利与强制性规定的追溯受限。", "status": "待审校"}, {"word": "to the extent that", "ipa": null, "pos": "phrase", "zh_legal": "在……的范围内；以……为限", "zh_plain": null, "domain": "词组-合同套语", "level": 2, "source": "合同起草实务", "collocations": ["only to the extent 仅以……为限", "to the extent permitted by law 在法律允许的范围内", "insofar as 就……而言"], "example_en": "The seller shall be liable only to the extent that the loss results from its own breach.", "example_zh": "卖方仅在损失因其自身违约所致的范围内承担责任。", "note": "用于按比例/按程度限定，区别于 if（全有全无）。\"to the extent\"引入的是程度性限定，常用于责任范围、赔偿计算。", "status": "待审校"}, {"word": "mutatis mutandis", "ipa": null, "pos": "Latin", "zh_legal": "在作必要的修改后（比照适用）", "zh_plain": null, "domain": "词组-拉丁短语", "level": 4, "source": "拉丁法律短语", "collocations": <script>
"use strict";

/* ============ FSRS-5 调度引擎 ============ */
const W = [0.40255,1.18385,3.173,15.69105,7.1949,0.5345,1.4604,0.0046,1.54575,0.1192,1.01925,1.9395,0.11,0.29605,2.2698,0.2315,2.9898,0.51655,0.6621];
const DECAY = -0.5;
const FACTOR = Math.pow(0.9, 1 / DECAY) - 1; // = 19/81
const RETENTION = 0.9;

function clampD(d) { return Math.min(10, Math.max(1, d)); }
function initDifficulty(g) { return clampD(W[4] - Math.exp(W[5] * (g - 1)) + 1); }
function initStability(g) { return Math.max(0.1, W[g - 1]); }
function retrievability(elapsedDays, s) { return Math.pow(1 + FACTOR * elapsedDays / s, DECAY); }
function intervalDays(s) { return Math.max(1, Math.round(s / FACTOR * (Math.pow(RETENTION, 1 / DECAY) - 1))); }

function nextDifficulty(d, g) {
  const delta = -W[6] * (g - 3);
  const dp = d + delta * (10 - d) / 9;
  return clampD(W[7] * initDifficulty(4) + (1 - W[7]) * dp);
}
function stabilityOnSuccess(s, d, r, g) {
  const hard = g === 2 ? W[15] : 1;
  const easy = g === 4 ? W[16] : 1;
  return s * (1 + Math.exp(W[8]) * (11 - d) * Math.pow(s, -W[9]) * (Math.exp(W[10] * (1 - r)) - 1) * hard * easy);
}
function stabilityOnFail(s, d, r) {
  const sf = W[11] * Math.pow(d, -W[12]) * (Math.pow(s + 1, W[13]) - 1) * Math.exp(W[14] * (1 - r));
  return Math.max(0.1, Math.min(sf, s));
}
/* 对一张卡应用评分 g（1=不认识 2=模糊 3=认识 4=轻松，筛词用），返回新状态 */
function fsrsRate(card, g, todayStr) {
  let s, d;
  if (!card || !card.reps) {
    s = initStability(g);
    d = initDifficulty(g);
  } else {
    const elapsed = Math.max(0, daysBetween(card.last, todayStr));
    const r = retrievability(Math.max(elapsed, 0.05), card.s);
    d = nextDifficulty(card.d, g);
    s = g === 1 ? stabilityOnFail(card.s, card.d, r) : stabilityOnSuccess(card.s, card.d, r, g);
  }
  const ivl = g === 1 ? 0 : intervalDays(s);
  return {
    s: s, d: d,
    due: addDays(todayStr, ivl),
    reps: (card && card.reps || 0) + 1,
    lapses: (card && card.lapses || 0) + (g === 1 && card && card.reps ? 1 : 0),
    last: todayStr
  };
}
/* 评分按钮上显示的预测间隔 */
function previewInterval(card, g, todayStr) {
  const next = fsrsRate(card, g, todayStr);
  const ivl = daysBetween(todayStr, next.due);
  if (ivl <= 0) return "稍后重现";
  if (ivl < 30) return ivl + " 天后";
  if (ivl < 365) return Math.round(ivl / 30) + " 个月后";
  return (ivl / 365).toFixed(1) + " 年后";
}

/* ============ 日期工具 ============ */
function todayStr() {
  const d = new Date();
  return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
}
function addDays(dateStr, n) {
  const d = new Date(dateStr + "T00:00:00");
  d.setDate(d.getDate() + n);
  return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
}
function daysBetween(a, b) {
  return Math.round((new Date(b + "T00:00:00") - new Date(a + "T00:00:00")) / 864e5);
}

/* ============ 数据持久化 ============ */
const DB_KEY = "legalvocab_v1";
let DB = loadDB();
function loadDB() {
  try {
    const raw = localStorage.getItem(DB_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return { settings: { newPerDay: 10, books: { minfadian: true, gongsifa: true } }, cards: {}, log: {}, screened: {} };
}
let storageOk = true;
function saveDB() {
  try {
    localStorage.setItem(DB_KEY, JSON.stringify(DB));
  } catch (e) {
    if (storageOk) { storageOk = false; showBanner("⚠ 浏览器禁用了本地存储，本次学习进度关闭页面后不会保存。建议用 Edge 或 Chrome 直接打开本文件，并允许本地数据。", "#FAEEDA", "#854F0B"); }
  }
  if (cloudUser && !suppressPush) schedulePush();   // 已登录则自动上传（防抖）
}
function showBanner(msg, bg, color) {
  let d = document.getElementById("app-banner");
  if (!d) {
    d = document.createElement("div");

/* ============ 云同步（GitHub Gist 私密存储） ============ */
const GIST_FILE = "legalvocab_progress.json";
const GIST_DESC = "legalvocab-sync 法律英语背单词进度（勿删）";
const GH_API = "https://api.github.com";

let ghToken = localStorage.getItem("legalvocab_ghtoken") || "";
let ghGistId = localStorage.getItem("legalvocab_gistid") || "";
let cloudUser = null;           // 连接成功后为 { username: GitHub 登录名 }
let syncState = "idle";         // idle | syncing | ok | error
let syncMsg = "";
let lastSyncAt = localStorage.getItem("legalvocab_lastsync") || "";
let pushTimer = null;
let suppressPush = false;       // 同步期间本地保存不再触发上传，避免回环

function ghHeaders() {
  return { "Authorization": "token " + ghToken, "Accept": "application/vnd.github+json" };
}
async function ghFetch(path, options) {
  const url = path.indexOf("http") === 0 ? path : (GH_API + path);
  const res = await fetch(url, Object.assign({ headers: ghHeaders() }, options || {}));
  if (!res.ok) {
    let detail = "";
    try { const j = await res.json(); detail = j.message || ""; } catch (e) {}
    throw new Error("HTTP " + res.status + (detail ? "：" + detail : ""));
  }
  return res.json();
}

// 验证令牌并连接（粘贴令牌后调用）
async function cloudLogin(token) {
  ghToken = (token || "").trim();
  if (!ghToken) { alert("请粘贴 GitHub 访问令牌"); return; }
  syncState = "syncing"; syncMsg = "连接中…"; if (view === "home") renderHome();
  try {
    const me = await ghFetch("/user");           // 验证令牌、取登录名
    cloudUser = { username: me.login };
    localStorage.setItem("legalvocab_ghtoken", ghToken);
    await cloudSync();
  } catch (e) {
    syncState = "error"; syncMsg = "连接失败：" + (e.message || e);
    ghToken = "";
    alert("连接失败：" + (e.message || e) + "\n\n请确认令牌粘贴完整、未过期，且勾选了 gist 权限。");
    if (view === "home") renderHome();
  }
}

function cloudLogout() {
  cloudUser = null; ghToken = "";
  localStorage.removeItem("legalvocab_ghtoken");
  syncState = "idle"; syncMsg = ""; if (view === "home") renderHome();
}

function cardNewer(a, b) {
  if (!b) return true;
  if (!a) return false;
  if ((a.last || "") !== (b.last || "")) return (a.last || "") > (b.last || "");
  return (a.reps || 0) > (b.reps || 0);
}

// 把远端进度合并进本地：每个词取“最近复习”的那张卡，screened 取并集，log 按当日总量取大者
function mergeRemote(r) {
  if (!r) return;
  const rc = r.cards || {};
  for (const w in rc) {
    if (!DB.cards[w] || cardNewer(rc[w], DB.cards[w])) DB.cards[w] = rc[w];
  }
  const rs = r.screened || {};
  for (const w in rs) if (rs[w]) DB.screened[w] = rs[w];
  const rl = r.log || {};
  for (const d in rl) {
    const lo = DB.log[d], re = rl[d];
    if (!lo || (re.reviews + re.news) > (lo.reviews + lo.news)) DB.log[d] = re;
  }
}

// 找到（或创建）存进度的私密 Gist
async function ensureGist() {
  if (ghGistId) {
    try { return await ghFetch("/gists/" + ghGistId); }
    catch (e) { ghGistId = ""; localStorage.removeItem("legalvocab_gistid"); }
  }
  const list = await ghFetch("/gists?per_page=100");
  const hit = (list || []).find(g => g.files && g.files[GIST_FILE]);
  if (hit) { ghGistId = hit.id; localStorage.setItem("legalvocab_gistid", ghGistId); return await ghFetch("/gists/" + ghGistId); }
  const files = {}; files[GIST_FILE] = { content: payloadStr() };
  const created = await ghFetch("/gists", { method: "POST", body: JSON.stringify({ description: GIST_DESC, public: false, files: files }) });
  ghGistId = created.id; localStorage.setItem("legalvocab_gistid", ghGistId);
  return created;
}

function payloadStr() {
  return JSON.stringify({ cards: DB.cards, log: DB.log, screened: DB.screened, updatedAt: Date.now() });
}

async function readGistPayload(gist) {
  const f = gist && gist.files && gist.files[GIST_FILE];
  if (!f) return null;
  let content = f.content;
  if (f.truncated && f.raw_url) {
    try { const r = await fetch(f.raw_url, { headers: ghHeaders() }); content = await r.text(); } catch (e) {}
  }
  try { return JSON.parse(content); } catch (e) { return null; }
}

async function writeGist() {
  const files = {}; files[GIST_FILE] = { content: payloadStr() };
  await ghFetch("/gists/" + ghGistId, { method: "PATCH", body: JSON.stringify({ files: files }) });
  lastSyncAt = new Date().toLocaleString();
  localStorage.setItem("legalvocab_lastsync", lastSyncAt);
}

// 完整同步：拉取 → 合并 → 回写（连接后、打开 App、点“立即同步”时调用）
async function cloudSync() {
  if (!cloudUser || !ghToken) return;
  syncState = "syncing"; syncMsg = "同步中…"; if (view === "home") renderHome();
  try {
    const gist = await ensureGist();
    const remote = await readGistPayload(gist);
    if (remote) {
      mergeRemote(remote);
      suppressPush = true; saveDB(); suppressPush = false;
    }
    await writeGist();
    syncState = "ok"; syncMsg = "已同步 · " + lastSyncAt;
  } catch (e) {
    syncState = "error"; syncMsg = "同步失败：" + (e.message || e);
  }
  if (view === "home") renderHome();
}

// 仅上传（评分后自动调用，防抖）
function schedulePush() {
  if (pushTimer) clearTimeout(pushTimer);
  pushTimer = setTimeout(cloudPushOnly, 2500);
}
async function cloudPushOnly() {
  if (!cloudUser || !ghToken) return;
  syncState = "syncing"; syncMsg = "上传中…"; if (view === "home") renderHome();
  try {
    if (!ghGistId) await ensureGist();
    await writeGist();
    syncState = "ok"; syncMsg = "已同步 · " + lastSyncAt;
  } catch (e) { syncState = "error"; syncMsg = "上传失败：" + (e.message || e); }
  if (view === "home") renderHome();
}

async function cloudInit() {
  if (!ghToken) return;
  try {
    const me = await ghFetch("/user");
    cloudUser = { username: me.login };
    await cloudSync();
  } catch (e) {
    syncState = "error"; syncMsg = "令牌已失效，请重新连接";
    if (view === "home") renderHome();
  }
}

/* ============ 词库访问 ============ */
function activeWords() {
  const out = [];
  for (const book of WORDBANK.books) {
    if (DB.settings.books[book.id] !== false) {
      for (const w of book.words) out.push(Object.assign({ _book: book.short }, w));
    }
  }
  return out;
}
function wordState(w) {
  const c = DB.cards[w.word];
  if (!c || !c.reps) return "new";
  return c.s >= 21 ? "master" : "learn";
}
const STATE_LABEL = { new: "未学", learn: "学习中", master: "已掌握" };
const STATE_CLS = { new: "st-new", learn: "st-learn", master: "st-master" };

/* ============ 统计 ============ */
function stats() {
  const t = todayStr();
  const words = activeWords();
  let due = 0, learn = 0, master = 0, fresh = 0;
  for (const w of words) {
    const st = wordState(w);
    if (st === "new") fresh++;
    else if (st === "master") master++;
    else learn++;
    const c = DB.cards[w.word];
    if (c && c.reps && c.due <= t) due++;
  }
  const newDone = (DB.log[t] && DB.log[t].news) || 0;
  const newLeft = Math.max(0, Math.min(DB.settings.newPerDay - newDone, fresh));
  return { due, learn, master, fresh, newLeft, total: words.length };
}
function streak() {
  let n = 0, d = todayStr();
  if (!DB.log[d] || DB.log[d].reviews + DB.log[d].news === 0) d = addDays(d, -1);
  while (DB.log[d] && DB.log[d].reviews + DB.log[d].news > 0) { n++; d = addDays(d, -1); }
  return n;
}

/* ============ 发音 ============ */
function speak(text) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "en-US";
  u.rate = 0.92;
  speechSynthesis.speak(u);
}

/* ---- 学习会话 ---- */
function startSession() {
  const t = todayStr();
  const words = activeWords();
  const byWord = {};
  for (const w of words) byWord[w.word] = w;
  // 到期复习，按到期日排序（逾期最久优先）
  const due = words
    .filter(w => { const c = DB.cards[w.word]; return c && c.reps && c.due <= t; })
    .sort((a, b) => DB.cards[a.word].due < DB.cards[b.word].due ? -1 : 1);
  // 新词配额
  const s = stats();
  const fresh = words.filter(w => wordState(w) === "new").slice(0, s.newLeft);
  const queue = due.concat(fresh);
  if (!queue.length) { render(); return; }
  session = { queue, idx: 0, answered: false, doneReview: 0, doneNew: 0, total: queue.length };
  view = "session";
  render();
}

function renderSession() {
  const w = session.queue[session.idx];
  if (!w) { view = "summary"; render(); return; }
  const c = DB.cards[w.word];
  const isNew = !c || !c.reps;

            <div class="kbd-hint">空格 = 显示答案</div>`;

        <button class="rate-hard" id="r2">模糊<span class="ivl">${previewInterval(c, 2, t)}</span></button>

  app.innerHTML = `<div class="card">${head}${body}</div>`;

  document.getElementById("speakBtn").onclick = () => speak(w.word);

    document.getElementById("show").onclick = () => { session.answered = true; render(); };
  } else {

function rate(g) {
  const w = session.queue[session.idx];
  const c = DB.cards[w.word];
  const wasNew = !c || !c.reps;
  const t = todayStr();
  DB.cards[w.word] = fsrsRate(c, g, t);
  if (wasNew) { logToday("news", 1); session.doneNew++; }
  else { logToday("reviews", 1); session.doneReview++; }
  if (g === 1) {
    // 没记住：从队列中后移几位，本次会话内重现
    const item = session.queue.splice(session.idx, 1)[0];
    const pos = Math.min(session.idx + 4, session.queue.length);
    session.queue.splice(pos, 0, item);
  } else {
    session.idx++;
  }
  session.answered = false;
  saveDB();
  render();
}

  document.getElementById("quit").onclick = () => { view = "home"; screenQueue = null; render(); };
  document.getElementById("speakBtn").onclick = () => speak(w.word);
  document.getElementById("k").onclick = () => {
    DB.cards[w.word] = fsrsRate(null, 4, todayStr());
    DB.screened[w.word] = 1; q.known++; q.idx++; saveDB(); render();
  };
  document.getElementById("dk").onclick = () => {
    DB.screened[w.word] = 1; q.unknown++; q.idx++; saveDB(); render();
  };
}

/* ---- 词库浏览 ---- */
function renderBrowse() {
  app.innerHTML = `
    <button class="back-link" id="back">← 返回首页</button>
    <input class="search" id="q" placeholder="搜索单词或中文释义…" value="${esc(browseQuery)}">
    <div class="chips" id="browse-chips"></div>
    <div class="card" id="browse-list" style="padding:6px 14px"></div>`;
  document.getElementById("back").onclick = () => { view = "home"; render(); };
  const qInput = document.getElementById("q");
  // 仅更新结果区，绝不重建输入框——避免输入时重渲染导致光标跳动/字符重复
  qInput.oninput = e => { browseQuery = e.target.value; browseOpen = null; renderBrowseResults(); };
  renderBrowseResults();
  qInput.focus();
  qInput.setSelectionRange(qInput.value.length, qInput.value.length);
}

function renderBrowseResults() {
  const t = todayStr();
  let words = activeWords();
  if (browseQuery) {
    const q = browseQuery.toLowerCase();
    words = words.filter(w => w.word.toLowerCase().includes(q) || (w.zh_legal || "").includes(browseQuery));
  }
  if (browseFilter !== "all") {
    if (browseFilter === "due") words = words.filter(w => { const c = DB.cards[w.word]; return c && c.reps && c.due <= t; });
    else words = words.filter(w => wordState(w) === browseFilter);
  }
  const chips = [["all", "全部"], ["new", "未学"], ["learn", "学习中"], ["master", "已掌握"], ["due", "今日到期"]]
    .map(([k, lbl]) => `<button class="chip ${browseFilter === k ? "active" : ""}" data-f="${k}">${lbl}</button>`).join("");
  const rows = words.map((w, i) => {
    const st = wordState(w);
    const c = DB.cards[w.word];
    const dueTxt = c && c.reps ? (c.due <= t ? "今日到期" : c.due + " 复习") : "";
    let html = `
      <div class="wordrow" data-i="${i}">
        <span><span class="w">${esc(w.word)}</span><span class="m">${esc(w.zh_legal)}</span></span>
        <span class="state-chip ${STATE_CLS[st]}" title="${dueTxt}">${STATE_LABEL[st]}</span>
      </div>`;
    if (browseOpen === w.word) {
      const colloc = (w.collocations || []).map(x => "· " + esc(x)).join("<br>");
      html += `
        <div class="wdetail">
          <div class="ipa">${esc(w.ipa || "")} ${w.pos ? "· " + esc(w.pos) : ""} · ${esc(w._book)} · L${w.level}</div>
          ${w.zh_plain ? `<div class="def-plain">⚠ ${esc(w.zh_plain)}</div>` : ""}
          ${colloc ? `<div class="colloc">${colloc}</div>` : ""}
          ${w.example_en ? `<div class="example">${esc(w.example_en)}</div>` : ""}
          ${w.example_zh ? `<div class="example-zh">${esc(w.example_zh)}</div>` : ""}
          ${w.note ? `<div class="note">💡 ${esc(w.note)}</div>` : ""}
          <div class="source">${esc(w.source || "")} ${dueTxt ? "· " + dueTxt : ""}</div>
        </div>`;
    }
    return html;
  }).join("");
  document.getElementById("browse-chips").innerHTML = chips;
  document.getElementById("browse-list").innerHTML = rows || '<p style="padding:14px 0;color:#888780;font-size:14px">没有符合条件的词条。</p>';
  for (const chip of app.querySelectorAll(".chip")) {
    chip.onclick = () => { browseFilter = chip.dataset.f; browseOpen = null; renderBrowseResults(); };
  }
  for (const row of app.querySelectorAll(".wordrow")) {
    row.onclick = () => {
      const w = words[parseInt(row.dataset.i)];
      browseOpen = browseOpen === w.word ? null : w.word;
      renderBrowseResults();
    };
  }
}

/* ============ 键盘快捷键 ============ */
document.addEventListener("keydown", e => {
  if (view !== "session" || !session) return;
  if (e.target.tagName === "INPUT") return;
  if (!session.answered && (e.key === " " || e.key === "Enter")) {
    e.preventDefault(); session.answered = true; render();
  } else if (session.answered && ["1", "2", "3"].includes(e.key)) {
    rate(parseInt(e.key));
  }
});

render();
cloudInit();   // 若已登录，打开即自动拉取/合并云端进度

/* ============ PWA：离线缓存（仅在 http/https 下生效） ============ */
if ("serviceWorker" in navigator && location.protocol.indexOf("http") === 0) {
  navigator.serviceWorker.register("sw.js").catch(() => {});
}
</script>
