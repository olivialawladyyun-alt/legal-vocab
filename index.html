 supervisors and senior managers shall assume the obligation of loyalty to the company and shall not exploit their authority to seek improper benefits.", "example_zh": "董事、监事、高级管理人员对公司负有忠实义务，不得利用职权牟取不正当利益。", "note": "英美公司法的 fiduciary duty 分为 duty of loyalty（忠实）与 duty of care（注意/勤勉）两支，与中国法忠实+勤勉的二分对应。", "status": "待审校"}, {"word": "obligation of diligence", "ipa": "/ˈdɪlɪdʒəns/", "pos": "n.", "zh_legal": "勤勉义务", "zh_plain": "diligence 普通义：勤奋", "domain": "公司法-治理", "level": 2, "source": "公司法第180条", "collocations": ["duty of care（英美惯用）", "due diligence 尽职调查"], "example_en": "Directors, supervisors and senior managers shall assume the obligation of diligence to the company and exercise reasonable care in performing their duties in the best interests of the company.", "example_zh": "董事、监事、高级管理人员对公司负有勤勉义务，执行职务应当为公司的最大利益尽到管理者通常应有的合理注意。", "note": "高频联想词 due diligence（尽职调查，简称 DD）：并购交易前对目标公司的全面调查。", "status": "待审校"}, {"word": "related-party transaction", "ipa": null, "pos": "n.", "zh_legal": "关联交易", "zh_plain": null, "domain": "公司法-治理", "level": 2, "source": "公司法第182条", "collocations": ["affiliated relationship 关联关系", "report to the board and abstain from voting 向董事会报告并回避表决"], "example_en": "Where a director enters into a transaction with the company directly or indirectly, the director shall report to the board and the transaction shall be approved by resolution.", "example_zh": "董事直接或者间接与本公司订立合同或者进行交易的，应当向董事会报告，并按照规定经决议通过。", "note": "abstain from voting 回避表决；self-dealing 自我交易。", "status": "待审校"}, {"word": "piercing the corporate veil", "ipa": "/ˈpɪəsɪŋ ðə ˈkɔːpərət veɪl/", "pos": "phrase", "zh_legal": "刺破公司面纱；法人人格否认", "zh_plain": null, "domain": "公司法-责任", "level": 3, "source": "公司法第23条", "collocations": ["disregard of corporate personality 公司人格否认", "abuse the independent status of the legal person 滥用法人独立地位"], "example_en": "Where a shareholder abuses the independent status of the company as a legal person and the limited liability of shareholders to evade debts and seriously damages the interests of creditors, the shareholder shall bear joint and several liability for the debts of the company.", "example_zh": "公司股东滥用公司法人独立地位和股东有限责任，逃避债务，严重损害公司债权人利益的，应当对公司债务承担连带责任。", "note": "2023修订扩展至横向否认（兄弟公司之间）。veil 即\"面纱\"，比喻股东与公司之间的责任隔离。", "status": "待审校"}, {"word": "derivative action", "ipa": "/dəˈrɪvətɪv ˈækʃn/", "pos": "n.", "zh_legal": "股东代表诉讼", "zh_plain": "derivative 金融义：衍生品", "domain": "公司法-责任", "level": 3, "source": "公司法第189条", "collocations": ["bring a derivative action in one's own name 以自己的名义提起代表诉讼", "for the benefit of the company 为公司利益"], "example_en": "Where the board of supervisors or the board of directors refuses to sue, qualified shareholders may bring an action in their own name for the benefit of the company.", "example_zh": "监事会或者董事会拒绝起诉的，符合条件的股东有权为了公司的利益以自己的名义直接向人民法院提起诉讼。", "note": "derivative 意为\"派生的\"——诉权派生自公司。与 direct action（股东直接诉讼）相区分。2023修订新增双重代表诉讼（全资子公司层面）。", "status": "待审校"}, {"word": "appraisal right", "ipa": "/əˈpreɪzl raɪt/", "pos": "n.", "zh_legal": "异议股东股份回购请求权", "zh_plain": "appraisal 普通义：评估", "domain": "公司法-股权股份", "level": 4, "source": "公司法第89、161条", "collocations": ["request the company to purchase the equity at a reasonable price 请求公司以合理价格收购股权", "dissenting shareholder 异议股东"], "example_en": "A shareholder who votes against the resolution on merger or division may request the company to purchase its equity at a reasonable price.", "example_zh": "对股东会合并、分立决议投反对票的股东，可以请求公司按照合理的价格收购其股权。", "note": "美国法称 appraisal right / dissenters' right。2023修订将其扩展适用于控股股东滥用权利的情形。", "status": "待审校"}, {"word": "share", "ipa": "/ʃeə/", "pos": "n.", "zh_legal": "股份", "zh_plain": "普通义：份额；分享", "domain": "公司法-股权股份", "level": 1, "source": "公司法第六章", "collocations": ["issuance of shares 股份发行", "par value / no-par-value shares 面额股/无面额股", "transfer of shares 股份转让"], "example_en": "The capital of a joint stock limited company is divided into shares, which may be par-value shares or no-par-value shares.", "example_zh": "股份有限公司的资本划分为股份。公司可以发行面额股，也可以发行无面额股。", "note": "无面额股为2023修订新增。share（英）/ stock（美）；shareholding 持股。", "status": "待审校"}, {"word": "issuance", "ipa": "/ˈɪʃuəns/", "pos": "n.", "zh_legal": "（股份、债券的）发行", "zh_plain": null, "domain": "公司法-股权股份", "level": 2, "source": "公司法第六章第一节", "collocations": ["issue shares at par value or at a premium 平价或溢价发行股份", "initial public offering (IPO) 首次公开发行", "private placement 非公开发行/定向增发"], "example_en": "Shares shall be issued under the principles of fairness and impartiality, and shares of the same class shall carry the same rights.", "example_zh": "股份的发行实行公平、公正的原则，同类别的每一股份应当具有同等权利。", "note": "动词 issue；issuer 发行人（证券法高频）。不得折价发行：shall not be issued below par value。", "status": "待审校"}, {"word": "share repurchase", "ipa": "/ˌriːˈpɜːtʃəs/", "pos": "n.", "zh_legal": "股份回购", "zh_plain": null, "domain": "公司法-股权股份", "level": 3, "source": "公司法第162条", "collocations": ["buy back its own shares 回购本公司股份", "treasury shares 库存股", "employee stock ownership plan (ESOP) 员工持股计划"], "example_en": "A company shall not acquire its own shares, except under statutory circumstances such as reducing the registered capital or using shares for employee stock ownership plans.", "example_zh": "公司不得收购本公司股份，但减少注册资本、将股份用于员工持股计划等法定情形除外。", "note": "buyback 为口语化同义词。", "status": "待审校"}, {"word": "corporate bond", "ipa": "/ˈkɔːpərət bɒnd/", "pos": "n.", "zh_legal": "公司债券", "zh_plain": "bond 普通义：纽带；粘合", "domain": "公司法-财务", "level": 2, "source": "公司法第九章", "collocations": ["issue corporate bonds 发行公司债券", "bondholder 债券持有人", "convertible bonds 可转换公司债券"], "example_en": "Corporate bonds are negotiable securities issued by a company according to statutory procedures, with principal and interest to be repaid within an agreed period.", "example_zh": "公司债券是公司依照法定程序发行、约定在一定期限还本付息的有价证券。", "note": "principal and interest 本息；maturity 到期日；default 违约（债券语境）。", "status": "待审校"}, {"word": "dividend", "ipa": "/ˈdɪvɪdend/", "pos": "n.", "zh_legal": "股利、红利", "zh_plain": null, "domain": "公司法-财务", "level": 1, "source": "公司法第210条（利润分配）", "collocations": ["distribute dividends 分配股利", "profit distribution 利润分配", "in proportion to the paid-in capital contributions 按实缴出资比例"], "example_en": "After making up losses and making allocations to the statutory reserve, the company shall distribute profits to shareholders in proportion to their paid-in capital contributions.", "example_zh": "公司弥补亏损和提取法定公积金后所余利润，按照股东实缴的出资比例分配。", "note": "2023修订：股东会作出分配决议后，董事会应当在六个月内完成分配。", "status": "待审校"}, {"word": "statutory reserve", "ipa": "/ˈstætʃətri rɪˈzɜːv/", "pos": "n.", "zh_legal": "法定公积金", "zh_plain": "reserve 普通义：储备；预订", "domain": "公司法-财务", "level": 3, "source": "公司法第210条", "collocations": ["allocate 10% of the profits to the statutory reserve 提取利润的10%列入法定公积金", "capital reserve 资本公积金"], "example_en": "When distributing the after-tax profits of the current year, the company shall allocate 10% of the profits to its statutory reserve.", "example_zh": "公司分配当年税后利润时，应当提取利润的百分之十列入公司法定公积金。", "note": "累计额达注册资本50%后可不再提取。", "status": "待审校"}, {"word": "merger", "ipa": "/ˈmɜːdʒə/", "pos": "n.", "zh_legal": "（公司）合并", "zh_plain": null, "domain": "公司法-变更与终止", "level": 1, "source": "公司法第十一章（第218条）", "collocations": ["merger by absorption 吸收合并", "merger by new establishment 新设合并", "mergers and acquisitions (M&A) 并购"], "example_en": "The merger of a company may take the form of merger by absorption or merger by new establishment; the surviving company shall succeed to the claims and debts of the merged parties.", "example_zh": "公司合并可以采取吸收合并或者新设合并。合并后存续的公司承继合并各方的债权、债务。", "note": "M&A 是涉外公司业务第一高频缩写。surviving company 存续公司。", "status": "待审校"}, {"word": "division", "ipa": "/dɪˈvɪʒn/", "pos": "n.", "zh_legal": "（公司）分立", "zh_plain": "普通义：分配、部门、除法", "domain": "公司法-变更与终止", "level": 2, "source": "公司法第223条", "collocations": ["the companies after division shall bear joint and several liability 分立后的公司承担连带责任", "spin-off 分拆（国际惯用）"], "example_en": "The debts of a company before its division shall be borne jointly and severally by the companies existing after the division, unless otherwise agreed with the creditors.", "example_zh": "公司分立前的债务由分立后的公司承担连带责任，但与债权人另有约定的除外。", "note": "国际交易文件中分立/分拆多用 spin-off、demerger 或 split-up。", "status": "待审校"}, {"word": "dissolution", "ipa": "/ˌdɪsəˈluːʃn/", "pos": "n.", "zh_legal": "（公司）解散", "zh_plain": "化学义：溶解", "domain": "公司法-变更与终止", "level": 2, "source": "公司法第十二章（第229条）", "collocations": ["the company is dissolved 公司解散", "grounds for dissolution 解散事由", "judicial dissolution 司法解散"], "example_en": "Where the company is unable to continue operations due to a deadlock in management, shareholders holding 10% or more of the voting rights may request a people's court to dissolve the company.", "example_zh": "公司经营管理发生严重困难，继续存续会使股东利益受到重大损失的，持有公司百分之十以上表决权的股东可以请求人民法院解散公司。", "note": "deadlock（公司僵局）为司法解散的核心事由。", "status": "待审校"}, {"word": "liquidation", "ipa": "/ˌlɪkwɪˈdeɪʃn/", "pos": "n.", "zh_legal": "清算", "zh_plain": "liquid 普通义：液体（词源：使资产\"流动/变现\"）", "domain": "公司法-变更与终止", "level": 1, "source": "公司法第232条", "collocations": ["liquidation group 清算组", "liquidation expenses 清算费用", "order of payment 清偿顺序"], "example_en": "After paying the liquidation expenses, employees' wages, social insurance premiums and taxes owed, the remaining assets shall be distributed to shareholders.", "example_zh": "公司财产在支付清算费用、职工工资、社会保险费用和所欠税款后，剩余财产分配给股东。", "note": "动词 liquidate 即\"变现清偿\"；winding up 为英式同义词。区分清算（liquidation）与注销（deregistration）。", "status": "待审校"}, {"word": "bankruptcy", "ipa": "/ˈbæŋkrʌptsi/", "pos": "n.", "zh_legal": "破产", "zh_plain": null, "domain": "公司法-变更与终止", "level": 1, "source": "公司法第237条（衔接企业破产法）", "collocations": ["file for bankruptcy 申请破产", "bankruptcy reorganization 破产重整", "insolvency 资不抵债/无力偿债"], "example_en": "Where the assets of the company are insufficient to pay off its debts in liquidation, the liquidation group shall apply to a people's court for a declaration of bankruptcy.", "example_zh": "清算中发现公司财产不足清偿债务的，清算组应当依法向人民法院申请宣告破产。", "note": "英式术语：公司破产用 insolvency / winding up，bankruptcy 仅指个人破产；美式则通用 bankruptcy（Chapter 11 重整 / Chapter 7 清算）。", "status": "待审校"}, {"word": "subsidiary", "ipa": "/səbˈsɪdiəri/", "pos": "n.", "zh_legal": "子公司", "zh_plain": "形容词义：辅助的", "domain": "公司法-设立与登记", "level": 1, "source": "公司法第13条", "collocations": ["wholly-owned subsidiary 全资子公司", "parent company 母公司", "branch 分公司"], "example_en": "A subsidiary has the status of a legal person and independently bears civil liability; a branch does not have legal person status and its civil liability is borne by the company.", "example_zh": "子公司具有法人资格，依法独立承担民事责任；分公司不具有法人资格，其民事责任由公司承担。", "note": "子公司（独立法人）与分公司（branch，非法人）的责任区别是涉外架构设计的基础考点。", "status": "待审校"}, {"word": "controlling shareholder", "ipa": null, "pos": "n.", "zh_legal": "控股股东", "zh_plain": null, "domain": "公司法-治理", "level": 2, "source": "公司法第265条", "collocations": ["actual controller 实际控制人", "de facto director 事实董事", "control 控制权"], "example_en": "A controlling shareholder or actual controller who instructs directors or senior managers to engage in acts damaging the interests of the company shall bear joint and several liability with them.", "example_zh": "公司的控股股东、实际控制人指示董事、高级管理人员从事损害公司利益行为的，与该董事、高级管理人员承担连带责任。", "note": "2023修订强化\"影子董事/事实董事\"规则。actual controller 实际控制人为中国法特色概念。", "status": "待审校"}, {"word": "listed company", "ipa": "/ˈlɪstɪd ˈkʌmpəni/", "pos": "n.", "zh_legal": "上市公司", "zh_plain": "list 普通义：清单", "domain": "公司法-股权股份", "level": 1, "source": "公司法第五章第五节", "collocations": ["be listed on the stock exchange 在证券交易所上市", "delisting 退市", "disclosure 信息披露"], "example_en": "A listed company shall disclose relevant information according to laws and administrative regulations.", "example_zh": "上市公司应当依照法律、行政法规的规定披露相关信息。", "note": "go public / IPO 上市；listing rules 上市规则。", "status": "待审校"}, {"word": "audit committee", "ipa": "/ˈɔːdɪt kəˈmɪti/", "pos": "n.", "zh_legal": "审计委员会", "zh_plain": null, "domain": "公司法-治理", "level": 3, "source": "公司法第69、121条", "collocations": ["the audit committee composed of directors 由董事组成的审计委员会", "replace the board of supervisors 替代监事会"], "example_en": "A company may, as prescribed by its articles of association, establish an audit committee composed of directors within the board to exercise the functions of the board of supervisors, instead of establishing a board of supervisors.", "example_zh": "公司可以按照公司章程的规定在董事会中设置由董事组成的审计委员会，行使监事会职权，不设监事会。", "note": "2023修订标志性改革：引入单层制（one-tier board）治理选项。", "status": "待审校"}, {"word": "business license", "ipa": "/ˈbɪznəs ˈlaɪsns/", "pos": "n.", "zh_legal": "营业执照", "zh_plain": null, "domain": "公司法-设立与登记", "level": 1, "source": "公司法第二章（第33条）", "collocations": ["the date of issuance of the business license 营业执照签发日期", "company registration authority 公司登记机关", "unified social credit code 统一社会信用代码"], "example_en": "The date of issuance of the business license of a company shall be the date of its establishment.", "example_zh": "公司营业执照签发日期为公司成立日期。", "note": "2023修订确认电子营业执照（electronic business license）与纸质执照同等效力。", "status": "待审校"}, {"word": "one-person company", "ipa": null, "pos": "n.", "zh_legal": "一人公司（一人有限责任公司）", "zh_plain": null, "domain": "公司法-设立与登记", "level": 3, "source": "公司法第42、60条", "collocations": ["a limited liability company with only one shareholder 只有一个股东的有限责任公司", "prove the company's assets are independent 证明公司财产独立"], "example_en": "If the shareholder of a one-person company cannot prove that the company's assets are independent from the shareholder's own assets, the shareholder shall bear joint and several liability for the debts of the company.", "example_zh": "一人公司的股东不能证明公司财产独立于股东自己的财产的，应当对公司债务承担连带责任。", "note": "举证责任倒置是一人公司人格否认的特殊规则。2023修订允许设立一人股份有限公司。", "status": "待审校"}, {"word": "fiduciary", "ipa": "/fɪˈdjuːʃəri/", "pos": "adj./n.", "zh_legal": "信义的；受信人", "zh_plain": null, "domain": "公司法-治理", "level": 4, "source": "对照公司法第180条（董监高义务的英美法源）", "collocations": ["fiduciary duty 信义义务", "fiduciary relationship 信义关系", "trustee 受托人"], "example_en": "Directors owe fiduciary duties to the company and must act in good faith in the best interests of the company.", "example_zh": "董事对公司负有信义义务，必须善意地为公司最佳利益行事。", "note": "拉丁词源 fiducia（信任）。英美公司法、信托法的基石概念，统摄 duty of loyalty 与 duty of care。", "status": "待审校"}, {"word": "promoter", "ipa": "/prəˈməʊtə/", "pos": "n.", "zh_legal": "发起人", "zh_plain": "普通义：推广者、促进者", "domain": "公司法-设立与登记", "level": 2, "source": "公司法第92-99条", "collocations": ["agreement of promoters 发起人协议", "establishment by means of promotion 发起设立", "establishment by means of share offer 募集设立"], "example_en": "A joint stock limited company shall have not less than 1 but not more than 200 promoters, who shall conclude an agreement of promoters and jointly draft the articles of association.", "example_zh": "设立股份有限公司，应当有一人以上二百人以下为发起人。发起人应当签订发起人协议，共同制定公司章程。", "note": "美国法对应概念 incorporator / promoter；发起人对设立行为承担连带责任。", "status": "待审校"}, {"word": "incorporate", "ipa": "/ɪnˈkɔːpəreɪt/", "pos": "v.", "zh_legal": "设立（公司）；注册成立", "zh_plain": "普通义：包含、并入", "domain": "公司法-设立与登记", "level": 1, "source": "公司法第二、三章（对照）", "collocations": ["incorporation 公司设立", "incorporated in Delaware 在特拉华州注册成立", "缩写 Inc."], "example_en": "The company was incorporated under the laws of the People's Republic of China with limited liability.", "example_zh": "本公司系依据中华人民共和国法律设立的有限责任公司。", "note": "合同主体条款标准表述：a company incorporated and existing under the laws of...（一家依据…法律设立并存续的公司）。", "status": "待审校"}, {"word": "business scope", "ipa": "/ˈbɪznəs skəʊp/", "pos": "n.", "zh_legal": "经营范围", "zh_plain": null, "domain": "公司法-设立与登记", "level": 1, "source": "公司法第9条", "collocations": ["within / beyond the business scope 经营范围内/外", "items subject to approval 须经批准的项目"], "example_en": "The business scope of a company shall be prescribed in its articles of association; items subject to approval according to law shall be approved before registration.", "example_zh": "公司的经营范围由公司章程规定。公司的经营范围中属于法律、行政法规规定须经批准的项目，应当依法经过批准。", "note": "中国登记制度特色概念；英美公司法的对应历史概念是 ultra vires（越权）原则，现已基本废弃。", "status": "待审校"}, {"word": "forfeiture", "ipa": "/ˈfɔːfɪtʃə/", "pos": "n.", "zh_legal": "（股东）失权", "zh_plain": null, "domain": "公司法-股权股份", "level": 3, "source": "公司法第52条", "collocations": ["notice of forfeiture 失权通知", "forfeit the equity 丧失股权", "grace period 宽限期"], "example_en": "Where a shareholder fails to pay the capital contribution within the grace period, the company may send a notice of forfeiture, and the shareholder shall forfeit the equity for which the contribution has not been paid.", "example_zh": "股东在宽限期内仍未缴纳出资的，公司可以发出失权通知，该股东丧失其未缴纳出资的股权。", "note": "2023修订新设制度。forfeit 动词（丧失/没收），刑事和海关语境 forfeiture 指财产没收。", "status": "待审校"}, {"word": "right to consult and copy", "ipa": null, "pos": "n.", "zh_legal": "（股东）查阅复制权；知情权", "zh_plain": null, "domain": "公司法-治理", "level": 2, "source": "公司法第57条", "collocations": ["consult and copy the articles of association, shareholders' register and board resolutions 查阅、复制公司章程、股东名册、决议", "consult the accounting books 查阅会计账簿"], "example_en": "Shareholders are entitled to consult and copy the articles of association, the shareholders' register, resolutions of meetings and financial and accounting reports of the company.", "example_zh": "股东有权查阅、复制公司章程、股东名册、会议决议、财务会计报告。", "note": "学理统称股东知情权（right to information / inspection rights）。2023修订扩展至会计凭证和全资子公司材料。", "status": "待审校"}, {"word": "trade union", "ipa": "/ˌtreɪd ˈjuːniən/", "pos": "n.", "zh_legal": "工会", "zh_plain": null, "domain": "公司法-治理", "level": 2, "source": "公司法第17条", "collocations": ["organize a trade union 组织工会", "collective contract 集体合同", "labor union（美式）"], "example_en": "The employees of a company shall organize a trade union according to the Trade Union Law to carry out trade union activities and safeguard the lawful rights and interests of the employees.", "example_zh": "公司职工依照《工会法》组织工会，开展工会活动，维护职工合法权益。", "note": "劳动法联动词汇：collective bargaining 集体协商、labor dispute 劳动争议。", "status": "待审校"}, {"word": "employees' congress", "ipa": null, "pos": "n.", "zh_legal": "职工代表大会", "zh_plain": null, "domain": "公司法-治理", "level": 3, "source": "公司法第17、68条", "collocations": ["democratic management through the employees' congress 通过职工代表大会实行民主管理", "employee representative director 职工董事"], "example_en": "When studying and deciding on major issues concerning business operations or formulating important rules, a company shall solicit opinions through the employees' congress or by other means.", "example_zh": "公司研究决定经营方面的重大问题、制定重要的规章制度时，应当通过职工代表大会或者其他形式听取意见。", "note": "2023修订：职工人数三百人以上的有限责任公司，除依法设监事会并有职工监事外，董事会成员中应当有职工代表。", "status": "待审校"}, {"word": "financial and accounting report", "ipa": null, "pos": "n.", "zh_legal": "财务会计报告", "zh_plain": null, "domain": "公司法-财务", "level": 2, "source": "公司法第十章（第208条）", "collocations": ["prepare the financial and accounting report at the end of each accounting year 每一会计年度终了时编制", "audited by an accounting firm 经会计师事务所审计", "balance sheet 资产负债表"], "example_en": "A company shall prepare a financial and accounting report at the end of each accounting year, which shall be audited by an accounting firm according to law.", "example_zh": "公司应当在每一会计年度终了时编制财务会计报告，并依法经会计师事务所审计。", "note": "财报四件套：balance sheet 资产负债表、income statement 利润表、cash flow statement 现金流量表、notes 附注。", "status": "待审校"}, {"word": "audit", "ipa": "/ˈɔːdɪt/", "pos": "n./v.", "zh_legal": "审计", "zh_plain": null, "domain": "公司法-财务", "level": 2, "source": "公司法第208、216条", "collocations": ["accounting firm 会计师事务所", "auditor 审计师", "audited financial statements 经审计的财务报表"], "example_en": "The appointment or dismissal of the accounting firm undertaking the audit business of the company shall be decided by the shareholders' meeting or the board of directors as prescribed by the articles of association.", "example_zh": "公司聘用、解聘承办公司审计业务的会计师事务所，按照公司章程的规定，由股东会或者董事会决定。", "note": "尽调中 audited/unaudited statements 的区分直接影响陈述保证的写法。", "status": "待审校"}, {"word": "corporate guarantee", "ipa": null, "pos": "n.", "zh_legal": "公司（对外）担保", "zh_plain": null, "domain": "公司法-治理", "level": 2, "source": "公司法第15条", "collocations": ["provide a guarantee for another person 为他人提供担保", "resolution of the board or the shareholders' meeting 董事会或股东会决议", "guarantee for a shareholder 为股东提供担保"], "example_en": "Where a company provides a guarantee for a shareholder or the actual controller, a resolution of the shareholders' meeting shall be adopted, and the shareholder concerned shall not participate in the voting.", "example_zh": "公司为公司股东或者实际控制人提供担保的，应当经股东会决议，该股东不得参加表决。", "note": "越权担保的效力是公司法与担保制度交叉的高频争议点；交易对手须审查担保决议（resolution review）。", "status": "待审校"}, {"word": "fine", "ipa": "/faɪn/", "pos": "n./v.", "zh_legal": "罚款", "zh_plain": "普通义：好的；细的", "domain": "公司法-责任", "level": 1, "source": "公司法第十四章（法律责任）", "collocations": ["impose a fine of not less than... nor more than... 处…以上…以下的罚款", "administrative penalty 行政处罚"], "example_en": "Where a company obtains registration by submitting false materials, the registration authority shall impose a fine and may revoke its business license if the circumstances are serious.", "example_zh": "提交虚假材料取得公司登记的，由登记机关处以罚款；情节严重的，吊销营业执照。", "note": "fine（行政/刑事罚款，交国库）与 default fine/liquidated damages（违约金，付对方）必须区分。", "status": "待审校"}, {"word": "confiscate", "ipa": "/ˈkɒnfɪskeɪt/", "pos": "v.", "zh_legal": "没收", "zh_plain": null, "domain": "公司法-责任", "level": 2, "source": "公司法第十四章（法律责任）", "collocations": ["confiscate the illegal gains 没收违法所得", "confiscation of property（刑法）没收财产"], "example_en": "The illegal gains derived from the violation shall be confiscated by the competent authority according to law.", "example_zh": "违法行为的违法所得，由主管机关依法予以没收。", "note": "illegal gains / unlawful proceeds 违法所得；反洗钱语境 asset forfeiture 资产没收。", "status": "待审校"}, {"word": "rectification", "ipa": "/ˌrektɪfɪˈkeɪʃn/", "pos": "n.", "zh_legal": "（责令）改正；整改", "zh_plain": null, "domain": "公司法-责任", "level": 2, "source": "公司法第十四章（法律责任）", "collocations": ["order to rectify within a time limit 责令限期改正", "rectification report 整改报告"], "example_en": "The company registration authority shall order the company to rectify the violation within a time limit; if it fails to do so, a fine shall be imposed.", "example_zh": "公司登记机关应当责令公司限期改正；逾期未改正的，处以罚款。", "note": "监管函件高频词；动词 rectify。合规语境 remediation（整改补救）为近义词。", "status": "待审校"}, {"word": "deregistration", "ipa": "/ˌdiːredʒɪˈstreɪʃn/", "pos": "n.", "zh_legal": "注销登记", "zh_plain": null, "domain": "公司法-变更与终止", "level": 2, "source": "公司法第245-247条", "collocations": ["apply for deregistration 申请注销登记", "simplified deregistration 简易注销", "the company is terminated upon deregistration 公司经注销登记终止"], "example_en": "After the liquidation of the company is completed, the liquidation group shall apply to the company registration authority for deregistration, and the company shall be terminated upon deregistration.", "example_zh": "公司清算结束后，清算组应当向公司登记机关申请注销公司登记。公司经注销登记，终止。", "note": "终止三部曲顺序：解散（dissolution）→ 清算（liquidation）→ 注销（deregistration）。2023修订新增简易注销和强制注销制度。", "status": "待审校"}, {"word": "state-funded company", "ipa": null, "pos": "n.", "zh_legal": "国家出资公司", "zh_plain": null, "domain": "公司法-设立与登记", "level": 3, "source": "公司法第七章（第168条）", "collocations": ["wholly state-owned company 国有独资公司", "state-owned enterprise (SOE) 国有企业", "performing the contributor's functions 履行出资人职责"], "example_en": "State-funded companies refer to wholly state-owned companies and companies in which the State holds a controlling or equity stake.", "example_zh": "国家出资公司是指国有独资公司，以及国有资本控股公司、参股公司。", "note": "SOE 是涉外谈判高频词；2023修订专章规定国家出资公司，党委研究讨论为重大决策前置程序。", "status": "待审校"}, {"word": "shadow director", "ipa": "/ˈʃædəʊ dəˈrektə/", "pos": "n.", "zh_legal": "影子董事（对照概念）", "zh_plain": null, "domain": "公司法-治理", "level": 4, "source": "对照公司法第180条第3款、第192条", "collocations": ["de facto director 事实董事", "instruct directors to act 指示董事行事"], "example_en": "Where the controlling shareholder or actual controller does not serve as a director but actually executes the affairs of the company, the provisions on the duties of loyalty and diligence shall apply to them.", "example_zh": "公司的控股股东、实际控制人不担任公司董事但实际执行公司事务的，适用忠实义务和勤勉义务的规定。", "note": "shadow director（藏在幕后发指令）与 de facto director（未经任命但实际履职）源自英国公司法；2023修订引入对应规则。", "status": "待审校"}, {"word": "class shares", "ipa": "/klɑːs ʃeəz/", "pos": "n.", "zh_legal": "类别股", "zh_plain": "class 普通义：班级、阶层", "domain": "公司法-股权股份", "level": 3, "source": "公司法第144-146条", "collocations": ["preferred shares 优先股", "shares with special voting rights 特别表决权股", "class meeting 类别股东会"], "example_en": "A company may issue class shares that differ from ordinary shares, such as shares with priority in the distribution of profits or with more or fewer voting rights per share.", "example_zh": "公司可以发行与普通股权利不同的类别股，如利润分配优先的股份、每一股表决权多于或少于普通股的股份。", "note": "2023修订正式确立类别股制度。对应美国 dual-class structure（双层股权结构，科技公司常用）。", "status": "待审校"}, {"word": "authorized capital", "ipa": "/ˈɔːθəraɪzd ˈkæpɪtl/", "pos": "n.", "zh_legal": "授权资本（制）", "zh_plain": null, "domain": "公司法-股权股份", "level": 4, "source": "公司法第152条", "collocations": ["authorize the board to issue shares 授权董事会发行股份", "not exceeding 50% of the issued shares 不超过已发行股份的50%"], "example_en": "The articles of association or the shareholders' meeting may authorize the board of directors to decide, within three years, on the issuance of shares not exceeding fifty percent of the issued shares.", "example_zh": "公司章程或者股东会可以授权董事会在三年内决定发行不超过已发行股份百分之五十的股份。", "note": "2023修订部分引入英美授权资本制（authorized capital system），增强股份公司融资灵活性。", "status": "待审校"}, {"word": "proxy", "ipa": "/ˈprɒksi/", "pos": "n.", "zh_legal": "（表决）代理人；委托书", "zh_plain": "技术语境：代理服务器", "domain": "公司法-治理", "level": 2, "source": "公司法第64条", "collocations": ["entrust a proxy to attend the meeting 委托代理人出席会议", "proxy statement（美）股东会委托声明书", "power of attorney 授权委托书"], "example_en": "A shareholder may entrust a proxy to attend the shareholders' meeting and exercise voting rights within the scope of authorization.", "example_zh": "股东可以委托代理人出席股东会会议，代理人应当在授权范围内行使表决权。", "note": "proxy fight/contest（委托书争夺战）是敌意收购经典戏码。", "status": "待审校"}, {"word": "disclosure", "ipa": "/dɪsˈkləʊʒə/", "pos": "n.", "zh_legal": "（信息）披露", "zh_plain": null, "domain": "公司法-治理", "level": 1, "source": "公司法第140条等", "collocations": ["information disclosure 信息披露", "disclose truthfully, accurately and completely 真实、准确、完整地披露", "insider information 内幕信息"], "example_en": "A listed company shall disclose information truthfully, accurately and completely according to laws and administrative regulations.", "example_zh": "上市公司应当依照法律、行政法规的规定，真实、准确、完整地披露信息。", "note": "证券法核心义务；misrepresentation/false statement 虚假陈述、material omission 重大遗漏为披露违规两大形态。", "status": "待审校"}, {"word": "ultra vires", "ipa": "/ˌʌltrə ˈvaɪriːz/", "pos": "adj./adv.", "zh_legal": "越权的（行为）", "zh_plain": null, "domain": "公司法-治理", "level": 4, "source": "对照公司法第9条（经营范围）", "collocations": ["an ultra vires act 越权行为", "act beyond the business scope 超越经营范围"], "example_en": "Under modern company law, a contract is not invalid merely because it is ultra vires the company's business scope.", "example_zh": "按照现代公司法，合同不因超越公司经营范围而当然无效。", "note": "拉丁语\"超越权限\"。英美法的 ultra vires doctrine 已基本废弃，中国法亦同（超范围经营合同原则上有效）。", "status": "待审校"}, {"word": "quorum", "ipa": "/ˈkwɔːrəm/", "pos": "n.", "zh_legal": "法定（出席）人数", "zh_plain": null, "domain": "公司法-治理", "level": 3, "source": "对照公司法第73条（董事会会议）", "collocations": ["constitute a quorum 构成法定人数", "the quorum for board meetings 董事会的法定出席人数"], "example_en": "A meeting of the board of directors may be held only when more than half of the directors are present.", "example_zh": "董事会会议应当有过半数的董事出席方可举行。", "note": "中国公司法用\"过半数出席\"规则表达同等含义；涉外合资章程和股东协议中 quorum 条款必不可少。", "status": "待审校"}, {"word": "bylaws", "ipa": "/ˈbaɪlɔːz/", "pos": "n.", "zh_legal": "（美国公司）章程细则", "zh_plain": null, "domain": "公司法-设立与登记", "level": 4, "source": "对照概念（美国公司法）", "collocations": ["certificate of incorporation 公司设立证书（美）", "adopt / amend the bylaws 通过/修改章程细则"], "example_en": "A Delaware corporation is governed by its certificate of incorporation and bylaws.", "example_zh": "特拉华州公司受其设立证书和章程细则的规制。", "note": "美国公司宪章文件分两层：certificate/articles of incorporation（对外登记）+ bylaws（内部治理细则）；中国的公司章程一份文件兼具两者功能。", "status": "待审校"}, {"word": "stock exchange", "ipa": "/ˈstɒk ɪksˌtʃeɪndʒ/", "pos": "n.", "zh_legal": "证券交易所", "zh_plain": null, "domain": "公司法-股权股份", "level": 1, "source": "公司法第五章第五节（上市公司）", "collocations": ["be listed on a stock exchange 在证券交易所上市", "Shanghai Stock Exchange (SSE) 上交所", "Hong Kong Stock Exchange (HKEX) 港交所"], "example_en": "A listed company is a joint stock limited company whose shares are listed and traded on a stock exchange.", "example_zh": "上市公司是指其股票在证券交易所上市交易的股份有限公司。", "note": "bourse（法语借词）为同义词；OTC（over-the-counter）场外交易与场内交易相对。", "status": "待审校"}, {"word": "prospectus", "ipa": "/prəˈspektəs/", "pos": "n.", "zh_legal": "招股说明书", "zh_plain": null, "domain": "公司法-股权股份", "level": 3, "source": "公司法第98条（募集设立）", "collocations": ["publish a prospectus 公告招股说明书", "subscription form 认股书", "misstatement in the prospectus 招股书虚假陈述"], "example_en": "Where shares are offered to the public, the promoters shall publish a prospectus and prepare subscription forms.", "example_zh": "发起人向社会公开募集股份，应当公告招股说明书，并制作认股书。", "note": "证券虚假陈述诉讼的主战场文件；美国注册制下对应 registration statement（S-1）。", "status": "待审校"}, {"word": "going concern", "ipa": "/ˌɡəʊɪŋ kənˈsɜːn/", "pos": "n.", "zh_legal": "持续经营（的企业）", "zh_plain": "concern 普通义：担忧；此处义为\"企业\"", "domain": "公司法-财务", "level": 3, "source": "对照概念（财务与破产）", "collocations": ["on a going concern basis 以持续经营为基础", "going concern value 持续经营价值", "liquidation value 清算价值"], "example_en": "The financial statements have been prepared on a going concern basis.", "example_zh": "本财务报表以持续经营为基础编制。", "note": "审计报告中的 going concern qualification（持续经营存疑的保留意见）是重大风险信号；破产重整的核心逻辑即保全 going concern value。", "status": "待审校"}, {"word": "directors and officers liability insurance", "ipa": null, "pos": "n.", "zh_legal": "董事责任保险", "zh_plain": null, "domain": "公司法-治理", "level": 3, "source": "公司法第193条", "collocations": ["take out liability insurance for directors 为董事投保责任保险", "缩写 D&O insurance"], "example_en": "A company may take out liability insurance covering the compensation liability of directors arising from the performance of their duties during their term of office.", "example_zh": "公司可以在董事任职期间为董事因执行公司职务承担的赔偿责任投保责任保险。", "note": "2023修订新增条文；investee 公司治理尽调与上市公司董监高履职的标配安排。", "status": "待审校"}, {"word": "compliance", "ipa": "/kəmˈplaɪəns/", "pos": "n.", "zh_legal": "合规", "zh_plain": null, "domain": "公司法-治理", "level": 1, "source": "通用（公司治理与监管）", "collocations": ["in compliance with laws and regulations 符合法律法规", "compliance officer 合规官", "non-compliance 违规"], "example_en": "The company shall establish an internal compliance system to ensure that its operations comply with applicable laws, regulations and regulatory requirements.", "example_zh": "公司应当建立内部合规体系，确保经营活动符合可适用的法律、法规和监管要求。", "note": "动词搭配 comply with；反垄断、数据、反腐败（FCPA）是涉外合规三大高压区。", "status": "待审校"}, {"word": "underwriting", "ipa": "/ˌʌndəˈraɪtɪŋ/", "pos": "n.", "zh_legal": "承销", "zh_plain": null, "domain": "公司法-股权股份", "level": 3, "source": "公司法第98条（对照证券发行）", "collocations": ["underwriter 承销商", "firm commitment underwriting 包销", "best efforts underwriting 代销"], "example_en": "Shares offered to the public shall be underwritten by a securities company established according to law.", "example_zh": "向社会公开募集的股份应当由依法设立的证券公司承销。", "note": "词源\"在（风险）下面签名\"——保险语境 underwriting 指核保，underwriter 指保险人。", "status": "待审校"}, {"word": "share certificate", "ipa": null, "pos": "n.", "zh_legal": "股票（凭证）；出资证明书", "zh_plain": null, "domain": "公司法-股权股份", "level": 3, "source": "公司法第106条、第55条", "collocations": ["issue share certificates 签发股票", "capital contribution certificate 出资证明书", "registered shares 记名股票"], "example_en": "After a joint stock limited company is established, it shall deliver share certificates or other equity vouchers to its shareholders.", "example_zh": "股份有限公司成立后，应当向股东正式交付股票或者其他股权凭证。", "note": "有限责任公司对应文件是出资证明书（capital contribution certificate）；无纸化时代由证券登记结算机构以电子簿记方式记录（book-entry）。", "status": "待审校"}]}, {"id": "susong", "name": "诉讼与仲裁法律英语词库", "short": "诉讼与仲裁", "words": [{"word": "litigation", "ipa": "/ˌlɪtɪˈɡeɪʃn/", "pos": "n.", "zh_legal": "诉讼", "zh_plain": null, "domain": "诉讼-起诉与管辖", "level": 1, "source": "通用（民事诉讼）", "collocations": ["civil / commercial litigation 民事/商事诉讼", "litigant 诉讼当事人", "litigation strategy 诉讼策略"], "example_en": "The parties may resolve their disputes through negotiation, mediation, arbitration or litigation.", "example_zh": "当事人可以通过协商、调解、仲裁或者诉讼解决争议。", "note": "近义词 lawsuit / action（具体的一件诉讼）；litigious 好讼的。", "status": "待审校"}, {"word": "plaintiff", "ipa": "/ˈpleɪntɪf/", "pos": "n.", "zh_legal": "原告", "zh_plain": null, "domain": "诉讼-起诉与管辖", "level": 1, "source": "通用（民事诉讼）", "collocations": ["the plaintiff claims that... 原告诉称", "joint plaintiffs 共同原告"], "example_en": "The plaintiff shall submit a statement of claim setting out the facts and the relief sought.", "example_zh": "原告应提交起诉状，载明事实和诉讼请求。", "note": "仲裁程序中称 claimant（申请人）；英国民事诉讼改革后原告也改称 claimant。", "status": "待审校"}, {"word": "defendant", "ipa": "/dɪˈfendənt/", "pos": "n.", "zh_legal": "被告", "zh_plain": null, "domain": "诉讼-起诉与管辖", "level": 1, "source": "通用（民事诉讼）", "collocations": ["sue the defendant 起诉被告", "co-defendant 共同被告"], "example_en": "The defendant shall file a statement of defense within the statutory period after receiving the complaint.", "example_zh": "被告应当在收到起诉状后的法定期限内提交答辩状。", "note": "仲裁程序中称 respondent（被申请人）；刑事被告人同为 defendant（the accused）。", "status": "待审校"}, {"word": "claim", "ipa": "/kleɪm/", "pos": "n./v.", "zh_legal": "诉讼请求；债权；索赔", "zh_plain": "普通义：声称、认领", "domain": "诉讼-起诉与管辖", "level": 1, "source": "通用（民事诉讼）", "collocations": ["claim for damages 损害赔偿请求", "statement of claim 起诉状/仲裁申请书", "reject / uphold a claim 驳回/支持诉请"], "example_en": "The court upheld the plaintiff's claim for the outstanding contract price but rejected the claim for lost profits.", "example_zh": "法院支持了原告关于未付合同价款的诉讼请求，驳回了可得利益损失的诉请。", "note": "一词三义皆高频：诉讼请求（程序）、债权（实体，creditor's claim）、保险索赔（claims adjuster 理赔员）。", "sta n.", "zh_legal": "和解", "zh_plain": "普通义：定居点；结算", "domain": "诉讼-审理与执行", "level": 1, "source": "通用（民事诉讼）", "collocations": ["reach a settlement 达成和解", "settlement agreement 和解协议", "settle out of court 庭外和解"], "example_en": "The parties reached a settlement on the eve of trial and the plaintiff withdrew the lawsuit.", "example_zh": "双方在开庭前夕达成和解，原告撤回了起诉。", "note": "区分：调解（mediation，有第三方主持）与和解（settlement，当事人自行）。金融语境 settlement 指结算/交收。", "status": "待审校"}, {"word": "appeal", "ipa": "/əˈpiːl/", "pos": "n./v.", "zh_legal": "上诉", "zh_plain": "普通义：吸引力、呼吁", "domain": "诉讼-审理与执行", "level": 1, "source": "通用（民事诉讼）", "collocations": ["file an appeal 提起上诉", "appellant 上诉人 / appellee 被上诉人", "appellate court 上诉法院"], "example_en": "A party that refuses to accept a judgment of first instance may file an appeal within fifteen days after the judgment is served.", "example_zh": "当事人不服一审判决的，可以在判决书送达之日起十五日内提起上诉。", "note": "中国实行两审终审制（the second instance being final）；美国联邦三级：district court → court of appeals → Supreme Court。", "status": "待审校"}, {"word": "retrial", "ipa": "/ˌriːˈtraɪəl/", "pos": "n.", "zh_legal": "再审", "zh_plain": null, "domain": "诉讼-审理与执行", "level": 3, "source": "通用（民事诉讼）", "collocations": ["apply for a retrial 申请再审", "trial supervision procedure 审判监督程序"], "example_en": "A party may apply for a retrial if there is new evidence sufficient to overturn the original judgment.", "example_zh": "有新的证据足以推翻原判决的，当事人可以申请再审。", "note": "中国特色的纠错程序；生效裁判的特别救济，区别于上诉（未生效裁判的常规救济）。", "status": "待审校"}, {"word": "enforcement", "ipa": "/ɪnˈfɔːsmənt/", "pos": "n.", "zh_legal": "（强制）执行", "zh_plain": null, "domain": "诉讼-审理与执行", "level": 1, "source": "通用（民事诉讼）", "collocations": ["apply for enforcement 申请强制执行", "enforce a judgment / an award 执行判决/裁决", "dishonest judgment debtor 失信被执行人"], "example_en": "If the losing party fails to perform the judgment, the prevailing party may apply to the court for enforcement.", "example_zh": "败诉方不履行判决的，胜诉方可以向法院申请强制执行。", "note": "执行难语境词族：列入失信名单 be placed on the dishonest judgment debtor list、限制高消费 restriction on high consumption。", "status": "待审校"}, {"word": "res judicata", "ipa": "/ˌreɪs ˌdʒuːdɪˈkɑːtə/", "pos": "n.", "zh_legal": "既判力；一事不再理", "zh_plain": null, "domain": "诉讼-审理与执行", "level": 4, "source": "通用（民事诉讼）", "collocations": ["barred by res judicata 因既判力而被禁止"], "example_en": "The second action was dismissed as it was barred by res judicata, the same claim having been finally adjudicated.", "example_zh": "因同一请求已经生效裁判确定，第二次起诉因既判力被驳回。", "note": "拉丁语\"已决之事\"。刑事上的对应原则是 double jeopardy（禁止双重危险）/ ne bis in idem。", "status": "待审校"}, {"word": "due process", "ipa": "/ˌdjuː ˈprəʊses/", "pos": "n.", "zh_legal": "正当程序", "zh_plain": null, "domain": "诉讼-审理与执行", "level": 3, "source": "通用（比较法）", "collocations": ["procedural due process 程序性正当程序", "the right to be heard 陈述申辩的权利"], "example_en": "Recognition of a foreign judgment may be refused where the defendant was not afforded due process in the original proceedings.", "example_zh": "被告在原审程序中未获正当程序保障的，可以拒绝承认该外国判决。", "note": "源自美国宪法第五、十四修正案；跨境执行裁判时的核心抗辩事由之一。", "status": "待审校"}, {"word": "court of first instance", "ipa": null, "pos": "n.", "zh_legal": "一审法院", "zh_plain": null, "domain": "诉讼-审理与执行", "level": 2, "source": "通用（民事诉讼）", "collocations": ["court of second instance 二审法院", "basic / intermediate / higher people's court 基层/中级/高级人民法院", "Supreme People's Court 最高人民法院"], "example_en": "The intermediate people's court acted as the court of first instance for this foreign-related commercial case.", "example_zh": "该涉外商事案件由中级人民法院作为一审法院审理。", "note": "instance 在程序法中义为\"审级\"。法国法系来源词（première instance）。", "status": "待审校"}, {"word": "withdraw a lawsuit", "ipa": null, "pos": "phrase", "zh_legal": "撤诉", "zh_plain": null, "domain": "诉讼-审理与执行", "level": 3, "source": "通用（民事诉讼）", "collocations": ["apply for withdrawal of the case 申请撤诉", "withdraw the appeal 撤回上诉"], "example_en": "The plaintiff applied to withdraw the lawsuit after the parties reached a settlement, and the court ruled to permit it.", "exampl y and independence 公正性与独立性"], "example_en": "A party may challenge an arbitrator if circumstances exist that give rise to justifiable doubts as to his impartiality or independence.", "example_zh": "存在对仲裁员公正性或独立性产生正当怀疑的情形的，当事人可以申请该仲裁员回避。", "note": "disclosure obligation 披露义务；IBA《利益冲突指引》红/橙/绿名单是回避审查通用标准。", "status": "待审校"}, {"word": "arbitration agreement", "ipa": null, "pos": "n.", "zh_legal": "仲裁协议", "zh_plain": null, "domain": "仲裁", "level": 2, "source": "通用（仲裁）", "collocations": ["a valid arbitration agreement 有效的仲裁协议", "separability of the arbitration clause 仲裁条款的独立性", "exclude the jurisdiction of courts 排除法院管辖"], "example_en": "A valid arbitration agreement excludes the jurisdiction of the courts over the dispute.", "example_zh": "有效的仲裁协议排除法院对该争议的管辖权。", "note": "独立性原则：主合同无效不影响仲裁条款效力（separability / severability doctrine）。", "status": "待审校"}, {"word": "arbitral award", "ipa": "/ˈɑːbɪtrəl əˈwɔːd/", "pos": "n.", "zh_legal": "仲裁裁决", "zh_plain": "award 普通义：奖项、授予", "domain": "仲裁", "level": 2, "source": "通用（仲裁）", "collocations": ["render an award 作出裁决", "set aside an award 撤销裁决", "final and binding 终局并有约束力"], "example_en": "The arbitral award is final and binding on both parties from the date it is rendered.", "example_zh": "仲裁裁决自作出之日起即为终局，对双方均有约束力。", "note": "高频陷阱：仲裁裁决是 award 不是 judgment（判决）或 decision；裁决书主文 operative part。", "status": "待审校"}, {"word": "seat of arbitration", "ipa": null, "pos": "n.", "zh_legal": "仲裁地", "zh_plain": "seat 普通义：座位", "domain": "仲裁", "level": 3, "source": "通用（仲裁）", "collocations": ["the seat of arbitration shall be Beijing 仲裁地为北京", "lex arbitri 仲裁地法"], "example_en": "The seat of arbitration determines the nationality of the award and the courts with supervisory jurisdiction to set it aside.", "example_zh": "仲裁地决定裁决的国籍以及有权撤销裁决的监督法院。", "note": "仲裁地（seat，法律概念）≠ 开庭地点（venue of hearing，地理概念），起草仲裁条款必须写明 seat。", "status": "待审校"}, {"word": "recognition and enforcement", "ipa": null, "pos": "n.", "zh_legal": "（外国裁决/判决的）承认与执行", "zh_plain": null, "domain": "仲裁", "level": 3, "source": "通用（仲裁/跨境执行）", "collocations": ["the New York Convention 《纽约公约》（1958）", "grounds for refusal 拒绝承认与执行的事由", "public policy exception 公共政策例外"], "example_en": "Under the New York Convention, a foreign arbitral award shall be recognized and enforced unless one of the limited grounds for refusal applies.", "example_zh": "根据《纽约公约》，除存在有限的法定拒绝事由外，外国仲裁裁决应予承认与执行。", "note": "《纽约公约》170+缔约国，是国际仲裁优于诉讼的根本原因；中国1987年加入，作互惠保留和商事保留。", "status": "待审校"}]}, {"id": "guquan", "name": "股权交易与投融资法律英语词库", "short": "股权交易", "words": [{"word": "consideration", "ipa": "/kənˌsɪdəˈreɪʃn/", "pos": "n.", "zh_legal": "对价", "zh_plain": "普通义：考虑（经典一词多义陷阱）", "domain": "股权交易-交易文件", "level": 1, "source": "交易实务（英美合同法核心概念）", "collocations": ["total consideration 总对价", "for good and valuable consideration 以良好且有值的对价", "nominal consideration 象征性对价"], "example_en": "The transferor agrees to sell the target equity to the transferee for a total consideration of RMB 50 million.", "example_zh": "转让方同意以总对价人民币5000万元向受让方出售目标股权。", "note": "英美法合同成立要件之一（无对价不成约）；中国法无对价要求，但交易文件中 consideration 即指交易价款。法律英语第一批必须纠正的词义。", "status": "待审校"}, {"word": "transferor", "ipa": "/trænsˈfɜːrə/", "pos": "n.", "zh_legal": "转让方", "zh_plain": null, "domain": "股权交易-交易文件", "level": 2, "source": "交易实务", "collocations": ["transferee 受让方", "target company 目标公司", "free and clear of any encumbrance 不存在任何权利负担"], "example_en": "The transferor warrants that it has full and valid title to the equity to be transferred, free and clear of any encumbrance.", "example_zh": "转让方保证其对拟转让股权拥有完整有效的权利，且不存在任何权利负担。", "note": "encumbrance（权利负担）指质押、查封、第三人权利等——free and clear of encumbrances 是股转协议权属保证的标配表述。", "status": "待审校"}, {"word": "share purchase agreement", "ipa": null, "pos": "n.", "zh_legal": "股权收购协议", "zh_plain": null, "domain": "股权交易-交易文件", "level": 1, "source": "交易实务", "collocations": ["缩写 SPA", "equity transfer agreement 股权转让协议", "share subscription agreement (SSA) 增资认购协议"], "example_en": "The parties entered into a share purchase agreement setting out the purchase price, closing conditions and representations and warranties.", "example_zh": "双方签署了股权收购协议，约定收购价款、交割条件以及陈述与保证。", "note": "买老股签 SPA（钱进老股东口袋）；认新股签 SSA（钱进公司）——old money 与 new money 的文件之别。", "status": "待审校"}, {"word": "shareholders' agreement", "ipa": null, "pos": "n.", "zh_legal": "股东协议", "zh_plain": null, "domain": "股权交易-交易文件", "level": 2, "source": "交易实务", "collocations": ["缩写 SHA", "reserved matters 保留事项（一票否决事项）", "transfer restrictions 转让限制"], "example_en": "The shareholders' agreement provides for board composition, reserved matters and restrictions on share transfers.", "example_zh": "股东协议约定了董事会构成、保留事项以及股权转让限制。", "note": "与章程的关系是实务经典问题：SHA 仅约束签约方（合同效力），章程可对抗公司与新股东；两份文件的冲突条款（conflict clause）必备。", "status": "待审校"}, {"word": "term sheet", "ipa": "/ˈtɜːm ʃiːt/", "pos": "n.", "zh_legal": "投资条款清单", "zh_plain": null, "domain": "股权交易-交易文件", "level": 2, "source": "交易实务（PE/VC）", "collocations": ["non-binding 无法律约束力的", "binding provisions 有约束力条款（排他、保密）", "heads of terms（英式同义词）"], "example_en": "Except for the provisions on confidentiality and exclusivity, the term sheet is non-binding on the parties.", "example_zh": "除保密和排他条款外，本条款清单对双方不具有法律约束力。", "note": "TS 阶段锁定估值与核心商业条款，细节留给正式协议；约束力取决于措辞而非文件标题。", "status": "待审校"}, {"word": "letter of intent", "ipa": null, "pos": "n.", "zh_legal": "意向书", "zh_plain": null, "domain": "股权交易-交易文件", "level": 2, "source": "交易实务（对照民法典第495条预约合同）", "collocations": ["缩写 LOI", "memorandum of understanding (MOU) 谅解备忘录", "subject to contract 以正式合同为准"], "example_en": "The parties signed a letter of intent recording their preliminary understanding on the proposed acquisition.", "example_zh": "双方签署意向书，记录其就拟议收购达成的初步共识。", "note": "效力看措辞不看标题：写明 subject to contract 排除约束力；反之在中国法下可能构成预约合同（民法典第495条），违反需担责。", "status": "待审校"}, {"word": "due diligence", "ipa": "/ˌdjuː ˈdɪlɪdʒəns/", "pos": "n.", "zh_legal": "尽职调查", "zh_plain": null, "domain": "股权交易-交易文件", "level": 1, "source": "交易实务", "collocations": ["缩写 DD", "legal / financial / business due diligence 法律/财务/业务尽调", "data room 资料室（VDR 虚拟资料室）", "red flag report 重大问题报告"], "example_en": "The investor shall complete legal and financial due diligence on the target company prior to signing.", "example_zh": "投资人应在签约前完成对目标公司的法律和财务尽职调查。", "note": "尽调发现的三个去处：调价格、设交割先决条件、要特别赔偿（specific indemnity）。", "status": "待审校"}, {"word": "closing", "ipa": "/ˈkləʊzɪŋ/", "pos": "n.", "zh_legal": "交割", "zh_plain": "普通义：关闭", "domain": "股权交易-交易文件", "level": 1, "source": "交易实务", "collocations": ["closing conditions / conditions precedent (CPs) 交割先决条件", "closing date 交割日", "simultaneous signing and closing 签约交割同步"], "example_en": "Closing shall take place within ten business days after all conditions precedent are satisfied or waived.", "example_zh": "全部交割先决条件成就或被豁免后十个工作日内进行交割。", "note": "signing（签约）与 closing（交割）之间靠 CP 清单和过渡期承诺衔接；英式称 completion。股权交割以变更登记为准。", "status": "待审校"}, {"word": "representations and warranties", "ipa": null, "pos": "n.", "zh_legal": "陈述与保证", "zh_plain": null, "domain": "股权交易-交易文件", "level": 2, "source": "交易实务", "collocations": ["缩写 R&W / reps and warranties", "survive the closing 于交割后存续", "R&W insurance 陈述与保证保险"], "example_en": "The seller represents and warrants that the target company has no undisclosed liabilities as of the closing date.", "example_zh": "卖方陈述并保证，截至交割日目标公司不存在未披露的负债。", "note": "SPA 的风险分配心脏：违反陈保的救济是赔偿（indemnification）；交割时重述称 bring-down。", "status": "待审校"}, {"word": "covenant", "ipa": "/ˈkʌvənənt/", "pos": "n./v.", "zh_legal": "承诺条款；约定义务", "zh_plain": "宗教语境：圣约", "domain": "股权交易-交易文件", "level": 3, "source": "交易实务", "collocations": ["affirmative / negative covenants 积极/消极承诺", "interim covenants 过渡期承诺", "financial covenants（贷款）财务承诺"], "example_en": "The seller covenants that, prior to closing, the target company shall be operated in the ordinary course of business.", "example_zh": "卖方承诺，交割前目标公司将按惯常经营过程运营。", "note": "ordinary course of business（惯常经营）是过渡期条款的核心标准；贷款协议违反 financial covenants 触发违约事件。", "status": "待审校"}, {"word": "disclosure schedule", "ipa": null, "pos": "n.", "zh_legal": "披露函；披露清单", "zh_plain": null, "domain": "股权交易-交易文件", "level": 3, "source": "交易实务", "collocations": ["disclose against the warranties 针对保证作出披露", "fairly disclosed 公允披露"], "example_en": "Matters fairly disclosed in the disclosure schedule qualify the seller's representations and warranties.", "example_zh": "披露函中公允披露的事项构成对卖方陈述与保证的限定。", "note": "卖方的风险转移工具：已披露事项原则上不构成违反陈保——所以买方要逐项核披露函。英式称 disclosure letter。", "status": "待审校"}, {"word": "exclusivity", "ipa": "/ɪkˌskluːsɪˈvɪti/", "pos": "n.", "zh_legal": "排他性；独家谈判", "zh_plain": null, "domain": "股权交易-交易文件", "level": 3, "source": "交易实务", "collocations": ["exclusivity period 排他期", "no-shop clause 禁止招揽条款"], "example_en": "During the exclusivity period, the seller shall not solicit or negotiate with any third party regarding the sale of the target equity.", "example_zh": "排他期内，卖方不得就目标股权的出售向任何第三方招揽或与其谈判。", "note": "TS 中少数有约束力的条款之一，常与分手费（break-up fee）搭配。", "status": "待审校"}, {"word": "break-up fee", "ipa": "/ˈbreɪk ʌp fiː/", "pos": "n.", "zh_legal": "分手费", "zh_plain": null, "domain": "股权交易-交易文件", "level": 3, "source": "交易实务", "collocations": ["termination fee 终止费", "reverse break-up fee 反向分手费（买方支付）"], "example_en": "If the seller terminates the transaction to accept a competing offer, it shall pay the buyer a break-up fee equal to 3% of the transaction value.", "example_zh": "如卖方为接受竞争性要约而终止交易，应向买方支付相当于交易金额3%的分手费。", "note": "反向分手费在跨境并购中保护卖方对冲监管审批不确定性（审批不过买方赔钱）。", "status": "待审校"}, {"word": "non-compete", "ipa": "/ˌnɒn kəmˈpiːt/", "pos": "n./adj.", "zh_legal": "竞业禁止（条款）", "zh_plain": null, "domain": "股权交易-交易文件", "level": 2, "source": "交易实务（对照劳动合同法、公司法第184条）", "collocations": ["non-competition covenant 竞业禁止承诺", "non-solicitation 禁止招揽（员工/客户）", "restrictive covenants 限制性条款"], "example_en": "The founder shall not, within three years after closing, directly or indirectly engage in any business competing with the target company.", "example_zh": "创始人在交割后三年内不得直接或间接从事与目标公司构成竞争的业务。", "note": "区分三个语境：劳动法竞业限制（需经济补偿、最长2年）、董事竞业禁止（公司法第184条）、交易中卖方竞业承诺（合同自由+合理性审查）。", "status": "待审校"}, {"word": "capital increase", "ipa": null, "pos": "n.", "zh_legal": "增资", "zh_plain": null, "domain": "股权交易-交易文件", "level": 2, "source": "公司法第227条（对照）", "collocations": ["capital increase agreement 增资协议", "subscribe for the increased registered capital 认缴新增注册资本", "at a premium 溢价"], "example_en": "The investor shall subscribe for the increased registered capital at a premium, with the excess over the registered capital credited to capital reserve.", "example_zh": "投资人溢价认缴新增注册资本，超出注册资本的部分计入资本公积。", "note": "投资进入的两条路径：增资（资金进公司，稀释所有老股东）vs 受让老股（资金进老股东口袋）——税务与商业逻辑完全不同。", "status": "待审校"}, {"word": "valuation adjustment mechanism", "ipa": null, "pos": "n.", "zh_legal": "对赌协议；估值调整机制", "zh_plain": null, "domain": "股权交易-对赌与投资条款", "level": 2, "source": "交易实务（《九民纪要》第5条）", "collocations": ["缩写 VAM", "bet-on agreement（俗译）", "trigger event 触发事件"], "example_en": "Under the valuation adjustment mechanism, if the target fails to achieve the committed performance, the founders shall compensate the investor in cash or transfer additional shares.", "example_zh": "根据估值调整机制，如目标公司未实现承诺业绩，创始人应以现金补偿投资人或向其转让额外股权。", "note": "\"对赌\"无精确英文对应，VAM 为通行译法。《九民纪要》要点：与股东/实控人对赌有效；与公司对赌不因此无效，但公司履行回购受资本维持原则约束（须先完成减资）。", "status": "待审校"}, {"word": "valuation", "ipa": "/ˌvæljuˈeɪʃn/", "pos": "n.", "zh_legal": "估值", "zh_plain": null, "domain": "股权交易-对赌与投资条款", "level": 1, "source": "交易实务", "collocations": ["pre-money / post-money valuation 投前/投后估值", "valuation report 评估报告", "fair market value (FMV) 公允市场价值"], "example_en": "The Series B investment is made at a post-money valuation of RMB 500 million.", "example_zh": "本轮B轮投资按投后估值人民币5亿元进行。", "note": "post-money = pre-money + 本轮投资额。涉及国有股权的交易须经法定资产评估并备案/核准。", "status": "待审校"}, {"word": "performance commitment", "ipa": null, "pos": "n.", "zh_legal": "业绩承诺", "zh_plain": null, "domain": "股权交易-对赌与投资条款", "level": 2, "source": "交易实务", "collocations": ["performance target 业绩目标", "audited net profit 经审计净利润", "shortfall 业绩缺口"], "example_en": "The founders commit that the target's audited net profit for each of the next three fiscal years shall not be less than the agreed thresholds.", "example_zh": "创始人承诺目标公司未来三个会计年度经审计净利润均不低于约定数额。", "note": "补偿两形态：现金补偿/股份补偿。上市公司重大资产重组中的业绩承诺与补偿受证监会规则强制约束，不得随意变更。", "status": "待审校"}, {"word": "redemption", "ipa": "/rɪˈdempʃn/", "pos": "n.", "zh_legal": "回购；赎回", "zh_plain": "宗教义：救赎", "domain": "股权交易-对赌与投资条款", "level": 2, "source": "交易实务（对照公司法第89、162条）", "collocations": ["redemption right 回购权", "redemption price 回购价款（投资本金+固定回报）", "qualified IPO 合格上市"], "example_en": "If no qualified IPO occurs within five years from closing, the investor may require the founders to redeem all its shares at the original investment amount plus an 8% annual return.", "example_zh": "如交割后五年内未实现合格上市，投资人有权要求创始人按投资本金加年化8%回报回购其全部股权。", "note": "对赌的核心退出条款。回购义务人是股东时按合同执行；是公司时受减资程序与利润限制约束。最高法已明确投资人请求回购需在合理期限内行使（参考六个月）。", "status": "待审校"}, {"word": "cash compensation", "ipa": null, "pos": "n.", "zh_legal": "现金补偿", "zh_plain": null, "domain": "股权交易-对赌与投资条款", "level": 3, "source": "交易实务", "collocations": ["compensation formula 补偿计算公式", "share compensation 股份补偿"], "example_en": "Where the actual net profit falls short of the committed amount, the founders shall pay cash compensation calculated in accordance with the agreed formula.", "example_zh": "实际净利润低于承诺数额的，创始人应按约定公式计算并支付现金补偿。", "note": "常见公式：（承诺利润－实际利润）÷承诺利润×投资额。性质上区别于违约金（影响司法酌减的适用空间），起草时注意定性表述。", "status": "待审校"}, {"word": "earn-out", "ipa": "/ˈɜːn aʊt/", "pos": "n.", "zh_legal": "盈利能力支付（earn-out 条款）", "zh_plain": null, "domain": "股权交易-对赌与投资条款", "level": 4, "source": "交易实务（并购）", "collocations": ["deferred consideration 递延对价", "earn-out period 考核期", "EBITDA 息税折旧摊销前利润"], "example_en": "Part of the purchase price is structured as an earn-out, payable only if the target achieves the agreed EBITDA targets over the following two years.", "example_zh": "部分收购价款采用 earn-out 安排，仅在目标公司未来两年达到约定 EBITDA 指标时支付。", ps established a 50:50 joint venture to develop the new energy vehicle project.", "example_zh": "两家集团设立对半持股的合资公司开发新能源汽车项目。", "note": "50:50 合资天然易僵局，deadlock 解决机制必备。2020年外商投资法实施后，中外合资企业统一适用公司法组织形式（五年过渡期已满）。", "status": "待审校"}, {"word": "deadlock", "ipa": "/ˈdedlɒk/", "pos": "n.", "zh_legal": "（公司/合资）僵局", "zh_plain": "普通义：僵持", "domain": "股权交易-架构与退出", "level": 3, "source": "交易实务（对照公司法第231条司法解散）", "collocations": ["deadlock resolution mechanism 僵局解决机制", "Russian roulette 俄罗斯轮盘（一方报价、对方择买或卖）", "Texas shoot-out 德州枪战（密封竞价）"], "example_en": "If the board fails to pass a reserved matter in two consecutive meetings, either party may trigger the deadlock resolution mechanism.", "example_zh": "董事会连续两次会议未能通过保留事项的，任何一方均可启动僵局解决机制。", "note": "中国法的兜底救济是司法解散（持股10%以上股东起诉），成本高、周期长——合资协议预设 buy-sell 机制远更高效。", "status": "待审校"}, {"word": "special purpose vehicle", "ipa": null, "pos": "n.", "zh_legal": "特殊目的载体", "zh_plain": null, "domain": "股权交易-架构与退出", "level": 3, "source": "交易实务（跨境架构）", "collocations": ["缩写 SPV", "offshore SPV 离岸载体（开曼/BVI/香港）", "holding structure 持股架构"], "example_en": "The investment is made through a special purpose vehicle incorporated in Hong Kong for tax and regulatory structuring purposes.", "example_zh": "本次投资通过一家在香港设立的特殊目的载体进行，以实现税务和监管架构安排。", "note": "红筹架构、VIE 架构的基本积木。区分语域：SPV 是中性术语，shell company（壳公司）带贬义。返程投资涉及37号文登记。", "status": "待审校"}, {"word": "nominee shareholding", "ipa": "/ˌnɒmɪˈniː/", "pos": "n.", "zh_legal": "股权代持", "zh_plain": null, "domain": "股权交易-架构与退出", "level": 3, "source": "公司法司法解释三第24-26条（对照）", "collocations": ["nominee shareholder 名义股东", "actual contributor 实际出资人", "shareholding entrustment agreement 股权代持协议"], "example_en": "Under the nominee arrangement, the nominee holds the equity in its own name for the benefit of the actual contributor.", "example_zh": "在代持安排下，名义股东以自己的名义为实际出资人的利益持有股权。", "note": "代持协议无法定无效事由的有效（内部关系），但实际出资人显名须经其他股东过半数同意；名义股东擅自处分适用善意取得。IPO 审核要求穿透清理代持。金融、上市公司等领域代持可能因违反公序良俗无效。", "status": "待审校"}, {"word": "beneficial owner", "ipa":
