ency is not binding on the principal unless ratified.", "example_zh": "无权代理行为未经被代理人追认的，对被代理人不发生效力。", "note": "动词 ratify。", "status": "待审校"}, {"word": "agency", "ipa": "/ˈeɪdʒənsi/", "pos": "n.", "zh_legal": "代理", "zh_plain": "普通义：机构、代理处", "domain": "民法-总则", "level": 1, "source": "总则编第七章", "collocations": ["entrusted agency 委托代理", "statutory agency 法定代理", "act without authority of agency 无权代理"], "example_en": "A civil juristic act performed by an agent within the scope of authority in the name of the principal shall be binding on the principal.", "example_zh": "代理人在代理权限内，以被代理人名义实施的民事法律行为，对被代理人发生效力。", "note": "agent 代理人 / principal 被代理人，三词一组记忆。", "status": "待审校"}, {"word": "principal", "ipa": "/ˈprɪnsəpl/", "pos": "n.", "zh_legal": "被代理人；本人", "zh_plain": "普通义：校长、本金、主要的", "domain": "民法-总则", "level": 2, "source": "总则编第七章", "collocations": ["in the name of the principal 以被代理人名义"], "example_en": "The principal may ratify an act performed by a person without authority of agency.", "example_zh": "被代理人可以追认无权代理人实施的行为。", "note": "金融语境 principal 又指本金（与 interest 利息相对），一词多义高频考点。", "status": "待审校"}, {"word": "bona fide", "ipa": "/ˌbəʊnə ˈfaɪdi/", "pos": "adj.", "zh_legal": "善意的", "zh_plain": null, "domain": "民法-总则", "level": 2, "source": "总则编第145条等", "collocations": ["bona fide third person 善意第三人", "bona fide acquisition 善意取得"], "example_en": "Before the act is ratified, a bona fide third person is entitled to revoke the act.", "example_zh": "行为被追认前，善意第三人有撤销的权利。", "note": "拉丁语，字面义\"以善意\"；反义词 mala fide（恶意的）。", "status": "待审校"}, {"word": "good faith", "ipa": "/ɡʊd feɪθ/", "pos": "n.", "zh_legal": "诚信；诚实信用", "zh_plain": null, "domain": "民法-总则", "level": 1, "source": "总则编第7条", "collocations": ["the principle of good faith 诚实信用原则", "in good faith 善意地、诚信地"], "example_en": "Civil subjects engaging in civil activities shall observe the principle of good faith.", "example_zh": "民事主体从事民事活动，应当遵循诚信原则。", "note": "与 bona fide 同源同义，good faith 为名词性表达。", "status": "待审校"}, {"word": "public order and good morals", "ipa": null, "pos": "n.", "zh_legal": "公序良俗", "zh_plain": null, "domain": "民法-总则", "level": 2, "source": "总则编第8、153条", "collocations": ["violate public order and good morals 违背公序良俗"], "example_en": "No civil juristic act shall violate public order and good morals.", "example_zh": "民事法律行为不得违背公序良俗。", "note": "对应大陆法概念，法语源 ordre public（公共秩序）。", "status": "待审校"}, {"word": "limitation of action", "ipa": "/ˌlɪmɪˈteɪʃn/", "pos": "n.", "zh_legal": "诉讼时效", "zh_plain": null, "domain": "民法-总则", "level": 2, "source": "总则编第九章（第188条）", "collocations": ["the limitation period is three years 诉讼时效期间为三年", "suspension / interruption of limitation 时效中止/中断"], "example_en": "The limitation period for a person to request protection of civil rights from a people's court shall be three years.", "example_zh": "向人民法院请求保护民事权利的诉讼时效期间为三年。", "note": "英美法常用 statute of limitations / limitation period。", "status": "待审校"}, {"word": "guardianship", "ipa": "/ˈɡɑːdiənʃɪp/", "pos": "n.", "zh_legal": "监护", "zh_plain": null, "domain": "民法-总则", "level": 2, "source": "总则编第26-39条", "collocations": ["guardian 监护人", "ward 被监护人", "perform the duties of guardianship 履行监护职责"], "example_en": "The parents of a minor are his or her guardians.", "example_zh": "未成年人的父母是未成年人的监护人。", "note": null, "status": "待审校"}, {"word": "domicile", "ipa": "/ˈdɒmɪsaɪl/", "pos": "n.", "zh_legal": "住所", "zh_plain": null, "domain": "民法-总则", "level": 3, "source": "总则编第25条", "collocations": ["the domicile of a natural person 自然人的住所", "place of habitual residence 经常居所地"], "example_en": "The domicile of a natural person is the residence registered in the household or other valid identification registration system.", "example_zh": "自然人以户籍登记或者其他有效身份登记记载的居所为住所。", "note": "涉外案件管辖与法律适用的关键连结点。", "status": "待审校"}, {"word": "declaration of death", "ipa": "/ˌdekləˈreɪʃn/", "pos": "n.", "zh_legal": "宣告死亡", "zh_plain": null, "domain": "民法-总则", "level": 3, "source": "总则编第46-53条", "collocations": ["declaration of a missing person 宣告失踪", "revoke the declaration of death 撤销死亡宣告"], "example_en": "If the person declared dead reappears, the people's court shall revoke the declaration of death upon application.", "example_zh": "被宣告死亡的人重新出现，经申请，人民法院应当撤销死亡宣告。", "note": null, "status": "待审校"}, {"word": "real right", "ipa": "/rɪəl raɪt/", "pos": "n.", "zh_legal": "物权", "zh_plain": "real 普通义：真实的；法律语境源自拉丁 res（物）", "domain": "民法-物权", "level": 1, "source": "物权编第二编", "collocations": ["real rights in immovables 不动产物权", "creation, alteration, transfer and extinguishment of real rights 物权的设立、变更、转让和消灭"], "example_en": "The creation, alteration, transfer and extinguishment of real rights in immovables shall become effective upon registration according to law.", "example_zh": "不动产物权的设立、变更、转让和消灭，经依法登记发生效力。", "note": "同源词：real property/real estate 不动产。英美法更常用 property right / right in rem。", "status": "待审校"}, {"word": "ownership", "ipa": "/ˈəʊnəʃɪp/", "pos": "n.", "zh_legal": "所有权", "zh_plain": null, "domain": "民法-物权", "level": 1, "source": "物权编第240条", "collocations": ["state ownership 国家所有权", "acquire ownership of... 取得…的所有权"], "example_en": "The owner is entitled to possess, use, benefit from and dispose of his immovable or movable property according to law.", "example_zh": "所有权人对自己的不动产或者动产，依法享有占有、使用、收益和处分的权利。", "note": "占有 possess、使用 use、收益 benefit、处分 dispose，所有权四项权能。", "status": "待审校"}, {"word": "usufructuary right", "ipa": "/ˌjuːzjʊˈfrʌktʃʊəri/", "pos": "n.", "zh_legal": "用益物权", "zh_plain": null, "domain": "民法-物权", "level": 4, "source": "物权编第三分编", "collocations": ["usufructuary right holder 用益物权人"], "example_en": "A usufructuary right holder is entitled to possess, use and benefit from the immovable or movable property owned by another person.", "example_zh": "用益物权人对他人所有的不动产或者动产，依法享有占有、使用和收益的权利。", "note": "拉丁词源 usus（使用）+ fructus（孳息）。", "status": "待审校"}, {"word": "security interest", "ipa": "/sɪˈkjʊərəti ˈɪntrəst/", "pos": "n.", "zh_legal": "担保物权", "zh_plain": "security 普通义：安全；证券（复数 securities）", "domain": "民法-物权", "level": 2, "source": "物权编第四分编", "collocations": ["create a security interest 设立担保物权", "secured creditor 担保债权人"], "example_en": "The holder of a security interest shall have priority in payment from the collateral.", "example_zh": "担保物权人就担保财产享有优先受偿的权利。", "note": "一词多义重灾区：security 安全/证券/担保，按语境判断。", "status": "待审校"}, {"word": "mortgage", "ipa": "/ˈmɔːɡɪdʒ/", "pos": "n./v.", "zh_legal": "抵押；抵押权", "zh_plain": "日常语境：按揭（贷款）", "domain": "民法-物权", "level": 1, "source": "物权编第十七章（第394条）", "collocations": ["mortgage contract 抵押合同", "mortgagor 抵押人", "mortgagee 抵押权人"], "example_en": "The debtor or a third person may mortgage the property without transferring its possession to the mortgagee.", "example_zh": "债务人或者第三人不转移财产的占有，将该财产抵押给抵押权人。", "note": "与 pledge（质押）的核心区别：抵押不转移占有，质押转移占有。", "status": "待审校"}, {"word": "pledge", "ipa": "/pledʒ/", "pos": "n./v.", "zh_legal": "质押；质权", "zh_plain": "普通义：保证、誓言", "domain": "民法-物权", "level": 2, "source": "物权编第十八章（第425条）", "collocations": ["pledge of movables 动产质押", "pledge of rights 权利质押", "pledgor 出质人 / pledgee 质权人"], "example_en": "The debtor or a third person delivers his movable property to the creditor for possession as security for the claim.", "example_zh": "债务人或者第三人将其动产出质给债权人占有，作为债权的担保。", "note": "股权质押 pledge of equity，资本市场高频词。", "status": "待审校"}, {"word": "lien", "ipa": "/liːn/", "pos": "n.", "zh_legal": "留置权", "zh_plain": null, "domain": "民法-物权", "level": 3, "source": "物权编第十九章（第447条）", "collocations": ["exercise a lien over... 对…行使留置权", "lienholder 留置权人"], "example_en": "Where the debtor fails to perform his due obligation, the creditor may retain the movable property of the debtor lawfully in his possession.", "example_zh": "债务人不履行到期债务，债权人可以留置已经合法占有的债务人的动产。", "note": "美国法中 lien 泛指各类担保负担（如 tax lien），含义比中文\"留置权\"宽。", "status": "待审校"}, {"word": "possession", "ipa": "/pəˈzeʃn/", "pos": "n.", "zh_legal": "占有", "zh_plain": "普通义：拥有；所有物", "domain": "民法-物权", "level": 2, "source": "物权编第二十章", "collocations": ["transfer of possession 移转占有", "in possession of... 占有…"], "example_en": "Possession of immovable or movable property is protected by law.", "example_zh": "不动产或者动产的占有受法律保护。", "note": "法谚：Possession is nine-tenths of the law（占有即九分法律）。", "status": "待审校"}, {"word": "immovable property", "ipa": "/ɪˈmuːvəbl/", "pos": "n.", "zh_legal": "不动产", "zh_plain": null, "domain": "民法-物权", "level": 1, "source": "物权编第209条", "collocations": ["movable property 动产", "registration of immovables 不动产登记"], "example_en": "Real rights in immovables become effective upon registration; real rights in movables become effective upon delivery.", "example_zh": "不动产物权登记生效，动产物权交付生效。", "note": "英美法对应词 real property（不动产）/ personal property（动产）。", "status": "待审校"}, {"word": "co-ownership", "ipa": "/ˌkəʊˈəʊnəʃɪp/", "pos": "n.", "zh_legal": "共有", "zh_plain": null, "domain": "民法-物权", "level": 2, "source": "物权编第八章", "collocations": ["co-ownership by shares 按份共有", "joint co-ownership 共同共有"], "example_en": "Co-owners by shares are entitled to the ownership of the immovable or movable property in proportion to their respective shares.", "example_zh": "按份共有人对共有的不动产或者动产按照其份额享有所有权。", "note": "英美法对应 tenancy in common（按份）/ joint tenancy（共同）。", "status": "待审校"}, {"word": "servitude", "ipa": "/ˈsɜːvɪtjuːd/", "pos": "n.", "zh_legal": "地役权", "zh_plain": null, "domain": "民法-物权", "level": 4, "source": "物权编第十五章（第372条）", "collocations": ["create a servitude 设立地役权", "dominant / servient land 需役地/供役地"], "example_en": "A servitude holder is entitled to use the immovable property of another person to enhance the benefit of his own immovable property.", "example_zh": "地役权人有权按照合同约定，利用他人的不动产，以提高自己不动产的效益。", "note": "英美法对应概念 easement。", "status": "待审校"}, {"word": "right of habitation", "ipa": "/ˌhæbɪˈteɪʃn/", "pos": "n.", "zh_legal": "居住权", "zh_plain": null, "domain": "民法-物权", "level": 3, "source": "物权编第十四章（第366条）", "collocations": ["create a right of habitation by contract 以合同方式设立居住权"], "example_en": "The holder of the right of habitation is entitled to possess and use another person's dwelling to meet his need for living.", "example_zh": "居住权人有权按照合同约定，对他人的住宅享有占有、使用的用益物权，以满足生活居住的需要。", "note": "民法典新设权利（2021）。", "status": "待审校"}, {"word": "bona fide acquisition", "ipa": null, "pos": "n.", "zh_legal": "善意取得", "zh_plain": null, "domain": "民法-物权", "level": 3, "source": "物权编第311条", "collocations": ["acquire ownership in good faith 善意取得所有权", "reasonable price 合理价格"], "example_en": "Where the transferee acquires the property in good faith at a reasonable price and the registration or delivery has been completed, the transferee acquires its ownership.", "example_zh": "受让人受让财产时为善意、以合理的价格转让，且已完成登记或交付的，受让人取得该财产的所有权。", "note": "英美法近似概念：bona fide purchaser for value（BFP）。", "status": "待审校"}, {"word": "offer", "ipa": "/ˈɒfə/", "pos": "n./v.", "zh_legal": "要约", "zh_plain": "普通义：提供、提议", "domain": "民法-合同", "level": 1, "source": "合同编第472条", "collocations": ["make an offer 发出要约", "invitation to offer 要约邀请", "withdraw / revoke an offer 撤回/撤销要约"], "example_en": "An offer is an expression of intent to conclude a contract with another person.", "example_zh": "要约是希望与他人订立合同的意思表示。", "note": "offeror 要约人 / offeree 受要约人。商业广告原则上是 invitation to offer。", "status": "待审校"}, {"word": "acceptance", "ipa": "/əkˈseptəns/", "pos": "n.", "zh_legal": "承诺", "zh_plain": "普通义：接受", "domain": "民法-合同", "level": 1, "source": "合同编第479条", "collocations": ["the acceptance becomes effective 承诺生效", "acceptance reaches the offeror 承诺到达要约人"], "example_en": "An acceptance is an expression of intent of the offeree to accept the offer; a contract is formed when the acceptance becomes effective.", "example_zh": "承诺是受要约人同意要约的意思表示；承诺生效时合同成立。", "note": "注意不是 promise（允诺）。票据法语境另指\"承兑\"。", "status": "待审校"}, {"word": "conclusion of a contract", "ipa": "/kənˈkluːʒn/", "pos": "n.", "zh_legal": "合同的订立", "zh_plain": "conclusion 普通义：结论、结束（易反向误解）", "domain": "民法-合同", "level": 2, "source": "合同编第二章", "collocations": ["conclude a contract 订立合同", "enter into a contract 签订合同"], "example_en": "The parties may conclude a contract in written, oral or other forms.", "example_zh": "当事人订立合同，可以采用书面形式、口头形式或者其他形式。", "note": "高频陷阱：conclude a contract 是\"订立\"合同而非\"终止\"合同。", "status": "待审校"}, {"word": "standard clauses", "ipa": "/ˈstændəd ˈklɔːzɪz/", "pos": "n.", "zh_legal": "格式条款", "zh_plain": null, "domain": "民法-合同", "level": 2, "source": "合同编第496条", "collocations": ["the party providing the standard clauses 提供格式条款的一方", "draw the other party's attention 提示对方注意"], "example_en": "Standard clauses are clauses drafted in advance by a party for repeated use, which are not negotiated with the other party.", "example_zh": "格式条款是当事人为了重复使用而预先拟定，并在订立合同时未与对方协商的条款。", "note": "英美合同法常称 standard terms / boilerplate clauses；消费者语境称 adhesion contract（附合合同）。", "status": "待审校"}, {"word": "performance", "ipa": "/pəˈfɔːməns/", "pos": "n.", "zh_legal": "履行", "zh_plain": "普通义：表演、业绩", "domain": "民法-合同", "level": 1, "source": "合同编第四章", "collocations": ["perform the obligations 履行义务", "place of performance 履行地", "specific performance 继续履行/实际履行"], "example_en": "The parties shall fully perform their respective obligations as agreed in the contract.", "example_zh": "当事人应当按照约定全面履行自己的义务。", "note": "specific performance 在英美法中是衡平法救济，在中国法中是当然的违约责任形式。", "status": "待审校"}, {"word": "breach of contract", "ipa": "/briːtʃ/", "pos": "n.", "zh_legal": "违约", "zh_plain": "breach 普通义：破坏、缺口", "domain": "民法-合同", "level": 1, "source": "合同编第八章（第577条）", "collocations": ["liability for breach of contract 违约责任", "be in breach 处于违约状态", "anticipatory breach 预期违约"], "example_en": "Where a party fails to perform its contractual obligations, it shall bear the liability for breach of contract.", "example_zh": "当事人一方不履行合同义务的，应当承担违约责任。", "note": "动词搭配 breach a contract 或 be in breach of a contract。", "status": "待审校"}, {"word": "anticipatory breach", "ipa": "/ænˈtɪsɪpətəri briːtʃ/", "pos": "n.", "zh_legal": "预期违约", "zh_plain": null, "domain": "民法-合同", "level": 3, "source": "合同编第578条", "collocations": ["expressly or by conduct indicate non-performance 明示或以行为表明不履行"], "example_en": "Where a party expressly indicates or shows by its conduct that it will not perform its contractual obligations, the other party may demand liability for breach before the performance is due.", "example_zh": "当事人一方明确表示或者以自己的行为表明不履行合同义务的，对方可以在履行期限届满前请求其承担违约责任。", "note": "英美法源概念，又称 anticipatory repudiation。", "status": "待审校"}, {"word": "default fine", "ipa": "/dɪˈfɔːlt faɪn/", "pos": "n.", "zh_legal": "违约金", "zh_plain": null, "domain": "民法-合同", "level": 2, "source": "合同编第585条", "collocations": ["pay a default fine 支付违约金", "adjust the default fine 调整违约金"], "example_en": "The parties may agree that one party shall pay a default fine to the other party in case of breach.", "example_zh": "当事人可以约定一方违约时应当根据违约情况向对方支付一定数额的违约金。", "note": "本对照本译法。英美合同惯用 liquidated damages（约定损害赔偿金）；纯惩罚性的 penalty 条款在英美法下不可执行，翻译时慎用 penalty。", "status": "待审校"}, {"word": "deposit", "ipa": "/dɪˈpɒzɪt/", "pos": "n.", "zh_legal": "定金", "zh_plain": "普通义：存款、押金、沉积物", "domain": "民法-合同", "level": 2, "source": "合同编第586-588条", "collocations": ["pay a deposit as security 交付定金作为担保", "the deposit shall be set off against the price 定金抵作价款"], "example_en": "If the party paying the deposit fails to perform its obligations, it shall have no right to request the return of the deposit.", "example_zh": "给付定金的一方不履行债务的，无权请求返还定金。", "note": "定金罚则：给付方违约丧失定金，收受方违约双倍返还。注意区分定金（deposit）与订金/预付款（advance payment，无担保效力）。", "status": "待审校"}, {"word": "rescind", "ipa": "/rɪˈsɪnd/", "pos": "v.", "zh_legal": "解除（合同）", "zh_plain": null, "domain": "民法-合同", "level": 2, "source": "合同编第562-566条", "collocations": ["rescind the contract 解除合同", "right of rescission 解除权"], "example_en": "The parties may rescind the contract upon reaching a consensus through consultation.", "example_zh": "当事人协商一致，可以解除合同。", "note": "英美法中 rescission 多指自始溯及消灭（撤销性解除），terminate 指向将来终止；中文\"解除\"两义兼有，翻译需看语境。", "status": "待审校"}, {"word": "force majeure", "ipa": "/ˌfɔːs mæˈʒɜː/", "pos": "n.", "zh_legal": "不可抗力", "zh_plain": null, "domain": "民法-合同", "level": 1, "source": "总则编第180条、合同编第590条", "collocations": ["force majeure event 不可抗力事件", "be exempted from liability due to force majeure 因不可抗力免责"], "example_en": "Force majeure means objective circumstances that are unforeseeable, unavoidable and insurmountable.", "example_zh": "不可抗力是不能预见、不能避免且不能克服的客观情况。", "note": "法语借词，字面义\"更大的力量\"。三要素：unforeseeable / unavoidable / insurmountable。", "status": "待审校"}, {"word": "assignment", "ipa": "/əˈsaɪnmənt/", "pos": "n.", "zh_legal": "（债权/合同权利的）转让", "zh_plain": "普通义：任务、作业", "domain": "民法-合同", "level": 2, "source": "合同编第六章（第545条）", "collocations": ["assignment of claims 债权转让", "assignor 转让人 / assignee 受让人", "notify the debtor of the assignment 将转让通知债务人"], "example_en": "Where a creditor assigns a claim, the assignment is not binding on the debtor without notice to the debtor.", "example_zh": "债权人转让债权，未通知债务人的，该转让对债务人不发生效力。", "note": "合同里常见 no-assignment clause（禁止转让条款）。", "status": "待审校"}, {"word": "subrogation", "ipa": "/ˌsʌbrəˈɡeɪʃn/", "pos": "n.", "zh_legal": "代位（权）", "zh_plain": null, "domain": "民法-合同", "level": 4, "source": "合同编第535条", "collocations": ["exercise the creditor's right of subrogation 行使债权人代位权", "subrogation claim（保险）代位求偿"], "example_en": "Where the debtor neglects to exercise its claim against a third party, thus affecting the realization of the creditor's due claim, the creditor may exercise the debtor's claim in its own name by subrogation.", "example_zh": "债务人怠于行使其债权，影响债权人的到期债权实现的，债权人可以以自己的名义代位行使债务人的债权。", "note": "保险法语境同样高频：保险人理赔后代位求偿。", "status": "待审校"}, {"word": "creditor", "ipa": "/ˈkredɪtə/", "pos": "n.", "zh_legal": "债权人", "zh_plain": null, "domain": "民法-合同", "level": 1, "source": "合同编通用", "collocations": ["creditor's rights / claims 债权", "debtor 债务人"], "example_en": "The creditor may request the debtor to perform the obligation according to the contract.", "example_zh": "债权人可以请求债务人按照合同约定履行义务。", "note": "正式文本也用 obligee（债权人）/ obligor（债务人），本对照本两套并用。", "status": "待审校"}, {"word": "joint and several liability", "ipa": "/ˌdʒɔɪnt ənd ˈsevrəl/", "pos": "n.", "zh_legal": "连带责任", "zh_plain": "several 此处义为\"各自的\"，非\"几个\"", "domain": "民法-合同", "level": 1, "source": "总则编第178条", "collocations": ["bear joint and several liability 承担连带责任", "jointly and severally liable 负连带责任的"], "example_en": "Where two or more persons bear joint and several liability, the right holder is entitled to request some or all of them to bear the liability.", "example_zh": "二人以上依法承担连带责任的，权利人有权请求部分或者全部连带责任人承担责任。", "note": "高频陷阱：several 在此是古义\"分别的、各自的\"（severally 各自地），与\"几个\"无关。", "status": "待审校"}, {"word": "guarantee", "ipa": "/ˌɡærənˈtiː/", "pos": "n./v.", "zh_legal": "保证（人的担保）", "zh_plain": "普通义：保证、质保", "domain": "民法-合同", "level": 1, "source": "合同编第十三章（第681条）", "collocations": ["guarantee contract 保证合同", "general guarantee 一般保证", "guarantee with joint and several liability 连带责任保证", "guarantor 保证人"], "example_en": "A guarantee contract is a contract under which the guarantor and the creditor agree that the guarantor will perform the obligation or bear liability when the debtor defaults.", "example_zh": "保证合同是为保障债权的实现，保证人和债权人约定，当债务人不履行到期债务时，保证人履行债务或者承担责任的合同。", "note": "英美法律文件中人保多用 suretyship/surety 或 guaranty（美式拼法）；区分 guarantee（保证）与 warranty（瑕疵担保/陈述保证）。", "status": "待审校"}, {"word": "warranty", "ipa": "/ˈwɒrənti/", "pos": "n.", "zh_legal": "（陈述与）保证；瑕疵担保", "zh_plain": "日常义：（商品）保修", "domain": "民法-合同", "level": 2, "source": "合同编买卖合同章（第615-618条）", "collocations": ["representations and warranties 陈述与保证（并购/融资协议核心条款）", "breach of warranty 违反保证"], "example_en": "The seller warrants that the subject matter delivered conforms to the agreed quality requirements.", "example_zh": "出卖人保证交付的标的物符合约定的质量要求。", "note": "与 guarantee 辨析是法律英语经典考点：warranty 是对事实/品质的担保，guarantee 是对他人债务的担保。", "status": "待审校"}, {"word": "lease", "ipa": "/liːs/", "pos": "n./v.", "zh_legal": "租赁", "zh_plain": null, "domain": "民法-合同", "level": 1, "source": "合同编第十四章（第703条）", "collocations": ["lease contract 租赁合同", "lessor 出租人 / lessee 承租人", "term of lease 租赁期限"], "example_en": "Under a lease contract, the lessor delivers the leased property to the lessee for use and benefit, and the lessee pays the rent.", "example_zh": "租赁合同是出租人将租赁物交付承租人使用、收益，承租人支付租金的合同。", "note": "-or/-ee 构词规律：lessor 出租人 / lessee 承租人，同理 assignor/assignee、mortgagor/mortgagee。", "status": "待审校"}, {"word": "financial lease", "ipa": "/faɪˈnænʃl liːs/", "pos": "n.", "zh_legal": "融资租赁", "zh_plain": null, "domain": "民法-合同", "level": 3, "source": "合同编第十五章（第735条）", "collocations": ["financial lease contract 融资租赁合同", "leaseback 售后回租"], "example_en": "Under a financial lease contract, the lessor purchases the leased property from a seller selected by the lessee and provides it to the lessee for use against rent.", "example_zh": "融资租赁合同是出租人根据承租人对出卖人、租赁物的选择，向出卖人购买租赁物，提供给承租人使用，承租人支付租金的合同。", "note": "国际惯用 finance lease（英）/ capital lease（美会计旧称）。", "status": "待审校"}, {"word": "factoring", "ipa": "/ˈfæktərɪŋ/", "pos": "n.", "zh_legal": "保理", "zh_plain": "factor 普通义：因素", "domain": "民法-合同", "level": 3, "source": "合同编第十六章（第761条）", "collocations": ["factoring contract 保理合同", "recourse / non-recourse factoring 有/无追索权保理", "accounts receivable 应收账款"], "example_en": "Under a factoring contract, the creditor of accounts receivable assigns existing or future accounts receivable to the factor, which provides financing and related services.", "example_zh": "保理合同是应收账款债权人将现有的或者将有的应收账款转让给保理人，保理人提供资金融通等服务的合同。", "note": "民法典新增有名合同（2021）。保理人 factor。", "status": "待审校"}, {"word": "negotiorum gestio", "ipa": "/nɪˌɡəʊʃiˈɔːrəm ˈdʒestiəʊ/", "pos": "n.", "zh_legal": "无因管理", "zh_plain": null, "domain": "民法-合同", "level": 4, "source": "合同编第二十八章（第979条）", "collocations": ["the gestor / manager 管理人", "necessary expenses 必要费用"], "example_en": "A person who manages the affairs of another without statutory or contractual obligation may request the beneficiary to reimburse the necessary expenses.", "example_zh": "管理人没有法定的或者约定的义务，为避免他人利益受损失而管理他人事务的，可以请求受益人偿还必要费用。", "note": "拉丁语，大陆法系特有制度，英美法无对应概念，官方译文直接保留拉丁文。", "status": "待审校"}, {"word": "unjust enrichment", "ipa": "/ʌnˈdʒʌst ɪnˈrɪtʃmənt/", "pos": "n.", "zh_legal": "不当得利", "zh_plain": null, "domain": "民法-合同", "level": 2, "source": "合同编第二十九章（第985条）", "collocations": ["return the benefit unjustly obtained 返还不当利益", "restitution 返还/恢复原状"], "example_en": "Where a person obtains an unjust benefit without legal basis, the person suffering the loss may request the return of the benefit.", "example_zh": "得利人没有法律根据取得不当利益的，受损失的人可以请求得利人返还取得的利益。", "note": "英美法对应救济称 restitution（返还法）。", "status": "待审校"}, {"word": "defense", "ipa": "/dɪˈfens/", "pos": "n.", "zh_legal": "抗辩（权）", "zh_plain": "普通义：防御、辩护", "domain": "民法-合同", "level": 2, "source": "合同编第525-527条", "collocations": ["defense of simultaneous performance 同时履行抗辩权", "defense of insecurity / right to suspend performance 不安抗辩权"], "example_en": "Where the parties shall perform simultaneously, either party is entitled to reject the other party's request for performance before the latter performs.", "example_zh": "当事人应当同时履行的，一方在对方履行之前有权拒绝其履行请求。", "note": "英式拼法 defence。诉讼语境指\"答辩、抗辩事由\"，刑事语境指\"辩护\"。", "status": "待审校"}, {"word": "earnest performance of obligations", "ipa": null, "pos": "phrase", "zh_legal": "全面履行义务（搭配示例）", "zh_plain": null, "domain": "民法-合同", "level": 3, "source": "合同编第509条", "collocations": ["perform obligations of notification, assistance and confidentiality 履行通知、协助、保密义务"], "example_en": "The parties shall observe the principle of good faith and perform the obligations of notification, assistance and confidentiality according to the nature and purpose of the contract and the course of dealing.", "example_zh": "当事人应当遵循诚信原则，根据合同的性质、目的和交易习惯履行通知、协助、保密等义务。", "note": "附随义务（collateral obligations）经典条文，confidentiality 保密为合同高频词。", "status": "待审校"}, {"word": "personality rights", "ipa": "/ˌpɜːsəˈnæləti raɪts/", "pos": "n.", "zh_legal": "人格权", "zh_plain": null, "domain": "民法-人格权", "level": 2, "source": "人格权编第990条", "collocations": ["rights to life, body and health 生命权、身体权、健康权"], "example_en": "Personality rights are the rights enjoyed by civil subjects, including the rights to life, body, health, name, portrait, reputation, honor and privacy.", "example_zh": "人格权是民事主体享有的生命权、身体权、健康权、姓名权、肖像权、名誉权、荣誉权、隐私权等权利。", "note": "民法典独立成编为全球首创，英美法以侵权法（defamation、privacy torts）分散保护。", "status": "待审校"}, {"word": "right to reputation", "ipa": "/ˌrepjuˈteɪʃn/", "pos": "n.", "zh_legal": "名誉权", "zh_plain": null, "domain": "民法-人格权", "level": 2, "source": "人格权编第五章（第1024条）", "collocations": ["defamation 诽谤/名誉侵权", "insult or defame 侮辱、诽谤"], "example_en": "No organization or individual may infringe upon the right to reputation of others by insult or defamation.", "example_zh": "任何组织或者个人不得以侮辱、诽谤等方式侵害他人的名誉权。", "note": "英美法对应侵权类型 defamation，分 libel（书面诽谤）与 slander（口头诽谤）。", "status": "待审校"}, {"word": "right to privacy", "ipa": "/ˈprɪvəsi/", "pos": "n.", "zh_legal": "隐私权", "zh_plain": null, "domain": "民法-人格权", "level": 1, "source": "人格权编第六章（第1032条）", "collocations": ["private life, private space, private activities and private information 私人生活安宁与私密空间、活动、信息"], "example_en": "A natural person enjoys the right to privacy; no organization or individual may infringe upon another person's privacy by spying, intrusion, disclosure or publication.", "example_zh": "自然人享有隐私权。任何组织或者个人不得以刺探、侵扰、泄露、公开等方式侵害他人的隐私权。", "note": null, "status": "待审校"}, {"word": "personal information", "ipa": "/ˌpɜːsənl ˌɪnfəˈmeɪʃn/", "pos": "n.", "zh_legal": "个人信息", "zh_plain": null, "domain": "民法-人格权", "level": 1, "source": "人格权编第1034条", "collocations": ["processing of personal information 个人信息处理", "consent of the natural person 自然人同意", "data protection 数据保护"], "example_en": "The processing of personal information shall follow the principles of lawfulness, justification and necessity, and the consent of the natural person shall be obtained.", "example_zh": "处理个人信息应当遵循合法、正当、必要原则，并征得该自然人同意。", "note": "对照 GDPR 术语：data subject 信息主体、data controller 数据控制者。", "status": "待审校"}, {"word": "portrait right", "ipa": "/ˈpɔːtrɪt/", "pos": "n.", "zh_legal": "肖像权", "zh_plain": null, "domain": "民法-人格权", "level": 2, "source": "人格权编第四章（第1018条）", "collocations": ["use another's portrait without consent 未经同意使用他人肖像"], "example_en": "No organization or individual may use another person's portrait without the consent of the portrait right holder.", "example_zh": "未经肖像权人同意，不得使用肖像权人的肖像。", "note": "英美法近似概念 right of publicity（形象公开权）。", "status": "待审校"}, {"word": "matrimonial property", "ipa": "/ˌmætrɪˈməʊniəl/", "pos": "n.", "zh_legal": "夫妻财产", "zh_plain": null, "domain": "民法-婚姻家庭", "level": 3, "source": "婚姻家庭编第1062条", "collocations": ["community property 夫妻共同财产", "separate property 个人财产", "prenuptial agreement 婚前协议"], "example_en": "The wages, bonuses and proceeds from production and operation acquired during the marriage shall be the community property of the husband and wife.", "example_zh": "夫妻在婚姻关系存续期间所得的工资、奖金和生产、经营收益，为夫妻的共同财产。", "note": "community property 源自美国部分州的夫妻共同财产制。", "status": "待审校"}, {"word": "divorce", "ipa": "/dɪˈvɔːs/", "pos": "n./v.", "zh_legal": "离婚", "zh_plain": null, "domain": "民法-婚姻家庭", "level": 1, "source": "婚姻家庭编第四章", "collocations": ["divorce by agreement 协议离婚", "divorce cooling-off period 离婚冷静期", "custody of children 子女抚养（监护）"], "example_en": "Where both the husband and wife are willing to divorce, they shall conclude a written divorce agreement and apply for divorce registration.", "example_zh": "夫妻双方自愿离婚的，应当签订书面离婚协议，并申请离婚登记。", "note": "alimony/spousal support 配偶赡养费、child support 子女抚养费。", "status": "待审校"}, {"word": "adoption", "ipa": "/əˈdɒpʃn/", "pos": "n.", "zh_legal": "收养", "zh_plain": "普通义：采纳、采用", "domain": "民法-婚姻家庭", "level": 2, "source": "婚姻家庭编第五章", "collocations": ["adopter 收养人 / adoptee 被收养人", "adoption registration 收养登记"], "example_en": "Adoption shall be registered with the civil affairs department; the adoptive relationship is established upon registration.", "example_zh": "收养应当向民政部门登记，收养关系自登记之日起成立。", "note": "公司法语境 adopt 指\"通过（决议、章程）\"，一词多义。", "status": "待审校"}, {"word": "statutory inheritance", "ipa": "/ˈstætʃətri ɪnˈherɪtəns/", "pos": "n.", "zh_legal": "法定继承", "zh_plain": null, "domain": "民法-继承", "level": 2, "source": "继承编第二章（第1127条）", "collocations": ["heir / successor 继承人", "the first order of succession 第一顺序继承人"], "example_en": "In statutory inheritance, the estate shall be inherited first by the successors in the first order: spouse, children and parents.", "example_zh": "法定继承中，遗产按照下列顺序继承：第一顺序为配偶、子女、父母。", "note": "英美法称 intestate succession（无遗嘱继承），intestate 即\"未立遗嘱（而死亡）的\"。", "status": "待审校"}, {"word": "will", "ipa": "/wɪl/", "pos": "n.", "zh_legal": "遗嘱", "zh_plain": "普通义：意志；将要", "domain": "民法-继承", "level": 1, "source": "继承编第三章（第1133条）", "collocations": ["make a will 立遗嘱", "testator 遗嘱人", "notarized will 公证遗嘱", "holographic will 自书遗嘱"], "example_en": "A natural person may dispose of his personal property by making a will according to law, and may appoint an executor.", "example_zh": "自然人可以依法立遗嘱处分个人财产，并可以指定遗嘱执行人。", "note": "正式文书称 last will and testament（又一法律英语 doublet）。executor 遗嘱执行人。", "status": "待审校"}, {"word": "estate", "ipa": "/ɪˈsteɪt/", "pos": "n.", "zh_legal": "遗产", "zh_plain": "普通义：庄园；地产（real estate）", "domain": "民法-继承", "level": 2, "source": "继承编第1122条", "collocations": ["partition of the estate 遗产分割", "administrator of the estate 遗产管理人", "renounce the inheritance 放弃继承"], "example_en": "The estate is the personal lawful property left by a natural person upon death.", "example_zh": "遗产是自然人死亡时遗留的个人合法财产。", "note": "一词多义：real estate 不动产 / estate 遗产 / estate in land（英美财产法）地产权益。", "status": "待审校"}, {"word": "legacy", "ipa": "/ˈleɡəsi/", "pos": "n.", "zh_legal": "遗赠", "zh_plain": "普通义：遗留问题、传承", "domain": "民法-继承", "level": 3, "source": "继承编第1133条", "collocations": ["legatee 受遗赠人", "legacy-support agreement 遗赠扶养协议"], "example_en": "A natural person may make a will to donate his personal property to an organization or individual other than the statutory successors.", "example_zh": "自然人可以立遗嘱将个人财产赠与国家、集体或者法定继承人以外的组织、个人。", "note": "近义词 bequest（动词 bequeath 遗赠动产）、devise（遗赠不动产）。", "status": "待审校"}, {"word": "tort", "ipa": "/tɔːt/", "pos": "n.", "zh_legal": "侵权（行为）", "zh_plain": null, "domain": "民法-侵权", "level": 1, "source": "侵权责任编第七编", "collocations": ["tort liability 侵权责任", "tortfeasor 侵权人", "joint tort 共同侵权"], "example_en": "A person who infringes upon the civil rights and interests of another person due to fault shall bear tort liability.", "example_zh": "行为人因过错侵害他人民事权益造成损害的，应当承担侵权责任。", "note": "法语借词，源自拉丁 tortum（扭曲的、不法的）。与 crime（犯罪）、breach of contract（违约）三分天下。", "status": "待审校"}, {"word": "fault", "ipa": "/fɔːlt/", "pos": "n.", "zh_legal": "过错", "zh_plain": "普通义：错误、缺点", "domain": "民法-侵权", "level": 1, "source": "侵权责任编第1165-1166条", "collocations": ["fault liability 过错责任", "presumed fault 过错推定", "liability without fault / no-fault liability 无过错责任"], "example_en": "Where the law provides that a person shall bear tort liability regardless of fault, such provisions shall apply.", "example_zh": "依照法律规定行为人造成他人损害，不论行为人有无过错都应当承担侵权责任的，依照其规定。", "note": "英美侵权法对应体系：negligence（过失）/ strict liability（严格责任）。", "status": "待审校"}, {"word": "negligence", "ipa": "/ˈneɡlɪdʒəns/", "pos": "n.", "zh_legal": "过失", "zh_plain": "普通义：疏忽", "domain": "民法-侵权", "level": 2, "source": "侵权责任编通用", "collocations": ["gross negligence 重大过失", "duty of care 注意义务", "contributory negligence 与有过失/混合过错"], "example_en": "Where the infringed party is also at fault for the occurrence of the damage, the liability of the tortfeasor may be mitigated.", "example_zh": "被侵权人对损害的发生也有过错的，可以减轻侵权人的责任。", "note": "gross negligence（重大过失）是合同免责条款不可豁免的底线，涉外合同高频。", "status": "待审校"}, {"word": "damages", "ipa": "/ˈdæmɪdʒɪz/", "pos": "n.", "zh_legal": "损害赔偿金", "zh_plain": "单数 damage：损害、损失（不可数）", "domain": "民法-侵权", "level": 1, "source": "侵权责任编、合同编通用", "collocations": ["claim damages 请求损害赔偿", "punitive damages 惩罚性赔偿", "compensatory damages 补偿性赔偿"], "example_en": "The infringed party is entitled to claim damages from the tortfeasor for the losses suffered.", "example_zh": "被侵权人有权就所受损失向侵权人请求损害赔偿。", "note": "法律英语第一陷阱：damage（损害，不可数）≠ damages（赔偿金，恒用复数）。", "status": "待审校"}, {"word": "punitive damages", "ipa": "/ˈpjuːnətɪv ˈdæmɪdʒɪz/", "pos": "n.", "zh_legal": "惩罚性赔偿", "zh_plain": null, "domain": "民法-侵权", "level": 3, "source": "侵权责任编第1185、1207、1232条", "collocations": ["claim punitive damages 请求惩罚性赔偿"], "example_en": "Where a person intentionally infringes upon another person's intellectual property rights and the circumstances are serious, the infringed party is entitled to claim punitive damages.", "example_zh": "故意侵害他人知识产权，情节严重的，被侵权人有权请求相应的惩罚性赔偿。", "note": "又称 exemplary damages。中国法限于知产、产品责任、环境污染等法定情形。", "status": "待审校"}, {"word": "infringe", "ipa": "/ɪnˈfrɪndʒ/", "pos": "v.", "zh_legal": "侵害、侵犯", "zh_plain": null, "domain": "民法-侵权", "level": 1, "source": "侵权责任编通用", "collocations": ["infringe upon the rights and interests of... 侵害…的权益", "infringement 侵权行为", "the infringed party 被侵权人"], "example_en": "No organization or individual may infringe upon the personal rights and property rights of others.", "example_zh": "任何组织或者个人不得侵害他人的人身权利和财产权利。", "note": "知识产权语境最高频：patent/trademark/copyright infringement。", "status": "待审校"}, {"word": "indemnify", "ipa": "/ɪnˈdemnɪfaɪ/", "pos": "v.", "zh_legal": "补偿、赔偿；使免受损失", "zh_plain": null, "domain": "民法-侵权", "level": 3, "source": "涉外合同惯用（对照民法典赔偿制度）", "collocations": ["indemnify and hold harmless 赔偿并使免受损害（合同惯用语）", "indemnity clause 赔偿条款", "indemnification 赔偿"], "example_en": "The seller shall indemnify and hold the buyer harmless from any losses arising out of third-party claims.", "example_zh": "卖方应赔偿买方因第三方索赔而产生的任何损失，并使其免受损害。", "note": "indemnity 与 damages 的区别：前者是约定的填补机制（不以违约为前提），后者是法定救济。涉外合同必考。", "status": "待审校"}, {"word": "liability", "ipa": "/ˌlaɪəˈbɪləti/", "pos": "n.", "zh_legal": "（法律）责任", "zh_plain": "财务语境：负债（liabilities）", "domain": "民法-总则", "level": 1, "source": "总则编第八章", "collocations": ["civil liability 民事责任", "bear / assume liability 承担责任", "limitation of liability 责任限制（条款）"], "example_en": "Civil subjects shall bear civil liability for violation of contractual obligations or statutory duties.", "example_zh": "民事主体违反合同义务或者法定义务的，应当承担民事责任。", "note": "liable for（对…负责）/ liable to（易于…；对某人负责）。区分 liability（责任）与 obligation（义务）。", "status": "待审校"}, {"word": "obligation", "ipa": "/ˌɒblɪˈɡeɪʃn/", "pos": "n.", "zh_legal": "义务；债", "zh_plain": null, "domain": "民法-合同", "level": 1, "source": "合同编通用", "collocations": ["perform an obligation 履行义务", "contractual obligation 合同义务", "obligee 债权人 / obligor 债务人"], "example_en": "The debtor shall perform its obligation when it is due; otherwise the creditor may request performance.", "example_zh": "债务人应当在债务到期时履行义务；否则债权人可以请求其履行。", "note": "大陆法\"债\"的标准译法即 obligation（罗马法 obligatio）。", "status": "待审校"}, {"word": "validity", "ipa": "/vəˈlɪdəti/", "pos": "n.", "zh_legal": "效力", "zh_plain": null, "domain": "民法-合同", "level": 1, "source": "合同编第三章", "collocations": ["the validity of the contract 合同的效力", "valid 有效的 / invalid 无效的", "take effect / become effective 生效"], "example_en": "A contract legally concluded shall become effective upon its conclusion, unless otherwise provided by law or agreed by the parties.", "example_zh": "依法成立的合同，自成立时生效，但法律另有规定或者当事人另有约定的除外。", "note": "成立（formation/conclusion）与生效（effectiveness）是两个阶段，翻译时不可混用。", "status": "待审校"}, {"word": "interest", "ipa": "/ˈɪntrəst/", "pos": "n.", "zh_legal": "利息；权益", "zh_plain": "普通义：兴趣", "domain": "民法-合同", "level": 1, "source": "合同编第十二章（借款合同）", "collocations": ["pay interest 支付利息", "interest rate 利率", "rights and interests 权益", "conflict of interest 利益冲突"], "example_en": "The borrower shall repay the loan and pay the interest at the agreed time.", "example_zh": "借款人应当按照约定的期限返还借款并支付利息。", "note": "三义记忆：利息（借款）、权益（rights and interests）、利益（conflict of interest）。", "status": "待审校"}, {"word": "title", "ipa": "/ˈtaɪtl/", "pos": "n.", "zh_legal": "所有权；权属", "zh_plain": "普通义：标题、头衔", "domain": "民法-物权", "level": 2, "source": "物权编买卖合同相关（第641条）", "collocations": ["retention of title 所有权保留", "transfer of title 所有权移转", "title to the goods 货物所有权"], "example_en": "The parties may agree in the sales contract that the seller retains the title to the subject matter until the price is paid in full.", "example_zh": "当事人可以在买卖合同中约定，价款未付清前出卖人保留标的物的所有权。", "note": "高频陷阱：法律语境 title 指\"权属/所有权\"而非标题；title search 产权调查。", "status": "待审校"}, {"word": "expression of intent", "ipa": null, "pos": "n.", "zh_legal": "意思表示", "zh_plain": null, "domain": "民法-总则", "level": 2, "source": "总则编第六章第二节（第133-142条）", "collocations": ["make / withdraw an expression of intent 作出/撤回意思表示", "false expression of intent 虚假意思表示"], "example_en": "A civil juristic act conducted by an actor and another person based on a false expression of intent is null and void.", "example_zh": "行为人与相对人以虚假的意思表示实施的民事法律行为无效。", "note": "大陆法核心概念（德 Willenserklärung）。沉默仅在法律规定、当事人约定或交易习惯时视为意思表示。", "status": "待审校"}, {"word": "fraud", "ipa": "/frɔːd/", "pos": "n.", "zh_legal": "欺诈", "zh_plain": null, "domain": "民法-总则", "level": 1, "source": "总则编第148-149条", "collocations": ["by means of fraud 以欺诈手段", "fraudulent 欺诈性的", "misrepresentation 不实陈述"], "example_en": "Where a party conducts a civil juristic act against its true intention as a result of fraud by the other party, the defrauded party is entitled to request revocation.", "example_zh": "一方以欺诈手段，使对方在违背真实意思的情况下实施的民事法律行为，受欺诈方有权请求撤销。", "note": "英美法近义梯度：fraudulent misrepresentation（欺诈性虚假陈述）> negligent / innocent misrepresentation。", "status": "待审校"}, {"word": "coercion", "ipa": "/kəʊˈɜːʃn/", "pos": "n.", "zh_legal": "胁迫", "zh_plain": null, "domain": "民法-总则", "level": 2, "source": "总则编第150条", "collocations": ["as a result of coercion 因受胁迫", "under duress（英美惯用）受胁迫"], "example_en": "Where a party conducts a civil juristic act against his real intention as a result of coercion, the coerced party is entitled to request revocation.", "example_zh": "一方或者第三人以胁迫手段，使对方在违背真实意思的情况下实施的民事法律行为，受胁迫方有权请求撤销。", "note": "英美合同法对应概念为 duress（胁迫）与 undue influence（不当影响）。", "status": "待审校"}, {"word": "gross misunderstanding", "ipa": "/ɡrəʊs ˌmɪsʌndəˈstændɪŋ/", "pos": "n.", "zh_legal": "重大误解", "zh_plain": null, "domain": "民法-总则", "level": 3, "source": "总则编第147条", "collocations": ["conducted based on gross misunderstanding 基于重大误解实施"], "example_en": "A party who conducts a civil juristic act based on gross misunderstanding is entitled to request a people's court or an arbitral institution to revoke the act.", "example_zh": "基于重大误解实施的民事法律行为，行为人有权请求人民法院或者仲裁机构予以撤销。", "note": "英美合同法对应概念为 mistake（错误），分 mutual / unilateral mistake。", "status": "待审校"}, {"word": "obviously unfair", "ipa": null, "pos": "adj.", "zh_legal": "显失公平", "zh_plain": null, "domain": "民法-总则", "level": 3, "source": "总则编第151条", "collocations": ["take advantage of the other party's distress 利用对方危困状态"], "example_en": "Where a party takes advantage of the other party's distress or lack of judgment, rendering the civil juristic act obviously unfair, the damaged party is entitled to request revocation.", "example_zh": "一方利用对方处于危困状态、缺乏判断能力等情形，致使民事法律行为成立时显失公平的，受损害方有权请求撤销。", "note": "英美法对应概念 unconscionability（显失公平/不合良心），UCC §2-302。", "status": "待审校"}, {"word": "malicious collusion", "ipa": "/məˈlɪʃəs kəˈluːʒn/", "pos": "n.", "zh_legal": "恶意串通", "zh_plain": null, "domain": "民法-总则", "level": 3, "source": "总则编第154条", "collocations": ["commit malicious collusion 恶意串通", "damage the lawful rights and interests of others 损害他人合法权益"], "example_en": "A civil juristic act conducted through malicious collusion between an actor and a counterparty, which damages the lawful rights and interests of others, is null and void.", "example_zh": "行为人与相对人恶意串通，损害他人合法权益的民事法律行为无效。", "note": "collude 串通（动词）；反垄断语境 collusion 指共谋/合谋。", "status": "待审校"}, {"word": "condition", "ipa": "/kənˈdɪʃn/", "pos": "n.", "zh_legal": "（所附）条件", "zh_plain": "普通义：状况、环境", "domain": "民法-总则", "level": 2, "source": "总则编第158-159条", "collocations": ["a civil juristic act subject to a condition 附条件的民事法律行为", "condition precedent 生效条件/先决条件", "condition subsequent 解除条件"], "example_en": "A civil juristic act subject to a condition precedent becomes effective when the condition is fulfilled.", "example_zh": "附生效条件的民事法律行为，自条件成就时生效。", "note": "交易文件高频：conditions precedent（CP，交割先决条件）清单是并购协议核心。", "status": "待审校"}, {"word": "withdraw", "ipa": "/wɪðˈdrɔː/", "pos": "v.", "zh_legal": "撤回", "zh_plain": "普通义：取款、退出", "domain": "民法-总则", "level": 2, "source": "总则编第141条、合同编第475条", "collocations": ["withdraw an expression of intent 撤回意思表示", "the notice of withdrawal 撤回通知"], "example_en": "A person may withdraw an expression of intent, provided that the notice of withdrawal reaches the counterparty prior to or at the same time as the expression of intent.", "example_zh": "行为人可以撤回意思表示。撤回意思表示的通知应当在意思表示到达相对人前或者与意思表示同时到达相对人。", "note": "撤回（withdraw，生效前）与撤销（revoke，生效后）的时点区别是经典考点。", "status": "待审校"}, {"word": "invitation to offer", "ipa": null, "pos": "n.", "zh_legal": "要约邀请", "zh_plain": null, "domain": "民法-合同", "level": 2, "source": "合同编第473条", "collocations": ["auction announcements, bidding announcements 拍卖公告、招标公告", "commercial advertisements 商业广告"], "example_en": "An invitation to offer is an expression of intent that a person expects another person to make an offer to him.", "example_zh": "要约邀请是希望他人向自己发出要约的表示。", "note": "英美法称 invitation to treat。商品标价陈列、招标公告原则上是要约邀请而非要约。", "status": "待审校"}, {"word": "set-off", "ipa": "/ˈset ɒf/", "pos": "n./v.", "zh_legal": "抵销", "zh_plain": null, "domain": "民法-合同", "level": 2, "source": "合同编第568-569条", "collocations": ["claim set-off 主张抵销", "set off the obligations against each other 互相抵销债务"], "example_en": "Where the parties owe each other obligations and the kind and quality of the subject matters are the same, either party may set off its obligation against the due obligation of the other party.", "example_zh": "当事人互负债务，该债务的标的物种类、品质相同的，任何一方可以将自己的债务与对方的到期债务抵销。", "note": "融资文件高频条款 set-off clause（抵销条款）。注意与 offset（冲抵，泛用词）的语域差别。", "status": "待审校"}, {"word": "escrow", "ipa": "/ˈeskrəʊ/", "pos": "n.", "zh_legal": "提存；第三方托管", "zh_plain": null, "domain": "民法-合同", "level": 3, "source": "合同编第570-574条", "collocations": ["place the subject matter in escrow 提存标的物", "escrow account 监管账户/共管账户", "escrow agent 托管代理人"], "example_en": "Where an obligation cannot be performed because the obligee refuses to accept the performance without justification, the obligor may place the subject matter in escrow.", "example_zh": "债权人无正当理由拒绝受领，致使债务难以履行的，债务人可以将标的物提存。", "note": "跨境交易高频：交易价款常存入 escrow account 待交割条件满足后释放。", "status": "待审校"}, {"word": "waiver", "ipa": "/ˈweɪvə/", "pos": "n.", "zh_legal": "弃权；放弃（权利）", "zh_plain": null, "domain": "民法-合同", "level": 2, "source": "涉外合同惯用（对照民法典权利处分规则）", "collocations": ["waive a right 放弃权利", "no-waiver clause 不弃权条款", "deemed to have waived 视为放弃"], "example_en": "Failure to exercise any right under this contract shall not constitute a waiver of such right.", "example_zh": "未行使本合同项下的任何权利不构成对该权利的放弃。", "note": "涉外合同 boilerplate 必备条款。动词 waive；遗产语境\"放弃继承\"对照本用 renounce。", "status": "待审校"}, {"word": "confidentiality", "ipa": "/ˌkɒnfɪˌdenʃiˈæləti/", "pos": "n.", "zh_legal": "保密", "zh_plain": null, "domain": "民法-合同", "level": 1, "source": "合同编第501、509条", "collocations": ["obligation of confidentiality 保密义务", "confidential information 保密信息", "non-disclosure agreement (NDA) 保密协议"], "example_en": "A trade secret or other confidential information obtained in concluding a contract shall not be disclosed or improperly used, regardless of whether the contract is formed.", "example_zh": "当事人在订立合同过程中知悉的商业秘密或者其他应当保密的信息，无论合同是否成立，不得泄露或者不正当地使用。", "note": "NDA 是涉外法律实务第一份要读懂的文件；trade secret 商业秘密。", "status": "待审校"}, {"word": "contract work", "ipa": null, "pos": "n.", "zh_legal": "承揽", "zh_plain": null, "domain": "民法-合同", "level": 3, "source": "合同编第十七章（第770条）", "collocations": ["contractor 承揽人", "the ordering party 定作人", "work results 工作成果"], "example_en": "A contract for work is a contract under which the contractor completes the work and delivers the work results as required by the ordering party, and the ordering party pays the remuneration.", "example_zh": "承揽合同是承揽人按照定作人的要求完成工作，交付工作成果，定作人支付报酬的合同。", "note": "承揽人对工作成果承担风险，与雇佣（employment）的指挥监督关系相区分——对应英美 independent contractor（独立承包人）概念。", "status": "待审校"}, {"word": "carriage", "ipa": "/ˈkærɪdʒ/", "pos": "n.", "zh_legal": "运输", "zh_plain": "普通义：马车、（火车）车厢", "domain": "民法-合同", "level": 2, "source": "合同编第十九章（第809条）", "collocations": ["contract of carriage 运输合同", "carrier 承运人", "consignor 托运人 / consignee 收货人"], "example_en": "Under a contract of carriage, the carrier transports passengers or goods from the place of departure to the agreed destination, and the passenger or consignor pays the fare or freight.", "example_zh": "运输合同是承运人将旅客或者货物从起运地点运输到约定地点，旅客、托运人或者收货人支付票款或者运输费用的合同。", "note": "国际贸易高频词族：freight 运费、demurrage 滞期费、CMR/海牙规则等运输公约均用 carriage。", "status": "待审校"}, {"word": "safekeeping", "ipa": "/ˌseɪfˈkiːpɪŋ/", "pos": "n.", "zh_legal": "保管", "zh_plain": null, "domain": "民法-合同", "level": 3, "source": "合同编第二十一章（第888条）", "collocations": ["contract for safekeeping 保管合同", "depositor 寄存人", "safekeeping fee 保管费"], "example_en": "A safekeeping contract is a contract under which the safekeeper keeps the article delivered by the depositor and returns it.", "example_zh": "保管合同是保管人保管寄存人交付的保管物，并返还该物的合同。", "note": "英美法对应制度 bailment（寄托）：bailor 寄托人 / bailee 受寄人。", "status": "待审校"}, {"word": "warehouse receipt", "ipa": "/ˈweəhaʊs rɪˈsiːt/", "pos": "n.", "zh_legal": "仓单", "zh_plain": null, "domain": "民法-合同", "level": 3, "source": "合同编第二十二章（第910条）", "collocations": ["issue a warehouse receipt 填发仓单", "pledge of warehouse receipt 仓单质押"], "example_en": "The warehouse receipt is the voucher for taking delivery of the stored goods; the depositor may transfer the rights therein by endorsement.", "example_zh": "仓单是提取仓储物的凭证。存货人可以通过背书转让仓单项下的权利。", "note": "与提单（bill of lading）同属权利凭证（document of title），可背书转让、可质押。endorsement 背书。", "status": "待审校"}, {"word": "bill of lading", "ipa": "/ˌbɪl əv ˈleɪdɪŋ/", "pos": "n.", "zh_legal": "提单", "zh_plain": null, "domain": "民法-合同", "level": 2, "source": "合同编（权利质押第440条提及）", "collocations": ["clean bill of lading 清洁提单", "order bill of lading 指示提单", "缩写 B/L"], "example_en": "A bill of lading is a document of title; the holder of the bill of lading is entitled to take delivery of the goods from the carrier.", "example_zh": "提单是物权凭证，提单持有人有权据此向承运人提取货物。", "note": "国际贸易三大单据之一（另两件：commercial invoice 商业发票、packing list 装箱单）。lading 即 loading 的古体。", "status": "待审校"}, {"word": "entrust", "ipa": "/ɪnˈtrʌst/", "pos": "v.", "zh_legal": "委托", "zh_plain": null, "domain": "民法-合同", "level": 2, "source": "合同编第二十三章（第919条）", "collocations": ["contract of commission / entrustment contract 委托合同", "the principal 委托人 / the agent (trustee) 受托人", "entrusted affairs 委托事务"], "example_en": "A commission contract is a contract under which the principal and the agent agree that the agent shall handle the affairs of the principal.", "example_zh": "委托合同是委托人和受托人约定，由受托人处理委托人事务的合同。", "note": "金融监管语境 entrusted loan 委托贷款、entrusted wealth management 委托理财。", "status": "待审校"}, {"word": "intermediary", "ipa": "/ˌɪntəˈmiːdiəri/", "pos": "n.", "zh_legal": "中介（人）", "zh_plain": null, "domain": "民法-合同", "level": 3, "source": "合同编第二十六章（第961条）", "collocations": ["intermediary contract 中介合同", "report the opportunity of concluding a contract 报告订约机会", "intermediary service fee 中介费"], "example_en": "An intermediary contract is a contract under which the intermediary reports to the client the opportunity of concluding a contract or provides intermediary services, and the client pays the remuneration.", "example_zh": "中介合同是中介人向委托人报告订立合同的机会或者提供订立合同的媒介服务，委托人支付报酬的合同。", "note": "房产中介、FA（财务顾问）的法律定性即中介合同；broker 经纪人为近义词。", "status": "待审校"}, {"word": "partnership", "ipa": "/ˈpɑːtnəʃɪp/", "pos": "n.", "zh_legal": "合伙", "zh_plain": "普通义：伙伴关系", "domain": "民法-合同", "level": 1, "source": "合同编第二十七章（第967条）", "collocations": ["contract of partnership 合伙合同", "partner 合伙人", "share profits and bear risks 共享利益、共担风险", "general / limited partnership 普通/有限合伙"], "example_en": "A partnership contract is an agreement between two or more partners to share benefits and risks for a joint undertaking.", "example_zh": "合伙合同是两个以上合伙人为了共同的事业目的，订立的共享利益、共担风险的协议。", "note": "基金行业高频：GP（general partner 普通合伙人）/ LP（limited partner 有限合伙人）。", "status": "待审校"}, {"word": "notarize", "ipa": "/ˈnəʊtəraɪz/", "pos": "v.", "zh_legal": "公证", "zh_plain": null, "domain": "民法-总则", "level": 2, "source": "继承编第1139条等", "collocations": ["notarized will 公证遗嘱", "notary public 公证员/公证人", "notarization 公证（名词）"], "example_en": "A notarized will is a will made by a testator through a notary agency.", "example_zh": "公证遗嘱由遗嘱人经公证机构办理。", "note": "涉外文件常要求 notarization + legalization/apostille（公证+认证/海牙认证）双重手续。", "status": "待审校"}, {"word": "registration", "ipa": "/ˌredʒɪˈstreɪʃn/", "pos": "n.", "zh_legal": "登记", "zh_plain": null, "domain": "民法-物权", "level": 1, "source": "物权编第209-223条", "collocations": ["real estate registration 不动产登记", "advance notice registration 预告登记", "registration of objection 异议登记"], "example_en": "The creation, alteration, transfer and extinguishment of real rights in immovables shall be registered according to law and become effective upon recordation in the real estate register.", "example_zh": "不动产物权的设立、变更、转让和消灭，依照法律规定应当登记的，自记载于不动产登记簿时发生效力。", "note": "不动产登记簿 real estate register 以登记簿为准，权属证书 certificate 仅为证明。", "status": "待审校"}, {"word": "delivery", "ipa": "/dɪˈlɪvəri/", "pos": "n.", "zh_legal": "交付", "zh_plain": "普通义：递送、分娩", "domain": "民法-物权", "level": 1, "source": "物权编第224-228条", "collocations": ["become effective upon delivery 自交付时发生效力", "constructive delivery 观念交付", "take delivery of the goods 提货/受领货物"], "example_en": "The creation or transfer of a real right in movable property becomes effective upon delivery, unless otherwise provided by law.", "example_zh": "动产物权的设立和转让，自交付时发生效力，但是法律另有规定的除外。", "note": "贸易术语中 delivery 决定风险转移节点（参 Incoterms：EXW/FOB/CIF/DDP）。", "status": "待审校"}, {"word": "fruits", "ipa": "/fruːts/", "pos": "n.", "zh_legal": "孳息", "zh_plain": "普通义：水果", "domain": "民法-物权", "level": 3, "source": "物权编第321条", "collocations": ["natural fruits 天然孳息", "statutory (legal) fruits 法定孳息"], "example_en": "Natural fruits of a thing shall belong to its owner; statutory fruits, such as interest and rent, shall be acquired as agreed by the parties.", "example_zh": "天然孳息由所有权人取得；法定孳息（如利息、租金），当事人有约定的按约定取得。", "note": "罗马法 fructus 的直译。利息、租金、股息都是法定孳息。", "status": "待审校"}, {"word": "right to land contractual management", "ipa": null, "pos": "n.", "zh_legal": "土地承包经营权", "zh_plain": null, "domain": "民法-物权", "level": 4, "source": "物权编第十一章（第330条）", "collocations": ["rural land 农村土地", "circulation of land management right 土地经营权流转"], "example_en": "The holder of the right to land contractual management is entitled to possess, use and benefit from the arable land, forest land and grassland under contractual management.", "example_zh": "土地承包经营权人依法对其承包经营的耕地、林地、草地等享有占有、使用和收益的权利。", "note": "中国法特有制度，无英美对应物；涉外文件中通常需附定义条款解释。", "status": "待审校"}, {"word": "defect", "ipa": "/ˈdiːfekt/", "pos": "n.", "zh_legal": "缺陷；瑕疵", "zh_plain": null, "domain": "民法-侵权", "level": 2, "source": "侵权责任编第1202-1207条（产品责任）", "collocations": ["defect in the product 产品缺陷", "product liability 产品责任", "recall 召回", "defective performance 瑕疵履行"], "example_en": "Where a product causes damage to another person due to a defect, the manufacturer shall bear tort liability.", "example_zh": "因产品存在缺陷造成他人损害的，生产者应当承担侵权责任。", "note": "产品责任为无过错责任（strict liability）。区分 defect（缺陷，致损危险）与 flaw（一般瑕疵）。", "status": "待审校"}, {"word": "assumption of risk", "ipa": null, "pos": "n.", "zh_legal": "自甘风险", "zh_plain": null, "domain": "民法-侵权", "level": 3, "source": "侵权责任编第1176条", "collocations": ["voluntarily participate in recreational or sports activities 自愿参加文体活动"], "example_en": "A person who voluntarily participates in a recreational or sports activity with certain risks shall not request other participants to bear tort liability for damage caused, unless the damage results from their intent or gross negligence.", "example_zh": "自愿参加具有一定风险的文体活动，因其他参加者的行为受到损害的，受害人不得请求其他参加者承担侵权责任；但其他参加者对损害的发生有故意或者重大过失的除外。", "note": "民法典新增规则（2021），直接借鉴英美侵权法 assumption of risk 抗辩。", "status": "待审校"}, {"word": "network service provider", "ipa": null, "pos": "n.", "zh_legal": "网络服务提供者", "zh_plain": null, "domain": "民法-侵权", "level": 2, "source": "侵权责任编第1194-1197条", "collocations": ["notice and takedown 通知—删除（规则）", "take necessary measures such as deletion, blocking and disconnection 采取删除、屏蔽、断开链接等必要措施"], "example_en": "Where a network user commits a tort through network services, the right holder is entitled to notify the network service provider to take necessary measures such as deletion, blocking or disconnection.", "example_zh": "网络用户利用网络服务实施侵权行为的，权利人有权通知网络服务提供者采取删除、屏蔽、断开链接等必要措施。", "note": "对应美国 DMCA 的 safe harbor（避风港）规则；counter-notification 反通知。", "status": "待审校"}, {"word": "vicarious liability", "ipa": "/vɪˈkeəriəs/", "pos": "n.", "zh_legal": "替代责任（用人单位责任）", "zh_plain": null, "domain": "民法-侵权", "level": 3, "source": "涉外惯用（对照侵权责任编第1191条）", "collocations": ["the employer shall bear tort liability 用人单位承担侵权责任", "in the course of employment 在执行工作任务中"], "example_en": "Where an employee causes damage to another person in the course of performing work tasks, the employer shall bear the tort liability.", "example_zh": "用人单位的工作人员因执行工作任务造成他人损害的，由用人单位承担侵权责任。", "note": "vicarious 意为\"替代的、代理的\"。英美法格言 respondeat superior（让主人负责）。", "status": "待审校"}, {"word": "mitigation", "ipa": "/ˌmɪtɪˈɡeɪʃn/", "pos": "n.", "zh_legal": "减损；减轻（损失）", "zh_plain": null, "domain": "民法-合同", "level": 3, "source": "合同编第591条", "collocations": ["duty to mitigate (losses) 减损义务", "take appropriate measures to prevent the increase of losses 采取适当措施防止损失扩大"], "example_en": "After a party breaches the contract, the other party shall take appropriate measures to prevent the increase of losses; no compensation may be claimed for the increased losses caused by failure to take such measures.", "example_zh": "当事人一方违约后，对方应当采取适当措施防止损失的扩大；没有采取适当措施致使损失扩大的，不得就扩大的损失请求赔偿。", "note": "英美合同法 duty to mitigate 的直接对应。气候法语境 mitigation 指\"减缓（排放）\"。", "status": "待审校"}, {"word": "causation", "ipa": "/kɔːˈzeɪʃn/", "pos": "n.", "zh_legal": "因果关系", "zh_plain": null, "domain": "民法-侵权", "level": 3, "source": "涉外惯用（侵权责任构成要件）", "collocations": ["causal link / causal relationship 因果联系", "proximate cause 近因", "but-for test 若无则不（检验法）"], "example_en": "To establish tort liability, the claimant must prove causation between the defendant's act and the damage suffered.", "example_zh": "主张侵权责任成立，原告须证明被告行为与所受损害之间存在因果关系。", "note": "英美侵权法两步检验：factual causation（事实因果，but-for）+ legal/proximate causation（法律因果/近因）。保险法 proximate cause 近因原则同源。", "status": "待审校"}, {"word": "alimony", "ipa": "/ˈælɪməni/", "pos": "n.", "zh_legal": "（离婚后）扶养费", "zh_plain": null, "domain": "民法-婚姻家庭", "level": 3, "source": "婚姻家庭编第1090条", "collocations": ["pay alimony 支付扶养费", "child support 子女抚养费", "spousal support/maintenance 配偶扶养费"], "example_en": "At the time of divorce, if one party has difficulties in life, the other party with the ability to afford it shall provide appropriate assistance.", "example_zh": "离婚时，如果一方生活困难，有负担能力的另一方应当给予适当帮助。", "note": "中文三个费区分：抚养费（对子女 child support）、扶养费（对配偶 alimony/spousal support）、赡养费（对父母 maintenance for parents）。", "status": "待审校"}, {"word": "custody", "ipa": "/ˈkʌstədi/", "pos": "n.", "zh_legal": "（子女）抚养权；监护", "zh_plain": "刑事语境：羁押（in custody）", "domain": "民法-婚姻家庭", "level": 2, "source": "婚姻家庭编第1084条（对照）", "collocations": ["custody of children 子女抚养权", "joint / sole custody 共同/单独抚养", "visitation right 探望权"], "example_en": "After divorce, a child under the age of two shall, in principle, be raised directly by the mother.", "example_zh": "离婚后，不满两周岁的子女，以由母亲直接抚养为原则。", "note": "一词三义：子女抚养权（家事）、羁押（刑事）、保管（custody of assets，资产托管）。", "status": "待审校"}, {"word": "prenuptial agreement", "ipa": "/ˌpriːˈnʌpʃl/", "pos": "n.", "zh_legal": "婚前（财产）协议", "zh_plain": null, "domain": "民法-婚姻家庭", "level": 3, "source": "婚姻家庭编第1065条（夫妻财产约定）", "collocations": ["in written form 采用书面形式", "agreed property regime 约定财产制", "口语 prenup"], "example_en": "The husband and wife may agree in writing that the property acquired during the marriage or before the marriage shall be owned separately or jointly.", "example_zh": "男女双方可以约定婚姻关系存续期间所得的财产以及婚前财产归各自所有或共同所有，约定应当采用书面形式。", "note": "中国法的\"夫妻财产约定\"不限于婚前，婚内亦可订立（postnuptial agreement）。", "status": "待审校"}, {"word": "testamentary succession", "ipa": "/ˌtestəˈmentri/", "pos": "n.", "zh_legal": "遗嘱继承", "zh_plain": null, "domain": "民法-继承", "level": 3, "source": "继承编第三章、第1123条", "collocations": ["testamentary capacity 遗嘱能力", "succession shall be handled in accordance with the will 按照遗嘱办理继承"], "example_en": "After succession begins, it shall be handled in accordance with statutory succession; where there is a will, it shall be handled in accordance with testamentary succession or legacy.", "example_zh": "继承开始后，按照法定继承办理；有遗嘱的，按照遗嘱继承或者遗赠办理。", "note": "testament（遗嘱）的形容词形式；testator 遗嘱人、testamentary trust 遗嘱信托。", "status": "待审校"}, {"word": "renounce", "ipa": "/rɪˈnaʊns/", "pos": "v.", "zh_legal": "放弃（继承）", "zh_plain": null, "domain": "民法-继承", "level": 3, "source": "继承编第1124条", "collocations": ["renounce the inheritance 放弃继承", "renunciation in writing 书面放弃"], "example_en": "A successor who renounces the inheritance shall express his decision in writing before the disposition of the estate.", "example_zh": "继承人放弃继承的，应当在遗产处理前，以书面形式作出放弃继承的表示。", "note": "近义辨析：renounce（正式放弃身份/权利）、waive（放弃合同权利）、disclaim（否认/放弃，英美继承法用 disclaimer）。", "status": "待审校"}, {"word": "provision", "ipa": "/prəˈvɪʒn/", "pos": "n.", "zh_legal": "规定；条款", "zh_plain": "普通义：提供、供应品", "domain": "民法-总则", "level": 1, "source": "全法通用", "collocations": ["the provisions of this Law 本法的规定", "unless otherwise provided by law 法律另有规定的除外", "supplementary provisions 附则"], "example_en": "Where other laws have special provisions on civil relations, such provisions shall apply.", "example_zh": "其他法律对民事关系有特别规定的，依照其规定。", "note": "动词 provide 在法律文本中义为\"规定\"而非\"提供\"——读法条第一个要适应的词义。", "status": "待审校"}, {"word": "stipulate", "ipa": "/ˈstɪpjuleɪt/", "pos": "v.", "zh_legal": "（合同）约定；（法律）规定", "zh_plain": null, "domain": "民法-合同", "level": 2, "source": "全法通用", "collocations": ["as stipulated in the contract 按合同约定", "stipulation 约定/规定（名词）"], "example_en": "The parties shall perform their obligations as stipulated in the contract.", "example_zh": "当事人应当按照合同约定履行自己的义务。", "note": "用词习惯：法律\"规定\"多用 provide/prescribe，合同\"约定\"多用 agree/stipulate。美国诉讼语境 stipulation 另指双方合意确认的事实。", "status": "待审校"}, {"word": "terminate", "ipa": "/ˈtɜːmɪneɪt/", "pos": "v.", "zh_legal": "终止", "zh_plain": null, "domain": "民法-合同", "level": 1, "source": "合同编第七章（第557条）", "collocations": ["termination of contractual rights and obligations 合同权利义务终止", "termination clause 终止条款", "upon termination 终止时"], "example_en": "The rights and obligations under a contract shall terminate when the obligations have been performed or the contract has been rescinded.", "example_zh": "债务已经履行或者合同解除的，合同的权利义务关系终止。", "note": "terminate（向将来终止）与 rescind（解除，可溯及既往）的对比是合同条款翻译核心考点。", "status": "待审校"}, {"word": "statutory", "ipa": "/ˈstætʃətri/", "pos": "adj.", "zh_legal": "法定的", "zh_plain": null, "domain": "民法-总则", "level": 1, "source": "全法通用", "collocations": ["statutory agency 法定代理", "statutory obligation 法定义务", "statute 制定法/成文法"], "example_en": "Guardianship may arise by statutory provision or by designation according to law.", "example_zh": "监护可以依法律规定产生，也可以依法指定产生。", "note": "词族：statute 制定法、statutory 法定的、statutory rape（美刑法）法定强奸。与 legal（合法的/法律的）、lawful（合法的）语义分工不同。", "status": "待审校"}, {"word": "power of attorney", "ipa": null, "pos": "n.", "zh_legal": "授权委托书", "zh_plain": null, "domain": "民法-总则", "level": 2, "source": "总则编第165条", "collocations": ["grant a power of attorney 出具授权委托书", "special / general authorization 特别/概括授权", "缩写 POA"], "example_en": "The power of attorney shall specify the agent's name, the entrusted matters, and the scope and duration of the authority.", "example_zh": "授权委托书应当载明代理人的姓名或者名称、代理事项、权限和期限。", "note": "attorney 本义是\"受托人/代理人\"（attorney-in-fact），美语中才特指律师（attorney-at-law）。", "status": "待审校"}, {"word": "voidable", "ipa": "/ˈvɔɪdəbl/", "pos": "adj.", "zh_legal": "可撤销的", "zh_plain": null, "domain": "民法-总则", "level": 2, "source": "总则编第147-151条", "collocations": ["a voidable contract 可撤销的合同", "voidable at the option of... 由…选择撤销"], "example_en": "A civil juristic act conducted under fraud or coercion is voidable at the request of the aggrieved party.", "example_zh": "因欺诈、胁迫实施的民事法律行为，受损害方有权请求撤销。", "note": "效力三分记忆：void（自始无效）/ voidable（可撤销）/ unenforceable（不可强制执行）。", "status": "待审校"}, {"word": "guarantee period", "ipa": null, "pos": "n.", "zh_legal": "保证期间", "zh_plain": null, "domain": "民法-合同", "level": 3, "source": "合同编第692条", "collocations": ["within the guarantee period 在保证期间内", "claim against the guarantor 向保证人主张权利"], "example_en": "Where there is no agreement on the guarantee period, it shall be six months from the date of maturity of the principal obligation.", "example_zh": "没有约定保证期间的，保证期间为主债务履行期限届满之日起六个月。", "note": "保证期间是除斥期间（不发生中止、中断），与诉讼时效的区分是担保实务核心考点。", "status": "待审校"}, {"word": "gift", "ipa": "/ɡɪft/", "pos": "n.", "zh_legal": "赠与", "zh_plain": "普通义：礼物、天赋", "domain": "民法-合同", "level": 2, "source": "合同编第十一章（第657条）", "collocations": ["gift contract 赠与合同", "donor 赠与人 / donee 受赠人", "revoke the gift 撤销赠与"], "example_en": "Under a gift contract, the donor gives his property to the donee gratuitously, and the donee expresses acceptance of the gift.", "example_zh": "赠与合同是赠与人将自己的财产无偿给予受赠人，受赠人表示接受赠与的合同。", "note": "赠与人交付前原则上可任意撤销，但公证赠与及公益、道德义务性质的赠与除外。", "status": "待审校"}, {"word": "default", "ipa": "/dɪˈfɔːlt/", "pos": "n./v.", "zh_legal": "违约；不履行", "zh_plain": "技术语境：默认（值）", "domain": "民法-合同", "level": 1, "source": "合同编通用（对照第577条）", "collocations": ["be in default 处于违约状态", "event of default 违约事件", "cure a default 补救违约"], "example_en": "Upon an event of default, the lender may declare all outstanding amounts immediately due and payable.", "example_zh": "发生违约事件时，贷款人可以宣布全部未偿款项立即到期应付。", "note": "金融合同核心词：events of default 条款 + acceleration（加速到期）是贷款协议的心脏。诉讼语境 default judgment 缺席判决。", "status": "待审校"}, {"word": "remedy", "ipa": "/ˈremədi/", "pos": "n.", "zh_legal": "救济", "zh_plain": "普通义：疗法、补救", "domain": "民法-合同", "level": 2, "source": "合同编第577条（违约责任体系）", "collocations": ["remedies for breach 违约救济", "exclusive remedy 排他性救济", "cumulative remedies 可并用的救济"], "example_en": "Where a party fails to perform its obligations, the other party may resort to remedies such as specific performance, damages or rescission of the contract.", "example_zh": "一方不履行义务的，对方可以诉诸继续履行、损害赔偿或解除合同等救济。", "note": "法谚 ubi jus, ibi remedium（有权利即有救济）。合同 remedies 条款决定违约后能拿到什么。", "status": "待审校"}, {"word": "notice", "ipa": "/ˈnəʊtɪs/", "pos": "n.", "zh_legal": "通知", "zh_plain": "普通义：注意、布告", "domain": "民法-合同", "level": 1, "source": "合同编第565条", "collocations": ["written notice 书面通知", "upon notice to... 通知…后", "the notice reaches the other party 通知到达对方"], "example_en": "Where a party rescinds the contract by notice, the contract is rescinded when the notice reaches the other party.", "example_zh": "当事人一方以通知方式解除合同的，合同自通知到达对方时解除。", "note": "合同 Notices 条款（送达地址、方式、生效时点）是 boilerplate 中实战价值最高的条款之一。", "status": "待审校"}, {"word": "material breach", "ipa": "/məˈtɪəriəl briːtʃ/", "pos": "n.", "zh_legal": "根本违约；重大违约", "zh_plain": "material 普通义：材料；此处义为\"重大的\"", "domain": "民法-合同", "level": 3, "source": "合同编第563条", "collocations": ["render the purpose of the contract unattainable 致使合同目的不能实现", "fundamental breach（CISG）根本违约"], "example_en": "Where a party's breach renders the purpose of the contract unattainable, the other party may rescind the contract.", "example_zh": "当事人一方的违约行为致使不能实现合同目的的，对方可以解除合同。", "note": "material 作\"重大\"解的词族：material adverse change（MAC）重大不利变化、material omission 重大遗漏——并购协议高频。", "status": "待审校"}, {"word": "suspension", "ipa": "/səˈspenʃn/", "pos": "n.", "zh_legal": "（时效）中止；（履行）中止", "zh_plain": "普通义：悬挂；停职", "domain": "民法-总则", "level": 3, "source": "总则编第194-195条", "collocations": ["suspension of the limitation period 诉讼时效中止", "interruption of the limitation period 诉讼时效中断", "suspend performance 中止履行"], "example_en": "Where in the last six months of the limitation period the right cannot be exercised due to force majeure, the limitation period shall be suspended.", "example_zh": "在诉讼时效期间的最后六个月内，因不可抗力不能行使请求权的，诉讼时效中止。", "note": "中止（suspension，暂停后继续计算）与中断（interruption，重新起算）的效果区别是必考点。", "status": "待审校"}, {"word": "novation", "ipa": "/nəʊˈveɪʃn/", "pos": "n.", "zh_legal": "（债的）更新；合同更替", "zh_plain": null, "domain": "民法-合同", "level": 4, "source": "涉外合同惯用（对照合同编债务承担规则）", "collocations": ["novation agreement 合同更替协议", "release the original obligor 免除原债务人"], "example_en": "By novation, the original contract is extinguished and replaced by a new contract, releasing the original obligor with the consent of all parties.", "example_zh": "通过合同更替，原合同消灭并由新合同取代，经各方同意后原债务人获得免除。", "note": "与 assignment（转让，原合同存续）的本质区别：novation 消灭原债、需三方同意。英国法下转让合同义务只能用 novation。", "status": "待审校"}, {"word": "abuse of rights", "ipa": null, "pos": "n.", "zh_legal": "权利滥用", "zh_plain": null, "domain": "民法-总则", "level": 3, "source": "总则编第132条", "collocations": ["abuse civil rights 滥用民事权利", "abuse of dominant market position（反垄断）滥用市场支配地位"], "example_en": "Civil subjects shall not abuse their civil rights to damage the interests of the State, the public interests or the lawful rights and interests of others.", "example_zh": "民事主体不得滥用民事权利损害国家利益、社会公共利益或者他人合法权益。", "note": "大陆法\"禁止权利滥用\"原则；英美法以个别制度（malicious prosecution 等）实现类似功能。", "status": "待审校"}, {"word": "compensation", "ipa": "/ˌkɒmpenˈseɪʃn/", "pos": "n.", "zh_legal": "补偿；赔偿", "zh_plain": "另一义：薪酬（executive compensation 高管薪酬）", "domain": "民法-物权", "level": 2, "source": "物权编第243条", "collocations": ["fair and reasonable compensation 公平合理的补偿", "compensate v. 补偿", "compensation for expropriation 征收补偿"], "example_en": "Expropriation of immovables shall be conducted with fair and reasonable compensation paid according to law.", "example_zh": "征收不动产应当依法给予公平、合理的补偿。", "note": "compensation（中性填补，可因合法行为产生）与 damages（因违约/侵权的赔偿金）分工不同；劳动法语境又指薪酬福利。", "status": "待审校"}, {"word": "expropriation", "ipa": "/eksˌprəʊpriˈeɪʃn/", "pos": "n.", "zh_legal": "征收", "zh_plain": null, "domain": "民法-物权", "level": 3, "source": "物权编第243条", "collocations": ["for the need of public interest 为了公共利益的需要", "direct / indirect expropriation 直接/间接征收"], "example_en": "For the need of public interest, collectively-owned land and the houses of organizations and individuals may be expropriated within the scope of authority and through the procedures provided by law.", "example_zh": "为了公共利益的需要，依照法律规定的权限和程序可以征收集体所有的土地和组织、个人的房屋等不动产。", "note": "国际投资仲裁核心议题（BIT 项下间接征收认定）；美国宪法语境称 takings（征用条款）。", "status": "待审校"}, {"word": "requisition", "ipa": "/ˌrekwɪˈzɪʃn/", "pos": "n./v.", "zh_legal": "征用", "zh_plain": null, "domain": "民法-物权", "level": 4, "source": "物权编第245条", "collocations": ["requisition immovable or movable property 征用不动产或动产", "return after use 使用后返还"], "example_en": "In case of emergency such as disaster relief or epidemic prevention, the property of organizations and individuals may be requisitioned according to law and shall be returned after use.", "example_zh": "因抢险救灾、疫情防控等紧急需要，依照法律规定可以征用组织、个人的不动产或者动产，使用后应当返还。", "note": "征收（expropriation，所有权移转）与征用（requisition，临时使用后返还）的区分。", "status": "待审校"}, {"word": "pre-contractual liability", "ipa": null, "pos": "n.", "zh_legal": "缔约过失责任", "zh_plain": null, "domain": "民法-合同", "level": 4, "source": "合同编第500条", "collocations": ["negotiate in bad faith 恶意磋商", "under the pretext of concluding a contract 假借订立合同"], "example_en": "A party who negotiates in bad faith under the pretext of concluding a contract and causes losses to the other party shall bear liability for damages.", "example_zh": "假借订立合同，恶意进行磋商，造成对方损失的，应当承担赔偿责任。", "note": "大陆法概念 culpa in contrahendo（缔约上过失，耶林提出）；英美法以 promissory estoppel、misrepresentation 等分散处理。", "status": "待审校"}, {"word": "change of circumstances", "ipa": null, "pos": "n.", "zh_legal": "情势变更", "zh_plain": null, "domain": "民法-合同", "level": 3, "source": "合同编第533条", "collocations": ["renegotiate 重新协商", "modify or rescind the contract 变更或解除合同", "hardship clause 艰难情形条款"], "example_en": "Where the basic conditions of the contract undergo a major change unforeseeable at the time of conclusion and not a commercial risk, rendering continued performance obviously unfair, the adversely affected party may renegotiate with the other party.", "example_zh": "合同成立后，合同的基础条件发生了当事人在订立合同时无法预见的、不属于商业风险的重大变化，继续履行合同对于当事人一方明显不公平的，受不利影响的当事人可以与对方重新协商。", "note": "与不可抗力（履行不能）的区别：情势变更是\"能履行但显失公平\"。英美法近似制度 frustration of purpose；国际合同用 hardship clause。", "status": "待审校"}, {"word": "gratuitous", "ipa": "/ɡrəˈtjuːɪtəs/", "pos": "adj.", "zh_legal": "无偿的", "zh_plain": "普通义：无端的、不必要的", "domain": "民法-合同", "level": 3, "source": "合同编第657、897条", "collocations": ["gratuitous contract 无偿合同", "for value / onerous 有偿的", "gratuitously adv. 无偿地"], "example_en": "A safekeeper who keeps the article gratuitously bears liability only where the loss is caused by his intentional misconduct or gross negligence.", "example_zh": "无偿保管的保管人，仅在因故意或者重大过失造成保管物毁损、灭失时承担赔偿责任。", "note": "无偿合同的注意义务普遍降低（赠与、无偿保管、无偿委托），这是体系性规律。", "status": "待审校"}]}, {"id": "gongsifa", "name": "公司法法律英语词库", "short": "公司法", "words": [{"word": "limited liability company", "ipa": null, "pos": "n.", "zh_legal": "有限责任公司", "zh_plain": null, "domain": "公司法-设立与登记", "level": 1, "source": "公司法第3、4条", "collocations": ["establish a limited liability company 设立有限责任公司", "缩写 LLC"], "example_en": "The shareholders of a limited liability company shall be liable to the company to the extent of their subscribed capital contributions.", "example_zh": "有限责任公司的股东以其认缴的出资额为限对公司承担责任。", "note": "美国的 LLC 是合伙与公司的混合体，与中国有限责任公司并不等同，涉外文件中注意说明。", "status": "待审校"}, {"word": "joint stock limited company", "ipa": null, "pos": "n.", "zh_legal": "股份有限公司", "zh_plain": null, "domain": "公司法-设立与登记", "level": 1, "source": "公司法第3条", "collocations": ["company limited by shares（国际通行译法）", "incorporation by means of share offer 募集设立"], "example_en": "The shareholders of a joint stock limited company shall be liable to the company to the extent of the shares they have subscribed for.", "example_zh": "股份有限公司的股东以其认购的股份为限对公司承担责任。", "note": "本对照本译 joint stock limited company；联合国与欧盟文件多用 company limited by shares。", "status": "待审校"}, {"word": "articles of association", "ipa": null, "pos": "n.", "zh_legal": "公司章程", "zh_plain": "article 普通义：文章、物品", "domain": "公司法-设立与登记", "level": 1, "source": "公司法第5条", "collocations": ["formulate / amend the articles of association 制定/修改公司章程", "as prescribed by the articles of association 按章程规定"], "example_en": "A company shall formulate its articles of association according to law, which are binding on the company, its shareholders, directors, supervisors and senior managers.", "example_zh": "公司应当依法制定公司章程。公司章程对公司、股东、董事、监事、高级管理人员具有约束力。", "note": "美国公司对应文件为 certificate/articles of incorporation + bylaws 两层结构。", "status": "待审校"}, {"word": "registered capital", "ipa": "/ˈredʒɪstəd ˈkæpɪtl/", "pos": "n.", "zh_legal": "注册资本", "zh_plain": null, "domain": "公司法-设立与登记", "level": 1, "source": "公司法第47条", "collocations": ["subscribed capital 认缴资本", "paid-in capital 实缴资本", "increase / reduce the registered capital 增加/减少注册资本"], "example_en": "The registered capital of a limited liability company shall be the capital contributions subscribed for by all shareholders as registered with the company registration authority.", "example_zh": "有限责任公司的注册资本为在公司登记机关登记的全体股东认缴的出资额。", "note": "2023修订要点：有限责任公司认缴出资须在成立之日起五年内缴足。", "status": "待审校"}, {"word": "capital contribution", "ipa": "/ˌkæpɪtl ˌkɒntrɪˈbjuːʃn/", "pos": "n.", "zh_legal": "出资", "zh_plain": "contribution 普通义：贡献、捐款", "domain": "公司法-设立与登记", "level": 1, "source": "公司法第48条", "collocations": ["make capital contributions in currency or in kind 以货币或实物出资", "contribute in proportion to... 按比例出资"], "example_en": "Shareholders may make capital contributions in currency, or in kind, intellectual property rights, land use rights, equity or claims that can be valued in currency and transferred according to law.", "example_zh": "股东可以用货币出资，也可以用实物、知识产权、土地使用权、股权、债权等可以用货币估价并可以依法转让的非货币财产作价出资。", "note": "2023修订新增股权（equity）和债权（claims）作为法定出资形式。", "status": "待审校"}, {"word": "shareholder", "ipa": "/ˈʃeəhəʊldə/", "pos": "n.", "zh_legal": "股东", "zh_plain": null, "domain": "公司法-股权股份", "level": 1, "source": "公司法通用", "collocations": ["controlling shareholder 控股股东", "minority shareholders 中小股东", "shareholders' register 股东名册"], "example_en": "Shareholders are entitled to benefits from assets, participation in major decision-making and selection of managers according to law.", "example_zh": "股东依法享有资产收益、参与重大决策和选择管理者等权利。", "note": "英式也用 member（公司法语境）；stockholder 为美式用法。", "status": "待审校"}, {"word": "shareholders' meeting", "ipa": null, "pos": "n.", "zh_legal": "股东会", "zh_plain": null, "domain": "公司法-治理", "level": 1, "source": "公司法第57条", "collocations": ["convene a shareholders' meeting 召开股东会", "annual general meeting (AGM) 年度股东大会", "extraordinary meeting 临时会议"], "example_en": "The shareholders' meeting is the organ of authority of the company and shall exercise its functions and powers according to this Law.", "example_zh": "股东会是公司的权力机构，依照本法行使职权。", "note": "2023修订统一称\"股东会\"（旧法股份公司称股东大会）。国际惯称 general meeting of shareholders。", "status": "待审校"}, {"word": "board of directors", "ipa": null, "pos": "n.", "zh_legal": "董事会", "zh_plain": "board 普通义：木板、板", "domain": "公司法-治理", "level": 1, "source": "公司法第67条", "collocations": ["board resolution 董事会决议", "board meeting 董事会会议", "chairman of the board 董事长"], "example_en": "The board of directors is the executive organ of the company and is accountable to the shareholders' meeting.", "example_zh": "董事会是公司的执行机构，对股东会负责。", "note": "boardroom 董事会会议室；on the board 担任董事。", "status": "待审校"}, {"word": "director", "ipa": "/dəˈrektə/", "pos": "n.", "zh_legal": "董事", "zh_plain": "普通义：导演、主管", "domain": "公司法-治理", "level": 1, "source": "公司法通用", "collocations": ["independent director 独立董事", "executive / non-executive director 执行/非执行董事", "term of office 任期"], "example_en": "Directors shall be elected or replaced by the shareholders' meeting, with a term of office not exceeding three years as prescribed by the articles of association.", "example_zh": "董事由股东会选举或者更换，任期由公司章程规定，但每届任期不得超过三年。", "note": "高频陷阱：公司法语境 director 是董事而非\"主任/总监\"。", "status": "待审校"}, {"word": "board of supervisors", "ipa": null, "pos": "n.", "zh_legal": "监事会", "zh_plain": null, "domain": "公司法-治理", "level": 2, "source": "公司法第76条", "collocations": ["supervisor 监事", "supervise the performance of duties 监督履职"], "example_en": "The board of supervisors shall examine the financial affairs of the company and supervise the acts of directors and senior managers in performing their duties.", "example_zh": "监事会检查公司财务，对董事、高级管理人员执行职务的行为进行监督。", "note": "源自德日双层制（two-tier board）。2023修订允许以董事会审计委员会（audit committee）替代监事会。", "status": "待审校"}, {"word": "senior manager", "ipa": "/ˈsiːniə ˈmænɪdʒə/", "pos": "n.", "zh_legal": "高级管理人员", "zh_plain": null, "domain": "公司法-治理", "level": 2, "source": "公司法第265条", "collocations": ["directors, supervisors and senior managers 董监高", "general manager 经理", "chief financial officer 财务负责人"], "example_en": "Senior managers refer to the general manager, deputy general managers, chief financial officer, secretary of the board of a listed company and other personnel specified in the articles of association.", "example_zh": "高级管理人员是指公司的经理、副经理、财务负责人，上市公司董事会秘书和公司章程规定的其他人员。", "note": "\"董监高\"合称英文惯用 directors, supervisors and senior management（D&O 保险即 directors and officers liability insurance）。", "status": "待审校"}, {"word": "legal representative", "ipa": null, "pos": "n.", "zh_legal": "法定代表人", "zh_plain": null, "domain": "公司法-治理", "level": 1, "source": "公司法第10条", "collocations": ["serve as the legal representative 担任法定代表人", "the legal representative resigns 法定代表人辞任"], "example_en": "The legal representative of a company shall be a director or the manager who executes the affairs of the company on its behalf.", "example_zh": "公司的法定代表人按照公司章程的规定，由代表公司执行公司事务的董事或者经理担任。", "note": "中国法特有制度，英美公司无对应职位（对外签约权由 authorized signatory 体现），涉外尽调高频考点。", "status": "待审校"}, {"word": "equity", "ipa": "/ˈekwəti/", "pos": "n.", "zh_legal": "股权", "zh_plain": "另一法律义：衡平法；会计义：所有者权益", "domain": "公司法-股权股份", "level": 1, "source": "公司法第四章", "collocations": ["equity transfer 股权转让", "equity pledge 股权质押", "hold 51% equity 持股51%"], "example_en": "Where a shareholder transfers its equity to a person other than the shareholders, it shall notify the other shareholders in writing.", "example_zh": "股东向股东以外的人转让股权的，应当将转让事项书面通知其他股东。", "note": "三义记忆：股权（公司）、衡平法（英美法史）、净资产（会计 owner's equity）。", "status": "待审校"}, {"word": "right of first refusal", "ipa": null, "pos": "n.", "zh_legal": "优先购买权", "zh_plain": null, "domain": "公司法-股权股份", "level": 2, "source": "公司法第84条", "collocations": ["exercise the right of first refusal under equivalent conditions 在同等条件下行使优先购买权", "waive the right of first refusal 放弃优先购买权"], "example_en": "The other shareholders shall have a right of first refusal over the equity to be transferred under equivalent conditions.", "example_zh": "其他股东在同等条件下对拟转让的股权享有优先购买权。", "note": "缩写 ROFR。与 preemptive right（增资优先认缴权）严格区分：前者针对老股转让，后者针对新增资本。", "status": "待审校"}, {"word": "preemptive right", "ipa": "/priˈemptɪv raɪt/", "pos": "n.", "zh_legal": "（新增资本的）优先认缴权", "zh_plain": null, "domain": "公司法-股权股份", "level": 3, "source": "公司法第227条", "collocations": ["subscribe for the increased capital in proportion to... 按比例认缴新增资本"], "example_en": "When a company increases its registered capital, its shareholders shall have the preemptive right to subscribe for the increased capital in proportion to their paid-in contributions.", "example_zh": "公司新增资本时，股东有权优先按照实缴的出资比例认缴出资。", "note": "投资协议里常见 anti-dilution（反稀释）条款与之配套。", "status": "待审校"}, {"word": "cumulative voting", "ipa": "/ˈkjuːmjələtɪv ˈvəʊtɪŋ/", "pos": "n.", "zh_legal": "累积投票（制）", "zh_plain": null, "domain": "公司法-治理", "level": 3, "source": "公司法第117条", "collocations": ["adopt a cumulative voting system 实行累积投票制"], "example_en": "When the shareholders' meeting elects directors or supervisors, a cumulative voting system may be adopted in accordance with the articles of association or a resolution of the shareholders' meeting.", "example_zh": "股东会选举董事、监事，可以按照公司章程的规定或者股东会的决议，实行累积投票制。", "note": "保护中小股东的董事选举机制：每一股份拥有与应选董事人数相同的表决权，可集中投给一人。", "status": "待审校"}, {"word": "resolution", "ipa": "/ˌrezəˈluːʃn/", "pos": "n.", "zh_legal": "决议", "zh_plain": "普通义：决心；分辨率", "domain": "公司法-治理", "level": 1, "source": "公司法第59、66条", "collocations": ["adopt / pass a resolution 通过决议", "special resolution 特别决议", "the resolution is null and void 决议无效"], "example_en": "A resolution of the shareholders' meeting shall be adopted by shareholders representing more than half of the voting rights.", "example_zh": "股东会作出决议，应当经代表过半数表决权的股东通过。", "note": "修改章程、增减资本、合并分立解散须经三分之二以上表决权通过（特别决议）。", "status": "待审校"}, {"word": "voting rights", "ipa": "/ˈvəʊtɪŋ raɪts/", "pos": "n.", "zh_legal": "表决权", "zh_plain": null, "domain": "公司法-治理", "level": 1, "source": "公司法第65条", "collocations": ["exercise voting rights in proportion to capital contributions 按出资比例行使表决权", "proxy 委托投票/代理人", "class shares 类别股"], "example_en": "Shareholders shall exercise their voting rights at the shareholders' meeting in proportion to their capital contributions, unless otherwise prescribed by the articles of association.", "example_zh": "股东会会议由股东按照出资比例行使表决权，公司章程另有规定的除外。", "note": "2023修订引入类别股制度，允许发行特别表决权股（weighted voting rights）。", "status": "待审校"}, {"word": "obligation of loyalty", "ipa": "/ˌɒblɪˈɡeɪʃn əv ˈlɔɪəlti/", "pos": "n.", "zh_legal": "忠实义务", "zh_plain": null, "domain": "公司法-治理", "level": 2, "source": "公司法第180条", "collocations": ["duty of loyalty（英美惯用）", "fiduciary duty 信义义务/受信义务"], "example_en": "Directors,
